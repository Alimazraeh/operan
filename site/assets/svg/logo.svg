<!-- Operan Logo -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer hexagon -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="none" stroke="#00D4FF" stroke-width="1.5"/>
  <!-- Inner hexagon (rotated) -->
  <polygon points="16,6 24,11 24,21 16,26 8,21 8,11" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
  <!-- Center core -->
  <polygon points="16,10 20,13 20,19 16,22 12,19 12,13" fill="#00D4FF" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="16" y1="2" x2="16" y2="10" stroke="#00D4FF" stroke-width="0.5" opacity="0.4"/>
  <line x1="28" y1="9" x2="20" y2="13" stroke="#00D4FF" stroke-width="0.5" opacity="0.4"/>
  <line x1="28" y1="23" x2="20" y2="19" stroke="#00D4FF" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="30" x2="16" y2="22" stroke="#00D4FF" stroke-width="0.5" opacity="0.4"/>
  <line x1="4" y1="23" x2="12" y2="19" stroke="#00D4FF" stroke-width="0.5" opacity="0.4"/>
  <line x1="4" y1="9" x2="12" y2="13" stroke="#00D4FF" stroke-width="0.5" opacity="0.4"/>
</svg>
