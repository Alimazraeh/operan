# All nine Operan services for the demo namespace.
# Images are published by .github/workflows/docker-publish.yml as
# alimazraeh/operan-<module>:latest.
#
# Create the JWT secret first:
#   kubectl -n operan create secret generic operan-jwt \
#     --from-literal=secret="$(openssl rand -base64 32)"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-control-plane
  namespace: operan
  labels:
    app.kubernetes.io/name: tenant-control-plane
    app.kubernetes.io/part-of: operan
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tenant-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenant-control-plane
        app.kubernetes.io/part-of: operan
    spec:
      enableServiceLinks: false
      containers:
        - name: tenant-control-plane
          image: alimazraeh/operan-01-tenant-control-plane:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: operan-jwt
                  key: secret
            - name: EVENT_BUS_HOST
              value: "kafka.operan.svc.cluster.local"
            - name: EVENT_BUS_PORT
              value: "9092"
            - name: EVENT_BUS_PROTO
              value: "kafka"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-control-plane
  namespace: operan
  labels:
    app.kubernetes.io/name: tenant-control-plane
    app.kubernetes.io/part-of: operan
spec:
  selector:
    app.kubernetes.io/name: tenant-control-plane
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-access
  namespace: operan
  labels:
    app.kubernetes.io/name: identity-access
    app.kubernetes.io/part-of: operan
spec:
  replicas: 1
  selector:
    matchLabels:
