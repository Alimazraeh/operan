      labels:
        app.kubernetes.io/name: identity-access
        app.kubernetes.io/part-of: operan
    spec:
      enableServiceLinks: false
      containers:
        - name: identity-access
          image: alimazraeh/operan-02-identity-access:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: IAM_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: operan-jwt
                  key: secret
            - name: IAM_EVENT_BROKER_URL
              value: "kafka.operan.svc.cluster.local:9092"
            - name: AUTHENTIK_SERVER_URL
              value: "http://authentik-not-deployed.local"
            - name: AUTHENTIK_ADMIN_API_TOKEN
              value: "demo-placeholder"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 256Mi
---
