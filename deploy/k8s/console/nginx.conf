worker_processes 2;
events { worker_connections 1024; }
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 8080;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # Same-origin proxies to every Operan service — the console page calls
        # /svc/<name>/... so the browser never deals with CORS.
        location /svc/tenant/        { proxy_pass http://tenant-control-plane.operan.svc.cluster.local:8080/; }
        location /svc/orchestration/ { proxy_pass http://agent-orchestration.operan.svc.cluster.local:8080/; }
        location /svc/registry/      { proxy_pass http://agent-registry.operan.svc.cluster.local:8083/; }
        location /svc/templates/     { proxy_pass http://department-templates.operan.svc.cluster.local:8005/; }
        location /svc/memory/        { proxy_pass http://memory-fabric.operan.svc.cluster.local:8007/; }
        location /svc/tools/         { proxy_pass http://tool-execution.operan.svc.cluster.local:8008/; }
        location /svc/supervision/   { proxy_pass http://human-supervision.operan.svc.cluster.local:8009/; }
        location /svc/observability/ { proxy_pass http://observability.operan.svc.cluster.local:8011/; }
    }
}
