# Operan demo console: a single static page + nginx reverse proxy.
#
# The page content lives in a ConfigMap built from the files next to this
# manifest (so there is no image to build):
#
#   kubectl -n operan create configmap operan-console \
#     --from-file=index.html=deploy/k8s/console/index.html \
#     --from-file=nginx.conf=deploy/k8s/console/nginx.conf \
#     --dry-run=client -o yaml | kubectl apply -f -
#   kubectl apply -f deploy/k8s/console/console.yaml
#   kubectl -n operan rollout restart deployment operan-console   # after content changes
#
# Open it:  kubectl -n operan port-forward svc/operan-console 8088:8080
#           → http://localhost:8088
apiVersion: apps/v1
kind: Deployment
metadata:
  name: operan-console
  namespace: operan
  labels:
    app.kubernetes.io/name: operan-console
    app.kubernetes.io/part-of: operan
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: operan-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: operan-console
        app.kubernetes.io/part-of: operan
    spec:
      enableServiceLinks: false
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: html
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 64Mi }
      volumes:
        - name: html
          configMap:
            name: operan-console
---
apiVersion: v1
kind: Service
metadata:
  name: operan-console
  namespace: operan
  labels:
    app.kubernetes.io/name: operan-console
    app.kubernetes.io/part-of: operan
spec:
  selector:
    app.kubernetes.io/name: operan-console
  ports:
    - port: 8080
      targetPort: 8080
