# Operan — Customer Demo Environment
#
# Nine implemented services + single-node Kafka (KRaft). One shared JWT
# secret signs tokens accepted by every module.
#
#   cp .env.example .env        # then edit DEMO_JWT_SECRET
#   docker compose up --build -d
#   ./demo.sh                   # scripted end-to-end demo flow
#
# Module 02 boots against placeholder Authentik settings: its API serves
# and it publishes events, but identity operations need a real Authentik
# instance (out of demo scope).

name: operan-demo

x-common: &common
  restart: unless-stopped
  depends_on:
    kafka:
      condition: service_healthy
  networks: [operan]

services:
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks: [operan]

  tenant-control-plane:
    <<: *common
    build: ../../modules/01-tenant-control-plane
    ports: ["8080:8080"]
    environment:
      JWT_SECRET: ${DEMO_JWT_SECRET:?Set DEMO_JWT_SECRET in .env}
      EVENT_BUS_HOST: kafka
      EVENT_BUS_PORT: "9092"
      EVENT_BUS_PROTO: kafka

  identity-access:
    <<: *common
    build: ../../modules/02-identity-access
    ports: ["8002:8002"]
    environment:
      IAM_TOKEN_SECRET: ${DEMO_JWT_SECRET:?Set DEMO_JWT_SECRET in .env}
      IAM_EVENT_BROKER_URL: kafka:9092
      # Placeholder Authentik — module boots, identity ops are inert.
      AUTHENTIK_SERVER_URL: http://authentik-not-deployed.local
      AUTHENTIK_ADMIN_API_TOKEN: demo-placeholder

  agent-orchestration:
    <<: *common
    build: ../../modules/03-agent-orchestration
    ports: ["8003:8080"]
    environment:
      JWT_SECRET: ${DEMO_JWT_SECRET:?Set DEMO_JWT_SECRET in .env}
      EVENT_BUS_HOST: kafka
      EVENT_BUS_PORT: "9092"
      EVENT_BUS_PROTO: kafka

  agent-registry:
    <<: *common
    build: ../../modules/04-agent-registry
    ports: ["8083:8083"]
    environment:
      JWT_SECRET: ${DEMO_JWT_SECRET:?Set DEMO_JWT_SECRET in .env}
      EVENT_BUS_HOST: kafka
      EVENT_BUS_PORT: "9092"
      EVENT_BUS_PROTO: kafka
      DB_PASSWORD: demo-in-memory-stores-no-db

  department-templates:
    <<: *common
    build: ../../modules/05-department-template-engine
    ports: ["8005:8005"]
    environment:
      MODULE05_JWT_SECRET: ${DEMO_JWT_SECRET:?Set DEMO_JWT_SECRET in .env}
      MODULE05_EVENT_BROKER_URL: kafka:9092

  memory-fabric:
    <<: *common
    build: ../../modules/07-memory-fabric
    ports: ["8007:8007"]
    environment:
      MODULE07_JWT_SECRET: ${DEMO_JWT_SECRET:?Set DEMO_JWT_SECRET in .env}
      MODULE07_EVENT_BROKER_URL: kafka:9092

  tool-execution:
    <<: *common
    build: ../../modules/08-tool-execution
    ports: ["8008:8008"]
    environment:
      MODULE08_JWT_SECRET: ${DEMO_JWT_SECRET:?Set DEMO_JWT_SECRET in .env}
      MODULE08_EVENT_BROKER_URL: kafka:9092

  human-supervision:
    <<: *common
    build: ../../modules/09-human-supervision
    ports: ["8009:8009"]
    environment:
      MODULE09_JWT_SECRET: ${DEMO_JWT_SECRET:?Set DEMO_JWT_SECRET in .env}
      MODULE09_EVENT_BROKER_URL: kafka:9092

  observability:
    <<: *common
    build: ../../modules/11-observability
    ports: ["8011:8011"]
    environment:
      MODULE11_JWT_SECRET: ${DEMO_JWT_SECRET:?Set DEMO_JWT_SECRET in .env}
      MODULE11_EVENT_BROKER_URL: kafka:9092

networks:
  operan:
    driver: bridge
