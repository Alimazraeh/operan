apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "module09.fullname" . }}
  labels:
    {{- include "module09.labels" . | nindent 4 }}
{{- if .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
{{- end }}
automountServiceAccountToken: false
