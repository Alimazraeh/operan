apiVersion: v1
kind: Service
metadata:
  name: {{ include "module09.fullname" . }}
  labels:
    {{- include "module09.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8009
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: module09-human-supervision
    app.kubernetes.io/instance: {{ .Release.Name }}
