apiVersion: v1
kind: Service
metadata:
  name: {{ include "module05.fullname" . }}
  labels:
    {{- include "module05.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8005
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: module05-department-template-engine
    app.kubernetes.io/instance: {{ .Release.Name }}
