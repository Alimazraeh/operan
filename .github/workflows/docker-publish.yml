name: Build & Publish Docker Images

# Builds each implemented Operan module and publishes its image to Docker Hub
# under the `alimazraeh` account as `alimazraeh/operan-<module>`.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  – Docker Hub username (alimazraeh)
#   DOCKERHUB_TOKEN     – Docker Hub access token (Account Settings → Security)
#
# Triggers:
#   - push to main touching a module  → test, build, push :latest / :sha
#   - version tags v*.*.*             → test, build, push semver + :latest
#   - manual run (workflow_dispatch)
#   - pull requests                   → test + build only (no push)
#
# Each module is an independent matrix job (own go.mod / Dockerfile). With
# fail-fast disabled, a failing module does not block the others from
# publishing.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "modules/**"
      - ".github/workflows/docker-publish.yml"
  pull_request:
    branches: [main]
    paths:
      - "modules/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  module:
    name: ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - 01-tenant-control-plane
          - 02-identity-access
          - 03-agent-orchestration
          - 04-agent-registry
          - 05-department-template-engine
          - 07-memory-fabric
          - 08-tool-execution
          - 09-human-supervision
          - 11-observability
          - 21-experience-portal
    steps:
      - uses: actions/checkout@v4

      # ─── Test gate (per module) ──────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version-file: modules/${{ matrix.module }}/go.mod
          cache-dependency-path: modules/${{ matrix.module }}/go.sum

      - name: go vet (advisory)
        continue-on-error: true
        working-directory: modules/${{ matrix.module }}
        run: go vet ./...

      - name: go test
        working-directory: modules/${{ matrix.module }}
        run: go test ./... -race -count=1

      # ─── Build & push image ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: alimazraeh/operan-${{ matrix.module }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: modules/${{ matrix.module }}
          file: modules/${{ matrix.module }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.module }}
          cache-to: type=gha,mode=max,scope=${{ matrix.module }}
