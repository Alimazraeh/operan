openapi: 3.0.3
info:
  title: Operan ML & Cognitive Services Engine API
  description: AI intelligence layer. Model selection, prompt management, vector search, embeddings, inference, fine-tuning, and AI agent services. Module 12.
  version: 1.0.0

servers:
  - url: /api/v1/ai

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /models:
    post:
      summary: Register an AI model
      operationId: registerModel
      tags: [models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterModelRequest'
      responses:
        '201':
          description: Model registered

    get:
      summary: List available models
      operationId: listModels
      tags: [models]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [llm, embedding, reranker, speech, vision]
      responses:
        '200':
          description: Model list

  /models/{id}:
    get:
      summary: Get model details
      operationId: getModel
      tags: [models]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Model details

    patch:
      summary: Update model
      operationId: updateModel
      tags: [models]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelRequest'
      responses:
        '200':
          description: Model updated

    delete:
      summary: Remove model
      operationId: removeModel
      tags: [models]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Model removed

  /models/{id}/invoke:
    post:
      summary: Invoke a model
      operationId: invokeModel
      tags: [inference]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvokeRequest'
      responses:
        '200':
          description: Model invocation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvokeResult'

  /models/{id}/compare:
    post:
      summary: Compare multiple models
      operationId: compareModels
      tags: [inference]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompareRequest'
      responses:
        '200':
          description: Model comparison results

  /models/{id}/evaluate:
    post:
      summary: Evaluate model performance
      operationId: evaluateModel
      tags: [evaluation]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateRequest'
      responses:
        '200':
          description: Evaluation results

  /prompts:
    post:
      summary: Create a prompt template
      operationId: createPrompt
      tags: [prompts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromptRequest'
      responses:
        '201':
          description: Prompt created

    get:
      summary: List prompt templates
      operationId: listPrompts
      tags: [prompts]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Prompt list

  /prompts/{id}:
    get:
      summary: Get prompt template
      operationId: getPrompt
      tags: [prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Prompt template

    patch:
      summary: Update prompt template
      operationId: updatePrompt
      tags: [prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePromptRequest'
      responses:
        '200':
          description: Prompt updated

    delete:
      summary: Delete prompt template
      operationId: deletePrompt
      tags: [prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Prompt deleted

  /prompts/{id}/render:
    post:
      summary: Render a prompt template with variables
      operationId: renderPrompt
      tags: [prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderPromptRequest'
      responses:
        '200':
          description: Rendered prompt

  /embeddings:
    post:
      summary: Generate embeddings
      operationId: generateEmbeddings
      tags: [embeddings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateEmbeddingsRequest'
      responses:
        '200':
          description: Embeddings generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingsResult'

  /vector-store/query:
    post:
      summary: Search vector store
      operationId: searchVectorStore
      tags: [vector-store]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VectorStoreQueryRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorStoreResults'

  /vector-store/{store_id}:
    delete:
      summary: Delete vector store
      operationId: deleteVectorStore
      tags: [vector-store]
      parameters:
        - name: store_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Vector store deleted

  /fine-tuning:
    post:
      summary: Create a fine-tuning job
      operationId: createFineTuningJob
      tags: [fine-tuning]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFineTuningRequest'
      responses:
        '201':
          description: Fine-tuning job created

    get:
      summary: List fine-tuning jobs
      operationId: listFineTuningJobs
      tags: [fine-tuning]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: model_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed]
      responses:
        '200':
          description: Fine-tuning jobs list

  /fine-tuning/{job_id}:
    get:
      summary: Get fine-tuning job status
      operationId: getFineTuningJob
      tags: [fine-tuning]
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Fine-tuning job details

    delete:
      summary: Cancel fine-tuning job
      operationId: cancelFineTuningJob
      tags: [fine-tuning]
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Fine-tuning job cancelled

  /agents/invoke:
    post:
      summary: Invoke AI agent for cognitive task
      operationId: invokeAIAssistant
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AIAssistantRequest'
      responses:
        '200':
          description: AI assistant response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIAssistantResponse'

  /agents/summarize:
    post:
      summary: Summarize content
      operationId: summarize
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SummarizeRequest'
      responses:
        '200':
          description: Summary

  /agents/classify:
    post:
      summary: Classify content
      operationId: classify
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassifyRequest'
      responses:
        '200':
          description: Classification result

  /agents/extract:
    post:
      summary: Extract entities from content
      operationId: extractEntities
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractRequest'
      responses:
        '200':
          description: Extracted entities

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    RegisterModelRequest:
      type: object
      required:
        - tenant_id
        - name
        - provider
        - type
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        provider:
          type: string
          enum: [openai, anthropic, google, aws, azure, ollama, custom]
        type:
          type: string
          enum: [llm, embedding, reranker, speech, vision]
        model_id:
          type: string
          description: Provider-specific model identifier
        parameters:
          type: object
        api_config:
          type: object
        cost_per_token:
          type: object
          properties:
            prompt:
              type: number
            completion:
              type: number
        max_tokens:
          type: integer
        temperature:
          type: number
        enabled:
          type: boolean
          default: true
        tags:
          type: array
          items:
            type: string

    Model:
      type: object
      required:
        - id
        - name
        - provider
        - type
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        provider:
          type: string
        type:
          type: string
        model_id:
          type: string
        parameters:
          type: object
        api_config:
          type: object
        cost_per_token:
          type: object
        max_tokens:
          type: integer
        default_temperature:
          type: number
        status:
          type: string
          enum: [active, inactive, deprecated, error]
        usage_count:
          type: integer
        avg_latency_ms:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateModelRequest:
      type: object
      properties:
        name:
          type: string
        parameters:
          type: object
        api_config:
          type: object
        cost_per_token:
          type: object
        max_tokens:
          type: integer
        default_temperature:
          type: number
        enabled:
          type: boolean

    InvokeRequest:
      type: object
      required:
        - input
      properties:
        input:
          type: string
        temperature:
          type: number
        max_tokens:
          type: integer
        top_p:
          type: number
        stop_sequences:
          type: array
          items:
            type: string
        system_prompt:
          type: string
        context:
          type: array
          items:
            type: object
        response_format:
          type: string
          enum: [text, json, structured]
        tool_choice:
          type: string
          enum: [auto, none, required]
        tools:
          type: array
          items:
            type: object

    InvokeResult:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        output:
          type: string
        tokens_used:
          type: object
          properties:
            prompt:
              type: integer
            completion:
              type: integer
            total:
              type: integer
        cost:
          type: number
        latency_ms:
          type: number
        model_id:
          type: string
          format: uuid
        finish_reason:
          type: string
        usage_metadata:
          type: object
        error:
          type: string

    CompareRequest:
      type: object
      required:
        - tasks
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/CompareTask'
        reference_models:
          type: array
          items:
            type: string
            format: uuid
        evaluation_criteria:
          type: array
          items:
            type: string

    CompareTask:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
        expected_output:
          type: string
        system_prompt:
          type: string

    EvaluateRequest:
      type: object
      required:
        - dataset_id
      properties:
        dataset_id:
          type: string
          format: uuid
        metrics:
          type: array
          items:
            type: string
            enum: [accuracy, coherence, relevance, toxicity, speed]
        samples:
          type: integer

    CreatePromptRequest:
      type: object
      required:
        - tenant_id
        - name
        - template
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        template:
          type: string
        variables:
          type: array
          items:
            type: string
        model_id:
          type: string
          format: uuid
        category:
          type: string
          enum: [chat, extract, classify, summarize, translate, code, reasoning, custom]
        version:
          type: string
        is_default:
          type: boolean
          default: false
        tags:
          type: array
          items:
            type: string

    PromptTemplate:
      type: object
      required:
        - id
        - name
        - template
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        template:
          type: string
        variables:
          type: array
          items:
            type: string
        model_id:
          type: string
          format: uuid
        category:
          type: string
        version:
          type: string
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string

    UpdatePromptRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        template:
          type: string
        variables:
          type: array
          items:
            type: string
        model_id:
          type: string
          format: uuid
        category:
          type: string
        version:
          type: string
        tags:
          type: array
          items:
            type: string

    RenderPromptRequest:
      type: object
      required:
        - variables
      properties:
        variables:
          type: object
          additionalProperties:
            type: string

    GenerateEmbeddingsRequest:
      type: object
      required:
        - tenant_id
        - texts
      properties:
        tenant_id:
          type: string
          format: uuid
        texts:
          type: array
          items:
            type: string
        model_id:
          type: string
          format: uuid
        dimensions:
          type: integer
        normalize:
          type: boolean
          default: true

    EmbeddingsResult:
      type: object
      required:
        - embeddings
      properties:
        embeddings:
          type: array
          items:
            type: array
            items:
              type: number
        model_id:
          type: string
          format: uuid
        tokens_used:
          type: integer
        dimensions:
          type: integer

    VectorStoreQueryRequest:
      type: object
      required:
        - tenant_id
        - query
        - store_id
      properties:
        tenant_id:
          type: string
          format: uuid
        query:
          type: string
        store_id:
          type: string
          format: uuid
        top_k:
          type: integer
          default: 10
        threshold:
          type: number
        filter:
          type: object

    VectorStoreResults:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/VectorStoreHit'
        query_time_ms:
          type: number
        total_matched:
          type: integer

    VectorStoreHit:
      type: object
      required:
        - id
        - score
        - content
      properties:
        id:
          type: string
          format: uuid
        score:
          type: number
        content:
          type: string
        metadata:
          type: object
        source:
          type: string

    CreateFineTuningRequest:
      type: object
      required:
        - tenant_id
        - base_model_id
        - training_data
      properties:
        tenant_id:
          type: string
          format: uuid
        base_model_id:
          type: string
          format: uuid
        training_data:
          type: object
          properties:
            dataset_id:
              type: string
              format: uuid
            samples:
              type: array
              items:
                type: object
        hyperparameters:
          type: object
          properties:
            epochs:
              type: integer
            learning_rate:
              type: number
            batch_size:
              type: integer
            temperature:
              type: number
        name:
          type: string
        validation_data:
          type: object
          properties:
            dataset_id:
              type: string
              format: uuid

    FineTuningJob:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        base_model_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed]
        progress:
          type: number
        hyperparameters:
          type: object
        metrics:
          type: object
          properties:
            train_loss:
              type: number
            eval_loss:
              type: number
            eval_accuracy:
              type: number
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error_message:
          type: string
        output_model_id:
          type: string
          format: uuid

    AIAssistantRequest:
      type: object
      required:
        - tenant_id
        - task
        - input
      properties:
        tenant_id:
          type: string
          format: uuid
        task:
          type: string
          enum: [translate, sentiment, keywords, topics, tone, style, reasoning, planning, code_generate, code_review, data_analyze, knowledge_query]
        input:
          type: string
        context:
          type: object
        parameters:
          type: object
        model_id:
          type: string
          format: uuid

    AIAssistantResponse:
      type: object
      required:
        - success
        - task
      properties:
        success:
          type: boolean
        task:
          type: string
        output:
          type: object
        tokens_used:
          type: object
        latency_ms:
          type: number
        model_id:
          type: string
          format: uuid
        error:
          type: string

    SummarizeRequest:
      type: object
      required:
        - tenant_id
        - content
      properties:
        tenant_id:
          type: string
          format: uuid
        content:
          type: string
        summary_type:
          type: string
          enum: [brief, detailed, bullet, executive, one_line]
        max_length:
          type: integer
        language:
          type: string

    ClassifyRequest:
      type: object
      required:
        - tenant_id
        - content
        - categories
      properties:
        tenant_id:
          type: string
          format: uuid
        content:
          type: string
        categories:
          type: array
          items:
            type: string
        model_id:
          type: string
          format: uuid

    ExtractRequest:
      type: object
      required:
        - tenant_id
        - content
        - fields
      properties:
        tenant_id:
          type: string
          format: uuid
        content:
          type: string
        fields:
          type: array
          items:
            type: string
        model_id:
          type: string
          format: uuid
