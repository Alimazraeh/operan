asyncapi: 2.6.0
info:
  title: Agent Orchestration Engine Events
  version: 1.0.0
  description: Module 03 — Agent Orchestration Engine. Events emitted by the orchestration engine for workflow lifecycle management, agent assignment, scheduling, checkpointing, replay, and multi-stack (LangGraph, Temporal, Ray, Celery/Kafka) operations.
servers:
  production:
    url: "${KAFKA_BROKER_URL:-kafka.prod.operan.io:9092}"
    protocol: kafka
    description: Production Kafka broker
    bindings:
      kafka:
        schemaRegistryUrl: "${SCHEMA_REGISTRY_URL:-https://schema-registry.prod.operan.io}"
  development:
    url: "${KAFKA_BROKER_URL:-localhost:9092}"
    protocol: kafka
    description: Local development Kafka broker
    bindings:
      kafka:
        schemaRegistryUrl: "${SCHEMA_REGISTRY_URL:-http://localhost:8081}"
channels:
  operan/events/orchestration/workflow/created:
    description: Emitted when a new workflow is created in the orchestration engine.
    publish:
      operationId: onCreateWorkflow
      message:
        $ref: '#/components/messages/WorkflowCreated'
  operan/events/orchestration/workflow/started:
    description: Emitted when a workflow begins execution.
    publish:
      operationId: onStartWorkflow
      message:
        $ref: '#/components/messages/WorkflowStarted'
  operan/events/orchestration/workflow/paused:
    description: Emitted when a running workflow is paused.
    publish:
      operationId: onPauseWorkflow
      message:
        $ref: '#/components/messages/WorkflowPaused'
  operan/events/orchestration/workflow/resumed:
    description: Emitted when a paused workflow is resumed.
    publish:
      operationId: onResumeWorkflow
      message:
        $ref: '#/components/messages/WorkflowResumed'
  operan/events/orchestration/workflow/completed:
    description: Emitted when a workflow finishes with a successful outcome.
    publish:
      operationId: onCompleteWorkflow
      message:
        $ref: '#/components/messages/WorkflowCompleted'
  operan/events/orchestration/workflow/failed:
    description: Emitted when a workflow fails during execution.
    publish:
      operationId: onFailWorkflow
      message:
        $ref: '#/components/messages/WorkflowFailed'
  operan/events/orchestration/workflow/cancelled:
    description: Emitted when a workflow is cancelled.
    publish:
      operationId: onCancelWorkflow
      message:
        $ref: '#/components/messages/WorkflowCancelled'
  operan/events/orchestration/workflow/checkpointed:
    description: Emitted when a workflow state is checkpointed for durability.
    publish:
      operationId: onCheckpointWorkflow
      message:
        $ref: '#/components/messages/WorkflowCheckpointed'
  operan/events/orchestration/workflow/replayed:
    description: Emitted when a workflow is replayed from a checkpoint.
    publish:
      operationId: onReplayWorkflow
      message:
        $ref: '#/components/messages/WorkflowReplayed'
  operan/events/orchestration/schedule/triggered:
    description: Emitted when a scheduled workflow trigger fires.
    publish:
      operationId: onScheduleTriggered
      message:
        $ref: '#/components/messages/ScheduleTriggered'
  operan/events/orchestration/agent/assigned:
    description: Emitted when an agent is assigned to execute a workflow node.
    publish:
      operationId: onAgentAssigned
      message:
        $ref: '#/components/messages/AgentAssigned'
  operan/events/orchestration/agent/unavailable:
    description: Emitted when an agent becomes unavailable for work.
    publish:
      operationId: onAgentUnavailable
      message:
        $ref: '#/components/messages/AgentUnavailable'
  operan/events/orchestration/agent/online:
    description: Emitted when an agent comes online and becomes available for work.
    publish:
      operationId: onAgentOnline
      message:
        $ref: '#/components/messages/AgentOnline'
  operan/events/orchestration/agent/offline:
    description: Emitted when an agent goes offline.
    publish:
      operationId: onAgentOffline
      message:
        $ref: '#/components/messages/AgentOffline'
  operan/events/orchestration/workflow/escalation/created:
    description: Emitted when a new escalation is created for a workflow.
    publish:
      operationId: onEscalationCreated
      message:
        $ref: '#/components/messages/EscalationCreated'
  operan/events/orchestration/workflow/escalation/acknowledged:
    description: Emitted when an escalation is acknowledged.
    publish:
      operationId: onEscalationAcknowledged
      message:
        $ref: '#/components/messages/EscalationAcknowledged'
  operan/events/orchestration/workflow/escalation/resolved:
    description: Emitted when an escalation is resolved.
    publish:
      operationId: onEscalationResolved
      message:
        $ref: '#/components/messages/EscalationResolved'
  operan/events/orchestration/workflow/retry/requested:
    description: Emitted when a retry is requested for a workflow node.
    publish:
      operationId: onRetryRequested
      message:
        $ref: '#/components/messages/RetryRequested'
  operan/events/orchestration/workflow/retry/completed:
    description: Emitted when a retry attempt completes.
    publish:
      operationId: onRetryCompleted
      message:
        $ref: '#/components/messages/RetryCompleted'
  operan/events/orchestration/workflow/priority_changed:
    description: Emitted when a workflow's priority is changed during execution.
    publish:
      operationId: onWorkflowPriorityChanged
      message:
        $ref: '#/components/messages/WorkflowPriorityChanged'
  operan/events/orchestration/workflow/delegate:
    description: Emitted when a workflow node task is delegated to another agent.
    publish:
      operationId: onWorkflowDelegation
      message:
        $ref: '#/components/messages/WorkflowDelegation'
  operan/events/orchestration/workflow/delegate/completed:
    description: Emitted when a delegation is completed.
    publish:
      operationId: onDelegationCompleted
      message:
        $ref: '#/components/messages/DelegationCompleted'
  operan/events/orchestration/node/started:
    description: Emitted when a node begins execution within a workflow.
    publish:
      operationId: onNodeStarted
      message:
        $ref: '#/components/messages/NodeStarted'
  operan/events/orchestration/node/completed:
    description: Emitted when a node completes execution successfully.
    publish:
      operationId: onNodeCompleted
      message:
        $ref: '#/components/messages/NodeCompleted'
  operan/events/orchestration/node/failed:
    description: Emitted when a node fails during execution.
    publish:
      operationId: onNodeFailed
      message:
        $ref: '#/components/messages/NodeFailed'

  # ─── LangGraph Channels ───

  operan/events/orchestration/langgraph/graph/registered:
    description: Emitted when a new LangGraph workflow graph is registered.
    publish:
      operationId: onLangGraphGraphRegistered
      message:
        $ref: '#/components/messages/LangGraphGraphRegistered'
    bindings:
      kafka:
        topic: "operan.orchestration.langgraph.graph.registered"
        partitions: 6
        replicationFactor: 3

  operan/events/orchestration/langgraph/state/updated:
    description: Emitted when a LangGraph node's state is updated during execution.
    publish:
      operationId: onLangGraphStateUpdated
      message:
        $ref: '#/components/messages/LangGraphStateUpdated'
    bindings:
      kafka:
        topic: "operan.orchestration.langgraph.state.updated"
        partitions: 12
        replicationFactor: 3

  operan/events/orchestration/langgraph/graph/deployed:
    description: Emitted when a LangGraph graph is deployed for execution.
    publish:
      operationId: onLangGraphGraphDeployed
      message:
        $ref: '#/components/messages/LangGraphGraphDeployed'
    bindings:
      kafka:
        topic: "operan.orchestration.langgraph.graph.deployed"
        partitions: 6
        replicationFactor: 3

  # ─── Temporal Channels ───

  operan/events/orchestration/temporal/workflow/registered:
    description: Emitted when a Temporal durable workflow is registered.
    publish:
      operationId: onTemporalWorkflowRegistered
      message:
        $ref: '#/components/messages/TemporalWorkflowRegistered'
    bindings:
      kafka:
        topic: "operan.orchestration.temporal.workflow.registered"
        partitions: 6
        replicationFactor: 3

  operan/events/orchestration/temporal/checkpoint/created:
    description: Emitted when a durable checkpoint is created by Temporal.
    publish:
      operationId: onTemporalCheckpointCreated
      message:
        $ref: '#/components/messages/TemporalCheckpointCreated'
    bindings:
      kafka:
        topic: "operan.orchestration.temporal.checkpoint.created"
        partitions: 12
        replicationFactor: 3

  operan/events/orchestration/temporal/workflow/replayed:
    description: Emitted when a Temporal workflow is replayed from a checkpoint.
    publish:
      operationId: onTemporalWorkflowReplayed
      message:
        $ref: '#/components/messages/TemporalWorkflowReplayed'
    bindings:
      kafka:
        topic: "operan.orchestration.temporal.workflow.replayed"
        partitions: 6
        replicationFactor: 3

  # ─── Ray Channels ───

  operan/events/orchestration/ray/worker/pooled:
    description: Emitted when a Ray worker pool is created or scaled.
    publish:
      operationId: onRayWorkerPooled
      message:
        $ref: '#/components/messages/RayWorkerPooled'
    bindings:
      kafka:
        topic: "operan.orchestration.ray.worker.pooled"
        partitions: 6
        replicationFactor: 3

  operan/events/orchestration/ray/task/submitted:
    description: Emitted when a distributed task is submitted to Ray.
    publish:
      operationId: onRayTaskSubmitted
      message:
        $ref: '#/components/messages/RayTaskSubmitted'
    bindings:
      kafka:
        topic: "operan.orchestration.ray.task.submitted"
        partitions: 12
        replicationFactor: 3

  operan/events/orchestration/ray/task/completed:
    description: Emitted when a Ray distributed task completes.
    publish:
      operationId: onRayTaskCompleted
      message:
        $ref: '#/components/messages/RayTaskCompleted'
    bindings:
      kafka:
        topic: "operan.orchestration.ray.task.completed"
        partitions: 12
        replicationFactor: 3

  operan/events/orchestration/ray/worker/status:
    description: Emitted when a Ray worker's status changes.
    publish:
      operationId: onRayWorkerStatus
      message:
        $ref: '#/components/messages/RayWorkerStatus'
    bindings:
      kafka:
        topic: "operan.orchestration.ray.worker.status"
        partitions: 12
        replicationFactor: 3

  # ─── Celery/Kafka Channels ───

  operan/events/orchestration/celery/queue/created:
    description: Emitted when a Celery/Kafka task queue is created.
    publish:
      operationId: onCeleryQueueCreated
      message:
        $ref: '#/components/messages/CeleryQueueCreated'
    bindings:
      kafka:
        topic: "operan.orchestration.celery.queue.created"
        partitions: 6
        replicationFactor: 3

  operan/events/orchestration/celery/task/published:
    description: Emitted when a task is published to a Celery/Kafka queue.
    publish:
      operationId: onCeleryTaskPublished
      message:
        $ref: '#/components/messages/CeleryTaskPublished'
    bindings:
      kafka:
        topic: "operan.orchestration.celery.task.published"
        partitions: 12
        replicationFactor: 3

  operan/events/orchestration/celery/task/consumed:
    description: Emitted when a Celery task is consumed by a worker.
    publish:
      operationId: onCeleryTaskConsumed
      message:
        $ref: '#/components/messages/CeleryTaskConsumed'
    bindings:
      kafka:
        topic: "operan.orchestration.celery.task.consumed"
        partitions: 12
        replicationFactor: 3

  operan/events/orchestration/celery/task/completed:
    description: Emitted when a Celery task completes execution.
    publish:
      operationId: onCeleryTaskCompleted
      message:
        $ref: '#/components/messages/CeleryTaskCompleted'
    bindings:
      kafka:
        topic: "operan.orchestration.celery.task.completed"
        partitions: 12
        replicationFactor: 3

  operan/events/orchestration/celery/worker/heartbeat:
    description: Emitted when a Celery worker sends a heartbeat.
    publish:
      operationId: onCeleryWorkerHeartbeat
      message:
        $ref: '#/components/messages/CeleryWorkerHeartbeat'
    bindings:
      kafka:
        topic: "operan.orchestration.celery.worker.heartbeat"
        partitions: 12
        replicationFactor: 3

  # ─── Stack Health ───

  operan/events/orchestration/stack/health:
    description: Periodic health status events for all orchestration stacks.
    publish:
      operationId: onStackHealth
      message:
        $ref: '#/components/messages/StackHealth'
    bindings:
      kafka:
        topic: "operan.orchestration.stack.health"
        partitions: 3
        replicationFactor: 3

components:
  schemas:
    WorkflowCreatedPayload:
      type: object
      required:
        - workflow_id
        - tenant_id
        - department_id
        - name
        - version
        - graph
        - created_by
        - created_at
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        tenant_id:
          type: string
          format: uuid
          description: Unique identifier for the tenant.
        department_id:
          type: string
          format: uuid
          description: Unique identifier for the department.
        name:
          type: string
          description: Human-readable name of the workflow.
        version:
          type: string
          description: Semantic version of the workflow definition.
        graph:
          type: object
          required:
            - nodes
            - edges
          properties:
            nodes:
              type: array
              items:
                type: object
                required:
                  - id
                  - type
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Unique identifier for the node.
                  type:
                    type: string
                    description: Node type (e.g., agent, condition, loop, terminal).
                  label:
                    type: string
                    description: Human-readable label for the node.
                  config:
                    type: object
                    description: Node-specific configuration.
            edges:
              type: array
              items:
                type: object
                required:
                  - from
                  - to
                properties:
                  from:
                    type: string
                    format: uuid
                    description: Source node ID.
                  to:
                    type: string
                    format: uuid
                    description: Target node ID.
                  label:
                    type: string
                    description: Label for the edge (e.g., condition branch name).
        variables:
          type: object
          additionalProperties: true
          description: Initial workflow variables.
        priority:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
          description: Workflow execution priority (1 = lowest, 100 = highest).
        created_by:
          type: string
          format: uuid
          description: Unique identifier of the user or system that created the workflow.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the workflow was created.
    WorkflowStartedPayload:
      type: object
      required:
        - workflow_id
        - started_by
        - started_at
        - initial_nodes
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        started_by:
          type: string
          format: uuid
          description: Unique identifier of the user or system that started the workflow.
        started_at:
          type: string
          format: date-time
          description: Timestamp when the workflow started execution.
        initial_nodes:
          type: array
          items:
            type: string
            format: uuid
          description: List of node IDs that are ready to execute at startup.
    WorkflowPausedPayload:
      type: object
      required:
        - workflow_id
        - paused_by
        - paused_at
        - reason
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        paused_by:
          type: string
          format: uuid
          description: Unique identifier of the user or system that paused the workflow.
        paused_at:
          type: string
          format: date-time
          description: Timestamp when the workflow was paused.
        reason:
          type: string
          description: Reason for pausing the workflow.
    WorkflowResumedPayload:
      type: object
      required:
        - workflow_id
        - resumed_by
        - resumed_at
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        resumed_by:
          type: string
          format: uuid
          description: Unique identifier of the user or system that resumed the workflow.
        resumed_at:
          type: string
          format: date-time
          description: Timestamp when the workflow was resumed.
    WorkflowCompletedPayload:
      type: object
      required:
        - workflow_id
        - completed_at
        - duration_ms
        - final_status
        - outcome
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        completed_at:
          type: string
          format: date-time
          description: Timestamp when the workflow completed.
        duration_ms:
          type: integer
          minimum: 0
          description: Total duration of the workflow execution in milliseconds.
        final_status:
          type: string
          enum:
            - success
            - partial
            - skipped
          description: Final status of the workflow.
        outcome:
          type: object
          additionalProperties: true
          description: Final outcome data produced by the workflow.
    WorkflowFailedPayload:
      type: object
      required:
        - workflow_id
        - failed_at
        - error_code
        - error_message
        - failed_node_id
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        failed_at:
          type: string
          format: date-time
          description: Timestamp when the workflow failed.
        error_code:
          type: string
          description: Machine-readable error code.
        error_message:
          type: string
          description: Human-readable error message describing the failure.
        failed_node_id:
          type: string
          format: uuid
          description: ID of the node where the failure occurred.
    WorkflowCancelledPayload:
      type: object
      required:
        - workflow_id
        - cancelled_by
        - cancelled_at
        - cancellation_reason
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        cancelled_by:
          type: string
          format: uuid
          description: Unique identifier of the user or system that cancelled the workflow.
        cancelled_at:
          type: string
          format: date-time
          description: Timestamp when the workflow was cancelled.
        cancellation_reason:
          type: string
          description: Reason for cancelling the workflow.
    WorkflowCheckpointedPayload:
      type: object
      required:
        - workflow_id
        - checkpoint_id
        - node_id
        - timestamp
        - state_snapshot_size
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        checkpoint_id:
          type: string
          format: uuid
          description: Unique identifier for the checkpoint.
        node_id:
          type: string
          format: uuid
          description: ID of the node at which the checkpoint was taken.
        timestamp:
          type: string
          format: date-time
          description: Timestamp when the checkpoint was created.
        state_snapshot_size:
          type: integer
          minimum: 0
          description: Size of the state snapshot in bytes.
    WorkflowReplayedPayload:
      type: object
      required:
        - workflow_id
        - replay_id
        - from_checkpoint_id
        - replayed_by
        - started_at
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        replay_id:
          type: string
          format: uuid
          description: Unique identifier for the replay operation.
        from_checkpoint_id:
          type: string
          format: uuid
          description: ID of the checkpoint from which the replay began.
        replayed_by:
          type: string
          format: uuid
          description: Unique identifier of the user or system that initiated the replay.
        started_at:
          type: string
          format: date-time
          description: Timestamp when the replay started.
    ScheduleTriggeredPayload:
      type: object
      required:
        - schedule_id
        - workflow_id
        - triggered_by
        - next_run_at
      properties:
        schedule_id:
          type: string
          format: uuid
          description: Unique identifier for the schedule.
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow associated with this schedule.
        triggered_by:
          type: string
          enum:
            - cron
            - manual
          description: Whether the trigger was fired by a cron expression or manually.
        cron_expression:
          type: string
          description: The cron expression associated with this schedule, if applicable.
        next_run_at:
          type: string
          format: date-time
          description: Timestamp when the next scheduled run is due.
    AgentAssignedPayload:
      type: object
      required:
        - assignment_id
        - workflow_id
        - node_id
        - agent_id
        - assigned_at
        - parameters
      properties:
        assignment_id:
          type: string
          format: uuid
          description: Unique identifier for the agent assignment.
        workflow_id:
          type: string
          format: uuid
          description: Unique identifier for the workflow.
        node_id:
          type: string
          format: uuid
          description: ID of the workflow node being executed by the agent.
        agent_id:
          type: string
          format: uuid
          description: Unique identifier of the assigned agent.
        assigned_at:
          type: string
          format: date-time
          description: Timestamp when the agent was assigned.
        parameters:
          type: object
          additionalProperties: true
          description: Parameters passed to the agent for node execution.
    AgentUnavailablePayload:
      type: object
      required:
        - agent_id
        - reason
        - affected_workflows
        - detected_at
      properties:
        agent_id:
          type: string
          format: uuid
          description: Unique identifier of the unavailable agent.
        reason:
          type: string
          enum:
            - overloaded
            - degraded
            - offline
            - deprecated
          description: Reason the agent is unavailable.
        affected_workflows:
          type: array
          items:
            type: string
            format: uuid
          description: List of workflow IDs that are impacted by the agent's unavailability.
        detected_at:
          type: string
          format: date-time
          description: Timestamp when the unavailability was detected.
    AgentOnlinePayload:
      type: object
      required:
        - agent_id
        - detected_at
      properties:
        agent_id:
          type: string
          format: uuid
          description: Unique identifier of the agent.
        detected_at:
          type: string
          format: date-time
          description: Timestamp when the agent came online.
        capabilities:
          type: array
          items:
            type: string
          description: Agent capabilities that are now available.
    AgentOfflinePayload:
      type: object
      required:
        - agent_id
        - detected_at
      properties:
        agent_id:
          type: string
          format: uuid
          description: Unique identifier of the agent.
        detected_at:
          type: string
          format: date-time
          description: Timestamp when the agent went offline.
        reason:
          type: string
          enum:
            - user_initiated
            - heartbeat_timeout
            - system_shutdown
          description: Reason the agent went offline.
    EscalationCreatedPayload:
      type: object
      required:
        - escalation_id
        - workflow_id
        - node_id
        - severity
        - reason
        - created_at
      properties:
        escalation_id:
          type: string
          format: uuid
          description: Unique identifier for the escalation.
        workflow_id:
          type: string
          format: uuid
          description: Workflow ID this escalation belongs to.
        node_id:
          type: string
          format: uuid
          description: Node ID that triggered the escalation.
        severity:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
          description: Escalation severity level.
        reason:
          type: string
          description: Reason for escalation.
        escalated_to:
          type: string
          format: uuid
          description: User or role ID to escalate to.
        created_at:
          type: string
          format: date-time
          description: Timestamp when escalation was created.
    EscalationAcknowledgedPayload:
      type: object
      required:
        - escalation_id
        - acknowledged_by
        - acknowledged_at
      properties:
        escalation_id:
          type: string
          format: uuid
          description: Unique identifier for the escalation.
        acknowledged_by:
          type: string
          format: uuid
          description: User ID who acknowledged the escalation.
        acknowledged_at:
          type: string
          format: date-time
          description: Timestamp when escalation was acknowledged.
    EscalationResolvedPayload:
      type: object
      required:
        - escalation_id
        - resolved_by
        - resolved_at
      properties:
        escalation_id:
          type: string
          format: uuid
          description: Unique identifier for the escalation.
        resolved_by:
          type: string
          format: uuid
          description: User ID who resolved the escalation.
        resolved_at:
          type: string
          format: date-time
          description: Timestamp when escalation was resolved.
        resolution_notes:
          type: string
          description: Notes about how the escalation was resolved.
    RetryRequestedPayload:
      type: object
      required:
        - workflow_id
        - node_id
        - attempt_number
        - requested_at
      properties:
        workflow_id:
          type: string
          format: uuid
          description: Workflow ID this retry belongs to.
        node_id:
          type: string
          format: uuid
