        - isolation_level
        - status
        - created_at
        - updated_at

    EnvironmentListResponse:
      type: object
      properties:
        environments:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentResponse"
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - environments
        - total
        - page
        - page_size
        - has_more

  parameters:
    TenantIdPath:
      name: id
      in: path
      required: true
      description: UUID of the tenant
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    StatusFilterParam:
      name: status
      in: query
      required: false
      description: Filter tenants by status
      schema:
        type: string
        enum:
          - provisioning
          - active
          - suspended
          - deprovisioning
          - deprovisioned
    PlanFilterParam:
      name: plan
      in: query
      required: false
      description: Filter tenants by plan
      schema:
        type: string
        enum:
          - saas
          - enterprise
          - sovereign

    NamespaceIdPath:
      name: namespaceId
      in: path
      required: true
      description: UUID of the namespace
      schema:
        type: string
        format: uuid

    DeploymentIdPath:
      name: deploymentId
      in: path
      required: true
      description: UUID of the deployment
      schema:
        type: string
        format: uuid

    PolicyIdPath:
      name: policyId
      in: path
      required: true
      description: UUID of the policy
      schema:
        type: string
        format: uuid

    EnvironmentIdPath:
      name: environmentId
      in: path
      required: true
      description: UUID of the environment
      schema:
        type: string
        format: uuid

    Page:
      name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

paths:
  /tenants:
    get:
      operationId: listTenants
      summary: List all tenants
      description: Retrieve paginated list of all tenants across the platform.
      tags:
        - Tenants
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Tenant list retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      operationId: createTenant
      summary: Create a new tenant
      description: Provision a new tenant with specified plan, region, and isolation configuration.
      tags:
        - Tenants
      security:
        - BearerAuth: []
        - TenantHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantCreateRequest"
      responses:
        "201":
          description: Tenant created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantResponse"
        "400":
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden — insufficient permissions to create tenants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict — tenant name already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Unprocessable entity — quota validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tenants/{id}/agents:
    get:
