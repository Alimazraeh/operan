        - has_more

    # ─────────────────────────────────────────
    # Policy Schemas (Tenant-Level)
    # ─────────────────────────────────────────
    PolicyCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: Policy name
          example: "Max agent cost per workflow"
        description:
          type: string
          description: Policy description
        category:
          type: string
          description: Policy category
          enum: [security, compliance, cost, governance, operational]
        rule:
          type: object
          description: Policy rule definition (Rego/JSON)
          additionalProperties: true
        severity:
          type: string
          description: Violation severity
          enum: [low, medium, high, critical]
        action_on_violation:
          type: string
          description: Action when policy is violated
          enum: [allow, deny, warn, require_approval]
        enabled:
          type: boolean
          description: Whether policy is currently active
          default: true
        tags:
          type: object
          additionalProperties:
            type: string
      required:
        - name
        - category
        - rule

    PolicyUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: Updated policy name
        description:
          type: string
          description: Updated description
        category:
          type: string
          enum: [security, compliance, cost, governance, operational]
        rule:
          type: object
          description: Updated rule definition
          additionalProperties: true
        severity:
          type: string
          enum: [low, medium, high, critical]
        action_on_violation:
          type: string
          enum: [allow, deny, warn, require_approval]
        enabled:
          type: boolean

    PolicyEvaluationRequest:
      type: object
      properties:
        inputs:
          type: object
          description: Test inputs to evaluate against policy
          additionalProperties: true
        context:
          type: object
          description: Evaluation context (tenant, user, etc.)
          additionalProperties: true
      required:
        - inputs

    PolicyEvaluationResponse:
      type: object
      properties:
        policy_id:
          type: string
          format: uuid
        policy_name:
          type: string
        result:
          type: string
          enum: [pass, fail, warn]
        violations:
          type: array
          items:
            $ref: "#/components/schemas/PolicyViolation"
        evaluation_time_ms:
          type: integer
          description: Time taken to evaluate in milliseconds
        context:
          type: object
          description: Evaluation context summary
          additionalProperties: true
      required:
        - policy_id
        - policy_name
        - result
        - evaluation_time_ms

    PolicyViolation:
      type: object
      properties:
        field:
          type: string
          description: Field that violated the policy
        message:
          type: string
          description: Violation detail
        severity:
          type: string
          enum: [low, medium, high, critical]
      required:
        - field
        - message

    PolicyResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          $ref: "#/components/schemas/TenantId"
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [security, compliance, cost, governance, operational]
        rule:
          type: object
          additionalProperties: true
        severity:
          type: string
          enum: [low, medium, high, critical]
        action_on_violation:
          type: string
          enum: [allow, deny, warn, require_approval]
        enabled:
