          type: string
          description: Updated environment name
        description:
          type: string
          description: Updated description
        configuration:
          type: object
          description: Updated configuration
          additionalProperties: true
        isolation_level:
          type: string
          enum: [logical, physical, air_gapped]
        allowed_agents:
          type: array
          items:
            type: string
            format: uuid
        allowed_tools:
          type: array
          items:
            type: string
            format: uuid

    EnvironmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          $ref: "#/components/schemas/TenantId"
        name:
          type: string
        description:
          type: string
        region:
          type: string
          enum:
            - me-east-1
            - eu-west-1
            - us-east-1
            - ap-south-1
            - on-prem
        isolation_level:
          type: string
          enum: [logical, physical, air_gapped]
        configuration:
          type: object
          additionalProperties: true
        allowed_agents:
          type: array
          items:
            type: string
            format: uuid
        allowed_tools:
          type: array
          items:
            type: string
            format: uuid
