        - name
        - version

    DeploymentUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: Updated deployment name
        description:
          type: string
          description: Updated description
        version:
          type: string
          description: Updated version
        configuration:
          type: object
          description: Updated configuration
          additionalProperties: true
        replicas:
          type: integer
          minimum: 1
        resource_limits:
          type: object
          description: Updated resource constraints
          additionalProperties: true
        auto_scaling:
          type: object
          description: Updated auto-scaling config
          additionalProperties: true

    DeploymentRollbackRequest:
      type: object
      properties:
        version:
          type: string
          description: Target version to rollback to
        force:
          type: boolean
          description: Force rollback even if target is not previous version
          default: false
