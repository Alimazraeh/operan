          $ref: "#/components/schemas/TenantId"
        name:
          type: string
          description: Deployment name
        description:
          type: string
          description: Deployment description
        namespace_id:
          type: string
          format: uuid
          description: Parent namespace
        version:
          type: string
          description: Current version
        configuration:
          type: object
          description: Deployment configuration
          additionalProperties: true
        replicas:
          type: integer
        resource_limits:
          type: object
          description: Resource constraints
          additionalProperties: true
        status:
          type: string
          description: Deployment lifecycle status
          enum: [pending, provisioning, active, degraded, error, shutting_down, terminated]
        environment_id:
          type: string
          format: uuid
          description: Target environment
        auto_scaling:
          type: object
          description: Auto-scaling config
          additionalProperties: true
        health:
