        configuration:
          type: object
          description: Namespace-specific configuration
          additionalProperties: true
        tags:
          type: object
          additionalProperties:
            type: string
          description: Namespace tags
      required:
        - name
        - type

    NamespaceUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: Updated namespace name
