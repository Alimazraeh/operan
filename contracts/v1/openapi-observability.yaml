openapi: 3.0.3
info:
  title: Operan Observability & Telemetry API
  description: Real-time monitoring and analytics. Metrics collection, distributed tracing, log aggregation, dashboard queries, anomaly detection, and alerting. Module 11.
  version: 1.0.0

servers:
  - url: /api/v1/observability

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /metrics:
    post:
      summary: Ingest metrics
      operationId: ingestMetrics
      tags: [metrics]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, metrics]
              properties:
                tenant_id:
                  type: string
                  format: uuid
                metrics:
                  type: array
                  items:
                    $ref: '#/components/schemas/MetricPoint'
      responses:
        '202':
          description: Metrics accepted

    get:
      summary: Query metrics
      operationId: queryMetrics
      tags: [metrics]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: metric_name
          in: query
          schema:
            type: string
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
        - name: aggregation
          in: query
          schema:
            type: string
            enum: [avg, sum, min, max, count, rate]
        - name: interval
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Metric query results

  /metrics/dashboards:
    post:
      summary: Create a dashboard
      operationId: createDashboard
      tags: [dashboards]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDashboardRequest'
      responses:
        '201':
          description: Dashboard created

    get:
      summary: List dashboards
      operationId: listDashboards
      tags: [dashboards]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Dashboard list

  /metrics/dashboards/{id}:
    get:
      summary: Get dashboard
      operationId: getDashboard
      tags: [dashboards]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dashboard details

    patch:
      summary: Update dashboard
      operationId: updateDashboard
      tags: [dashboards]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDashboardRequest'
      responses:
        '200':
          description: Dashboard updated

  /traces:
    post:
      summary: Ingest a trace span
      operationId: ingestSpan
      tags: [traces]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraceSpan'
      responses:
        '202':
          description: Span accepted

    get:
      summary: Query traces
      operationId: queryTraces
      tags: [traces]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: trace_id
          in: query
          schema:
            type: string
            format: uuid
        - name: span_id
          in: query
          schema:
            type: string
            format: uuid
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
        - name: service
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Trace query results

  /traces/{trace_id}:
    get:
      summary: Get full trace
      operationId: getFullTrace
      tags: [traces]
      parameters:
        - name: trace_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full trace with all spans

  /logs:
    post:
      summary: Ingest logs
      operationId: ingestLogs
      tags: [logs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, logs]
              properties:
                tenant_id:
                  type: string
                  format: uuid
                logs:
                  type: array
                  items:
                    $ref: '#/components/schemas/LogEntry'
      responses:
        '202':
          description: Logs accepted

    get:
      summary: Query logs
      operationId: queryLogs
      tags: [logs]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
        - name: level
          in: query
          schema:
            type: string
            enum: [debug, info, warn, error, critical]
        - name: service
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Log query results

  /anomalies:
    get:
      summary: List detected anomalies
      operationId: listAnomalies
      tags: [anomalies]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, acknowledged, resolved]
      responses:
        '200':
          description: Anomaly list

  /anomalies/{id}:
    get:
      summary: Get anomaly details
      operationId: getAnomaly
      tags: [anomalies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Anomaly details

  /alerts:
    post:
      summary: Create alert rule
      operationId: createAlert
      tags: [alerts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertRequest'
      responses:
        '201':
          description: Alert created

    get:
      summary: List alert rules
      operationId: listAlerts
      tags: [alerts]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Alert list

  /alerts/{id}:
    patch:
      summary: Update alert rule
      operationId: updateAlert
      tags: [alerts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAlertRequest'
      responses:
        '200':
          description: Alert updated

    delete:
      summary: Delete alert rule
      operationId: deleteAlert
      tags: [alerts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Alert deleted

  /health:
    get:
      summary: Service health check
      operationId: healthCheck
      tags: [health]
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /status:
    get:
      summary: Get telemetry system status
      operationId: getSystemStatus
      tags: [status]
      responses:
        '200':
          description: System status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelemetryStatus'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    MetricPoint:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
        value:
          type: number
          format: float
        unit:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        timestamp:
          type: string
          format: date-time

    CreateDashboardRequest:
      type: object
      required:
        - tenant_id
        - name
        - widgets
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        widgets:
          type: array
          items:
            $ref: '#/components/schemas/DashboardWidget'
        refresh_interval:
          type: string
        layout:
          type: object
        tags:
          type: array
          items:
            type: string

    DashboardWidget:
      type: object
      required:
        - title
        - type
        - query
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        type:
          type: string
          enum: [gauge, line, bar, table, trend, heatmap]
        query:
          $ref: '#/components/schemas/MetricQuery'
        position:
          type: object
          properties:
            x:
              type: integer
            y:
              type: integer
            w:
              type: integer
            h:
              type: integer
        thresholds:
          type: array
          items:
            type: object
            properties:
              value:
                type: number
              color:
                type: string
                enum: [green, yellow, red, orange]

    MetricQuery:
      type: object
      required:
        - metric_name
      properties:
        metric_name:
          type: string
        aggregation:
          type: string
          enum: [avg, sum, min, max, count, rate, percentile]
        percentile:
          type: integer
        group_by:
          type: array
          items:
            type: string
        time_interval:
          type: string
        filters:
          type: object

    UpdateDashboardRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        widgets:
          type: array
          items:
            $ref: '#/components/schemas/DashboardWidget'
        refresh_interval:
          type: string
        layout:
          type: object

    TraceSpan:
      type: object
      required:
        - trace_id
        - span_id
        - operation
        - start_time
        - duration_ms
      properties:
        trace_id:
          type: string
          format: uuid
        span_id:
          type: string
          format: uuid
        parent_span_id:
          type: string
          format: uuid
        operation:
          type: string
        service:
          type: string
        start_time:
          type: string
          format: date-time
        duration_ms:
          type: number
        status:
          type: string
          enum: [ok, error, cancelled]
        tags:
          type: object
          additionalProperties:
            type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/TraceEvent'
        error:
          $ref: '#/components/schemas/SpanError'

    TraceEvent:
      type: object
      required:
        - name
        - timestamp
      properties:
        name:
          type: string
        timestamp:
          type: string
          format: date-time
        attributes:
          type: object

    SpanError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        code:
          type: integer
        stack_trace:
          type: string

    LogEntry:
      type: object
      required:
        - message
        - level
        - timestamp
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        service:
          type: string
        level:
          type: string
          enum: [debug, info, warn, error, critical]
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        source:
          type: string
        module:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
        context:
          type: object
        trace_id:
          type: string
          format: uuid
        span_id:
          type: string
          format: uuid

    Anomaly:
      type: object
      required:
        - id
        - metric_name
        - severity
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        metric_name:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [active, acknowledged, resolved]
        detected_at:
          type: string
          format: date-time
        description:
          type: string
        expected_value:
          type: number
        actual_value:
          type: number
        deviation:
          type: number
        related_spans:
          type: array
          items:
            type: string
            format: uuid
        resolved_at:
          type: string
          format: date-time
        resolved_by:
          type: string
          format: uuid

    CreateAlertRequest:
      type: object
      required:
        - tenant_id
        - name
        - condition
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        condition:
          $ref: '#/components/schemas/AlertCondition'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/AlertAction'
        channels:
          type: array
          items:
            type: string
            enum: [email, slack, webhooks, pagerduty]
        enabled:
          type: boolean
          default: true
        cooldown:
          type: string

    UpdateAlertRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        condition:
          $ref: '#/components/schemas/AlertCondition'
        actions:
          type: array
          items:
            $ref: '#/components/schemas/AlertAction'
        channels:
          type: array
          items:
            type: string
            enum: [email, slack, webhooks, pagerduty]
        enabled:
          type: boolean
        cooldown:
          type: string

    AlertCondition:
      type: object
      required:
        - metric
        - operator
        - threshold
      properties:
        metric:
          type: string
        operator:
          type: string
          enum: [gt, gte, lt, lte, eq, neq, above_rate, below_rate]
        threshold:
          type: number
        duration:
          type: string
        condition:
          type: string

    AlertAction:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [notify, escalate, trigger_workflow, auto_remediation]
        parameters:
          type: object

    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        uptime_seconds:
          type: integer
        components:
          type: object
          additionalProperties:
            type: string
            enum: [healthy, degraded, unhealthy]
        last_check:
          type: string
          format: date-time

    TelemetryStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        ingestion_rate:
          type: integer
        storage_usage_percent:
          type: number
        active_dashboards:
          type: integer
        active_alerts:
          type: integer
        last_ingestion:
          type: string
          format: date-time
        queue_depth:
          type: integer
