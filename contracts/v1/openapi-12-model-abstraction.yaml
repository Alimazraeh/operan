openapi: "3.0.3"
info:
  title: Operan Model Abstraction & Routing API
  description: Model provider management, health monitoring, and routing decisions. Module 12.
  version: 1.0.0
  contact:
    name: Platform Architecture
    email: arch@operan.io

servers:
  - url: https://api.operan.io/v1/models
    description: Production
  - url: https://api-staging.operan.io/v1/models
    description: Staging

security:
  - BearerAuth: []
  - TenantHeader: []

paths:
  /provision:
    post:
      operationId: provisionModel
      summary: Register or provision a new model provider
      tags: [Providers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelProvisionRequest'
      responses:
        '201':
          description: Model provisioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProvider'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /:
    get:
      operationId: listModels
      summary: List configured model providers
      tags: [Providers]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/TenantIdParam'
        - name: provider
          in: query
          required: false
          description: Filter by provider
          schema:
            type: string
            enum: [openai, azure, google, aws, local, anthropic, ollama]
        - name: tier
          in: query
          required: false
          description: Filter by tier
          schema:
            type: string
            enum: [standard, premium, experimental]
        - name: status
          in: query
          required: false
          description: Filter by status
          schema:
            type: string
            enum: [active, inactive, deprecated]
      responses:
        '200':
          description: Model provider list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProviderList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the model provider
        schema:
          type: string
          format: uuid
    get:
      operationId: getModel
      summary: Get model provider details
      tags: [Providers]
      responses:
        '200':
          description: Model provider details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProvider'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: updateModel
      summary: Update model provider configuration
      tags: [Providers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelUpdateRequest'
      responses:
        '200':
          description: Model updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProvider'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteModel
      summary: Remove a model provider
      tags: [Providers]
      responses:
        '204':
          description: Model removed
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{id}/health:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the model provider
        schema:
          type: string
          format: uuid
    get:
      operationId: getModelHealth
      summary: Get health status of a model provider
      tags: [Health]
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelHealth'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /calls:
    get:
      operationId: listModelCalls
      summary: List model API calls
      tags: [Calls]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/TenantIdParam'
        - name: model_id
          in: query
          required: false
          description: Filter by model ID
          schema:
            type: string
            format: uuid
        - name: provider
          in: query
          required: false
          description: Filter by provider
          schema:
            type: string
            enum: [openai, azure, google, aws, local, anthropic, ollama]
        - name: status
          in: query
          required: false
          description: Filter by call status
          schema:
            type: string
            enum: [success, failed]
        - name: agent_id
          in: query
          required: false
          description: Filter by agent ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Call list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelCallList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cost:
    get:
      operationId: getModelCost
      summary: Get cost summary for model calls
      tags: [Cost]
      parameters:
        - $ref: '#/components/parameters/TenantIdParam'
        - name: provider
          in: query
          required: false
          description: Filter by provider
          schema:
            type: string
            enum: [openai, azure, google, aws, local, anthropic, ollama]
        - name: model_id
          in: query
          required: false
          description: Filter by model ID
          schema:
            type: string
            format: uuid
        - name: start
          in: query
          required: false
          description: Start of time period
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          description: End of time period
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Cost summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostSummary'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /capacity:
    get:
      operationId: getModelCapacity
      summary: Get current capacity across model providers
      tags: [Capacity]
      parameters:
        - $ref: '#/components/parameters/TenantIdParam'
        - name: provider
          in: query
          required: false
          description: Filter by provider
          schema:
            type: string
            enum: [openai, azure, google, aws, local, anthropic, ollama]
      responses:
        '200':
          description: Capacity summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacitySummary'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /route:
    post:
      operationId: getRoutingDecision
      summary: Get a routing decision for a request
      tags: [Routing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoutingRequest'
      responses:
        '200':
          description: Routing decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutingDecision'
        '400':
          description: Invalid routing request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /routing-decisions:
    get:
      operationId: listRoutingDecisions
      summary: List historical routing decisions
      tags: [Routing]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/TenantIdParam'
        - name: selected_model_id
          in: query
          required: false
          description: Filter by selected model ID
          schema:
            type: string
            format: uuid
        - name: fallback_triggered
          in: query
          required: false
          description: Filter by whether fallback was triggered
          schema:
            type: boolean
      responses:
        '200':
          description: Decision list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutingDecisionList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{id}/token-usage:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the model provider
        schema:
          type: string
          format: uuid
    get:
      operationId: getModelTokenUsage
      summary: Get token usage for a model
      tags: [Usage]
      parameters:
        - name: period
          in: query
          required: false
          description: Aggregation period
          schema:
            type: string
            enum: [hour, day, week, month]
            default: day
      responses:
        '200':
          description: Token usage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenUsage'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token with tenant-scoped claims
    TenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier header required on every request

  parameters:
    TenantIdPath:
      name: id
      in: path
      required: true
      description: UUID of the tenant
      schema:
        type: string
        format: uuid
    TenantIdParam:
      name: tenant_id
      in: query
      required: true
      description: UUID of the tenant
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    ModelProvisionRequest:
      type: object
      required: [tenant_id, provider, model_name]
      properties:
        tenant_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [openai, azure, google, aws, local, anthropic, ollama]
        model_name:
          type: string
        capabilities:
          type: array
          items:
            type: string
        tier:
          type: string
          enum: [standard, premium, experimental]
        cost_per_token:
          $ref: '#/components/schemas/CostPerToken'
        rate_limit:
          $ref: '#/components/schemas/RateLimit'
        max_context_length:
          type: integer
        api_key_ref:
          type: string
          description: Reference to stored API credentials
      additionalProperties: false

    ModelUpdateRequest:
      type: object
      properties:
        tier:
          type: string
          enum: [standard, premium, experimental]
        status:
          type: string
          enum: [active, inactive, deprecated]
        cost_per_token:
          $ref: '#/components/schemas/CostPerToken'
        rate_limit:
          $ref: '#/components/schemas/RateLimit'
        capabilities:
          type: array
          items:
            type: string
      additionalProperties: false

    ModelProvider:
      type: object
      required: [id, tenant_id, provider, model_name]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [openai, azure, google, aws, local, anthropic, ollama]
        model_name:
          type: string
        capabilities:
          type: array
          items:
            type: string
        tier:
          type: string
          enum: [standard, premium, experimental]
        status:
          type: string
          enum: [active, inactive, deprecated]
        cost_per_token:
          $ref: '#/components/schemas/CostPerToken'
        rate_limit:
          $ref: '#/components/schemas/RateLimit'
        max_context_length:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    ModelProviderList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ModelProvider'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    ModelCall:
      type: object
      required: [id, tenant_id, model_id, provider, status, timestamp]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        model_id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [openai, azure, google, aws, local, anthropic, ollama]
        status:
          type: string
          enum: [success, failed]
        agent_id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        latency_ms:
          type: integer
        cost:
          $ref: '#/components/schemas/CostPerCall'
        error_message:
          oneOf:
            - type: string
            - type: 'null'
        timestamp:
          type: string
          format: date-time
      additionalProperties: false

    ModelCallList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ModelCall'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    RoutingDecision:
      type: object
      required: [id, tenant_id, selected_model_id, reason, timestamp]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        selected_model_id:
          type: string
          format: uuid
        reason:
          type: string
        timestamp:
          type: string
          format: date-time
        candidate_models:
          type: array
          items:
            type: string
            format: uuid
        fallback_triggered:
          type: boolean
        selection_criteria:
          type: object
        latency_ms:
          type: integer
        cost:
          $ref: '#/components/schemas/CostPerCall'
      additionalProperties: false

    RoutingDecisionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RoutingDecision'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    RoutingRequest:
      type: object
      required: [tenant_id, request_type]
      properties:
        tenant_id:
          type: string
          format: uuid
        request_type:
          type: string
          enum: [chat, completion, embedding, image]
        priority:
          type: string
          enum: [low, normal, high]
        max_latency_ms:
          type: integer
        max_cost:
          type: number
        fallback_enabled:
          type: boolean
          default: true
      additionalProperties: false

    ModelHealth:
      type: object
      required: [model_id, tenant_id, status, timestamp]
      properties:
        model_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        current_capacity:
          type: integer
        max_capacity:
          type: integer
        utilization:
          type: number
        error_rate:
          type: number
          minimum: 0
          maximum: 1
        avg_latency_ms:
          type: integer
      additionalProperties: false

    CostPerToken:
      type: object
      properties:
        prompt:
          type: number
        completion:
          type: number
        currency:
          type: string
      additionalProperties: false

    CostPerCall:
      type: object
      required: [currency, amount]
      properties:
        currency:
          type: string
        amount:
          type: number
      additionalProperties: false

    RateLimit:
      type: object
      properties:
        max_requests_per_minute:
          type: integer
        max_tokens_per_minute:
          type: integer
      additionalProperties: false

    CostSummary:
      type: object
      properties:
        total_cost:
          $ref: '#/components/schemas/CostPerCall'
        total_calls:
          type: integer
        total_tokens:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
          additionalProperties: false
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
          additionalProperties: false
      additionalProperties: false

    CapacitySummary:
      type: object
      properties:
        provider:
          type: string
        total_capacity:
          type: integer
        current_load:
          type: integer
        utilization_percent:
          type: number
      additionalProperties: false

    TokenUsage:
      type: object
      properties:
        model_id:
          type: string
          format: uuid
        period:
          type: string
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        total_tokens:
          type: integer
        breakdown:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date-time
              input_tokens:
                type: integer
              output_tokens:
                type: integer
            additionalProperties: false
      additionalProperties: false

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string
        request_id:
          type: string
          format: uuid
      required:
        - code
        - message
        - request_id

    ErrorList:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
      required:
        - errors
