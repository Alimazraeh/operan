openapi: 3.0.3
info:
  title: Operan Workflow Orchestration API
  description: Pipeline design, execution, state machine, scheduling, human-in-the-loop, error handling, and workflow analytics. Module 13.
  version: 1.0.0

servers:
  - url: /api/v1/workflows

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /pipelines:
    post:
      summary: Create a workflow pipeline
      operationId: createPipeline
      tags: [pipelines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePipelineRequest'
      responses:
        '201':
          description: Pipeline created

    get:
      summary: List pipelines
      operationId: listPipelines
      tags: [pipelines]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, archived]
      responses:
        '200':
          description: Pipeline list

  /pipelines/{id}:
    get:
      summary: Get pipeline details
      operationId: getPipeline
      tags: [pipelines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pipeline details

    patch:
      summary: Update pipeline
      operationId: updatePipeline
      tags: [pipelines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePipelineRequest'
      responses:
        '200':
          description: Pipeline updated

    delete:
      summary: Delete pipeline
      operationId: deletePipeline
      tags: [pipelines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Pipeline deleted

  /pipelines/{id}/activate:
    post:
      summary: Activate a pipeline
      operationId: activatePipeline
      tags: [pipelines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Pipeline activated

  /pipelines/{id}/deactivate:
    post:
      summary: Deactivate a pipeline
      operationId: deactivatePipeline
      tags: [pipelines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Pipeline deactivated

  /pipelines/{id}/execute:
    post:
      summary: Execute a pipeline with inputs
      operationId: executePipeline
      tags: [executions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutePipelineRequest'
      responses:
        '202':
          description: Pipeline execution started

  /pipelines/{id}/executions:
    get:
      summary: List pipeline executions
      operationId: listPipelineExecutions
      tags: [executions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed, cancelled, retrying]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Execution list

  /executions/{execution_id}:
    get:
      summary: Get execution details
      operationId: getExecutionDetails
      tags: [executions]
      parameters:
        - name: execution_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Execution details

  /executions/{execution_id}/cancel:
    post:
      summary: Cancel a pipeline execution
      operationId: cancelExecution
      tags: [executions]
      parameters:
        - name: execution_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Execution cancelled

  /executions/{execution_id}/retry:
    post:
      summary: Retry a failed execution
      operationId: retryExecution
      tags: [executions]
      parameters:
        - name: execution_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Retry initiated

  /executions/{execution_id}/steps:
    get:
      summary: Get execution steps
      operationId: getExecutionSteps
      tags: [executions]
      parameters:
        - name: execution_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Step list

  /schedules:
    post:
      summary: Create a pipeline schedule
      operationId: createSchedule
      tags: [schedules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScheduleRequest'
      responses:
        '201':
          description: Schedule created

    get:
      summary: List schedules
      operationId: listSchedules
      tags: [schedules]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Schedule list

  /schedules/{id}:
    patch:
      summary: Update schedule
      operationId: updateSchedule
      tags: [schedules]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScheduleRequest'
      responses:
        '200':
          description: Schedule updated

    delete:
      summary: Delete schedule
      operationId: deleteSchedule
      tags: [schedules]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Schedule deleted

  /human-tasks:
    post:
      summary: Create a human-in-the-loop task
      operationId: createHumanTask
      tags: [human-tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHumanTaskRequest'
      responses:
        '201':
          description: Task created

    get:
      summary: List human tasks
      operationId: listHumanTasks
      tags: [human-tasks]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, timeout]
      responses:
        '200':
          description: Task list

  /human-tasks/{task_id}/respond:
    post:
      summary: Respond to a human task
      operationId: respondHumanTask
      tags: [human-tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RespondHumanTaskRequest'
      responses:
        '200':
          description: Task responded

  /analytics:
    get:
      summary: Get pipeline analytics
      operationId: getPipelineAnalytics
      tags: [analytics]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: pipeline_id
          in: query
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Analytics data

  /health:
    get:
      summary: Service health check
      operationId: healthCheck
      tags: [health]
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    CreatePipelineRequest:
      type: object
      required:
        - tenant_id
        - name
        - steps
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PipelineStep'
        error_handling:
          $ref: '#/components/schemas/ErrorHandlingConfig'
        timeout_minutes:
          type: integer
        max_retries:
          type: integer
          default: 3
        trigger_type:
          type: string
          enum: [manual, event, schedule, webhook, api]
        variables:
          type: object
        tags:
          type: array
          items:
            type: string

    PipelineStep:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [api_call, agent_task, data_transform, condition, delay, human_approval, parallel, foreach, webhook, code, notification]
        inputs:
          type: object
        config:
          type: object
        condition:
          type: string
          description: Expression for conditional execution
        timeout_seconds:
          type: integer
        on_error:
          type: string
          enum: [fail, retry, skip, branch]
        next_step_id:
          type: string
          format: uuid
        parallel_branches:
          type: integer
          default: 1

    ErrorHandlingConfig:
      type: object
      properties:
        default_strategy:
          type: string
          enum: [fail, retry, skip, abort]
        retry_max_attempts:
          type: integer
          default: 3
        retry_backoff:
          type: string
          enum: [fixed, exponential, linear]
        retry_base_delay_ms:
          type: integer
          default: 1000
        dead_letter_enabled:
          type: boolean
          default: true
        alert_on_failure:
          type: boolean
          default: true

    UpdatePipelineRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PipelineStep'
        error_handling:
          $ref: '#/components/schemas/ErrorHandlingConfig'
        timeout_minutes:
          type: integer
        max_retries:
          type: integer
        status:
          type: string
          enum: [active, inactive, archived]
        variables:
          type: object

    ExecutePipelineRequest:
      type: object
      required:
        - inputs
      properties:
        inputs:
          type: object
        variables:
          type: object
        execute_immediately:
          type: boolean
          default: true

    Pipeline:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PipelineStep'
        error_handling:
          $ref: '#/components/schemas/ErrorHandlingConfig'
        timeout_minutes:
          type: integer
        max_retries:
          type: integer
        trigger_type:
          type: string
          enum: [manual, event, schedule, webhook, api]
        variables:
          type: object
        status:
          type: string
          enum: [active, inactive, archived]
        execution_count:
          type: integer
        last_execution_at:
          type: string
          format: date-time
        success_rate:
          type: number
        avg_duration_ms:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string

    Execution:
      type: object
      required:
        - id
        - pipeline_id
        - status
      properties:
        id:
          type: string
          format: uuid
        pipeline_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled, retrying]
        inputs:
          type: object
        outputs:
          type: object
        current_step_id:
          type: string
          format: uuid
        current_step_status:
          type: string
        error_message:
          type: string
        retry_count:
          type: integer
        duration_ms:
          type: number
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    ExecutionStep:
      type: object
      required:
        - id
        - execution_id
        - status
      properties:
        id:
          type: string
          format: uuid
        execution_id:
          type: string
          format: uuid
        step_id:
          type: string
          format: uuid
        step_name:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, skipped, cancelled]
        inputs:
          type: object
        outputs:
          type: object
        error_message:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        duration_ms:
          type: number

    CreateScheduleRequest:
      type: object
      required:
        - tenant_id
        - pipeline_id
        - cron
      properties:
        tenant_id:
          type: string
          format: uuid
        pipeline_id:
          type: string
          format: uuid
        cron:
          type: string
        name:
          type: string
        description:
          type: string
        inputs:
          type: object
        timezone:
          type: string
          default: UTC
        enabled:
          type: boolean
          default: true
        max_concurrent_runs:
          type: integer
          default: 1

    UpdateScheduleRequest:
      type: object
      properties:
        cron:
          type: string
        name:
          type: string
        inputs:
          type: object
        timezone:
          type: string
        enabled:
          type: boolean
        max_concurrent_runs:
          type: integer

    Schedule:
      type: object
      required:
        - id
        - pipeline_id
        - cron
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        pipeline_id:
          type: string
          format: uuid
        cron:
          type: string
        name:
          type: string
        description:
          type: string
        inputs:
          type: object
        timezone:
          type: string
        enabled:
          type: boolean
        max_concurrent_runs:
          type: integer
        last_run_at:
          type: string
          format: date-time
        next_run_at:
          type: string
          format: date-time
        run_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateHumanTaskRequest:
      type: object
      required:
        - tenant_id
        - pipeline_execution_id
        - assignee_type
        - assignee_id
        - task_type
        - instructions
      properties:
        tenant_id:
          type: string
          format: uuid
        pipeline_execution_id:
          type: string
          format: uuid
        step_id:
          type: string
          format: uuid
        assignee_type:
          type: string
          enum: [user, role, group, agent]
        assignee_id:
          type: string
          format: uuid
        task_type:
          type: string
          enum: [approval, rejection, input, review, confirmation]
        instructions:
          type: string
        context:
          type: object
        timeout_minutes:
          type: integer
          default: 1440
        label:
          type: string
        priority:
          type: string
          enum: [low, normal, high, urgent]

    HumanTask:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        pipeline_execution_id:
          type: string
          format: uuid
        step_id:
          type: string
          format: uuid
        assignee_type:
          type: string
          enum: [user, role, group, agent]
        assignee_id:
          type: string
          format: uuid
        task_type:
          type: string
          enum: [approval, rejection, input, review, confirmation]
        instructions:
          type: string
        context:
          type: object
        timeout_minutes:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected, timeout, cancelled]
        label:
          type: string
        priority:
          type: string
          enum: [low, normal, high, urgent]
        response:
          type: object
        responded_by:
          type: string
          format: uuid
        responded_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    RespondHumanTaskRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [approve, reject, request_info]
        response:
          type: object
        comments:
          type: string

    PipelineAnalytics:
      type: object
      required:
        - total_executions
        - success_rate
      properties:
        total_executions:
          type: integer
        completed_executions:
          type: integer
        failed_executions:
          type: integer
        cancelled_executions:
          type: integer
        success_rate:
          type: number
        avg_duration_ms:
          type: number
        p50_duration_ms:
          type: number
        p95_duration_ms:
          type: number
        p99_duration_ms:
          type: number
        total_retries:
          type: integer
        peak_executions_per_hour:
          type: integer
        step_metrics:
          type: array
          items:
            type: object

    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        uptime_seconds:
          type: integer
        active_executions:
          type: integer
        pending_tasks:
          type: integer
        active_schedules:
          type: integer
        failed_executions_24h:
          type: integer
        last_check:
          type: string
          format: date-time
