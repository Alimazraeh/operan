openapi: 3.0.3
info:
  title: Operan Knowledge Ingestion Pipeline API
  description: Transform enterprise data into operational memory. Ingestion, OCR, parsing, chunking, classification, ontology mapping, entity extraction, embedding, indexing, and graph construction. Module 06.
  version: 1.0.0

servers:
  - url: /api/v1/ingestion

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /sources:
    post:
      summary: Register a data source
      operationId: registerSource
      tags: [sources]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSourceRequest'
      responses:
        '201':
          description: Source registered

    get:
      summary: List data sources
      operationId: listSources
      tags: [sources]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: source_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Source list

  /sources/{id}:
    delete:
      summary: Remove a data source
      operationId: deleteSource
      tags: [sources]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Source removed

  /sources/{id}/test-connection:
    post:
      summary: Test data source connection
      operationId: testSourceConnection
      tags: [sources]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionTestResult'

  /pipelines:
    post:
      summary: Start an ingestion pipeline
      operationId: startPipeline
      tags: [pipelines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartPipelineRequest'
      responses:
        '202':
          description: Pipeline started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'

    get:
      summary: List pipelines
      operationId: listPipelines
      tags: [pipelines]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed, paused]
      responses:
        '200':
          description: Pipeline list

  /pipelines/{id}:
    get:
      summary: Get pipeline status
      operationId: getPipeline
      tags: [pipelines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pipeline details

  /pipelines/{id}/pause:
    post:
      summary: Pause pipeline
      operationId: pausePipeline
      tags: [pipelines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pipeline paused

  /pipelines/{id}/resume:
    post:
      summary: Resume pipeline
      operationId: resumePipeline
      tags: [pipelines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Pipeline resumed

  /pipelines/{id}/stages:
    get:
      summary: Get pipeline stage progress
      operationId: getPipelineStages
      tags: [pipelines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Stage progress

  /ingest/upload:
    post:
      summary: Upload documents for ingestion
      operationId: uploadDocuments
      tags: [upload]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
                - tenant_id
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                tenant_id:
                  type: string
                source_id:
                  type: string
                  format: uuid
                pipeline_config:
                  type: object
      responses:
        '202':
          description: Documents queued for ingestion

  /documents/{id}/lineage:
    get:
      summary: Get document lineage
      operationId: getDocumentLineage
      tags: [lineage]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document lineage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentLineage'

  /documents/{id}/version-history:
    get:
      summary: Get document version history
      operationId: getDocumentVersionHistory
      tags: [versions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Version history

  /documents/{id}/dedup-check:
    get:
      summary: Check for semantic duplicates
      operationId: checkDeduplication
      tags: [deduplication]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: threshold
          in: query
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 1
            default: 0.95
      responses:
        '200':
          description: Deduplication results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DedupResult'

  /languages:
    get:
      summary: Get supported languages
      operationId: supportedLanguages
      tags: [languages]
      responses:
        '200':
          description: Supported languages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LanguageList'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    RegisterSourceRequest:
      type: object
      required:
        - tenant_id
        - name
        - source_type
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        source_type:
          type: string
          enum:
            - pdf
            - sharepoint
            - sap
            - oracle
            - email
            - database
            - api
            - confluence
            - jira
            - crm
            - document_repository
        configuration:
          type: object
          description: Source-specific connection details

    ConnectionTestResult:
      type: object
      required:
        - connected
      properties:
        connected:
          type: boolean
        message:
          type: string
        details:
          type: object

    StartPipelineRequest:
      type: object
      required:
        - tenant_id
        - name
        - source_ids
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        source_ids:
          type: array
          items:
            type: string
            format: uuid
        pipeline_config:
          $ref: '#/components/schemas/PipelineConfig'
        schedule:
          type: string
          description: Cron expression for recurring ingestion

    PipelineConfig:
      type: object
      properties:
        languages:
          type: array
          items:
            type: string
        enable_ocr:
          type: boolean
          default: true
        enable_entity_extraction:
          type: boolean
          default: true
        enable_ontology_mapping:
          type: boolean
          default: true
        chunk_size:
          type: integer
          default: 512
        chunk_overlap:
          type: integer
          default: 50
        embedding_model:
          type: string
        dedup_threshold:
          type: number
          format: float
          default: 0.95

    Pipeline:
      type: object
      required:
        - id
        - tenant_id
        - name
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        source_ids:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed, paused]
        progress:
          type: object
          properties:
            total_documents:
              type: integer
            processed_documents:
              type: integer
            current_stage:
              type: string
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    DocumentLineage:
      type: object
      required:
        - document_id
        - source_id
        - ingested_at
      properties:
        document_id:
          type: string
          format: uuid
        source_id:
          type: string
          format: uuid
        original_path:
          type: string
        ingested_at:
          type: string
          format: date-time
        stages:
          type: array
          items:
            $ref: '#/components/schemas/LineageStage'
        parent_documents:
          type: array
          items:
            type: string
            format: uuid

    LineageStage:
      type: object
      required:
        - stage
        - timestamp
      properties:
        stage:
          type: string
          enum:
            - ingestion
            - ocr
            - parsing
            - chunking
            - classification
            - ontology_mapping
            - entity_extraction
            - embedding
            - indexing
            - graph_construction
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, running, completed, failed]
        details:
          type: object

    DedupResult:
      type: object
      properties:
        document_id:
          type: string
          format: uuid
        similar_documents:
          type: array
          items:
            $ref: '#/components/schemas/SimilarDocument'

    SimilarDocument:
      type: object
      required:
        - document_id
        - similarity
      properties:
        document_id:
          type: string
          format: uuid
        similarity:
          type: number
          format: float
        overlap_type:
          type: string
          enum: [exact, semantic, partial]

    LanguageList:
      type: object
      properties:
        languages:
          type: array
          items:
            $ref: '#/components/schemas/SupportedLanguage'
        arabic_supported:
          type: boolean
        dialects_supported:
          type: array
          items:
            type: string

    SupportedLanguage:
      type: object
      required:
        - code
        - name
      properties:
        code:
          type: string
        name:
          type: string
        ocr_supported:
          type: boolean
        nlp_supported:
          type: boolean
        embedding_available:
          type: boolean
