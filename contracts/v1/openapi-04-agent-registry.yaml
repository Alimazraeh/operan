openapi: "3.0.3"
info:
  title: Operan Agent Registry API
  description: Central registry for reusable, versioned agents with capability indexing, permissions, and dependency management. Module 04.
  version: 1.0.0
  contact:
    name: Platform Architecture

servers:
  - url: https://api.operan.io/v1
    description: Production
  - url: https://api-staging.operan.io/v1
    description: Staging

security:
  - BearerAuth: []
  - TenantHeader: []

tags:
  - name: agents
    description: Agent lifecycle management
  - name: versions
    description: Agent versioning and promotion
  - name: capabilities
    description: Capability indexing and search
  - name: dependencies
    description: Agent dependency management

paths:
  /agents:
    get:
      tags: [agents]
      operationId: listAgents
      summary: List agents with filtering
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: role
          in: query
          schema: { type: string }
        - name: capability
          in: query
          schema: { type: string }
        - name: department_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [active, inactive, deprecated, archived] }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Agent listing
          content: { application/json: { schema: { $ref: '#/components/schemas/AgentListResponse' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
    post:
      tags: [agents]
      operationId: createAgent
      summary: Register a new agent
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateAgentRequest' } } }
      responses:
        '201':
          description: Agent created
          content: { application/json: { schema: { $ref: '#/components/schemas/Agent' } } }
        '400': { $ref: '#/components/responses/ErrorResponse400' }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }

  /agents/{agent_id}:
    get:
      tags: [agents]
      operationId: getAgent
      summary: Get agent by ID
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Agent details
          content: { application/json: { schema: { $ref: '#/components/schemas/Agent' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }
    patch:
      tags: [agents]
      operationId: updateAgent
      summary: Update agent metadata
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateAgentRequest' } } }
      responses:
        '200':
          description: Agent updated
          content: { application/json: { schema: { $ref: '#/components/schemas/Agent' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }
    delete:
      tags: [agents]
      operationId: deleteAgent
      summary: Deprecate an agent
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Agent deprecated
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }

  /agents/{agent_id}/capabilities:
    get:
      tags: [capabilities]
      operationId: listAgentCapabilities
      summary: List agent capabilities with scores
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Agent capabilities
          content: { application/json: { schema: { $ref: '#/components/schemas/CapabilityList' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }
    patch:
      tags: [capabilities]
      operationId: updateAgentCapabilities
      summary: Update agent capabilities
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CapabilityUpdate' } } }
      responses:
        '200':
          description: Capabilities updated
          content: { application/json: { schema: { $ref: '#/components/schemas/CapabilityList' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }

  /agents/{agent_id}/capabilities/index:
    post:
      tags: [capabilities]
      operationId: indexCapabilities
      summary: Full re-index of agent capabilities
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202':
          description: Indexing started
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }

  /agents/{agent_id}/versions:
    get:
      tags: [versions]
      operationId: listAgentVersions
      summary: List agent versions
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [active, beta, deprecated, archived] }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Version list
          content: { application/json: { schema: { $ref: '#/components/schemas/VersionList' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }
    post:
      tags: [versions]
      operationId: createAgentVersion
      summary: Create a new agent version
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateVersionRequest' } } }
      responses:
        '201':
          description: Version created
          content: { application/json: { schema: { $ref: '#/components/schemas/AgentVersion' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }

  /agents/{agent_id}/versions/{version_id}:
    get:
      tags: [versions]
      operationId: getAgentVersion
      summary: Get agent version details
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Version details
          content: { application/json: { schema: { $ref: '#/components/schemas/AgentVersion' } } }
        '404': { $ref: '#/components/responses/ErrorResponse404' }
    patch:
      tags: [versions]
      operationId: updateAgentVersion
      summary: Update version metadata
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/UpdateVersionRequest' } } }
      responses:
        '200':
          description: Version updated
          content: { application/json: { schema: { $ref: '#/components/schemas/AgentVersion' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }

  /agents/{agent_id}/versions/{version_id}/promote:
    post:
      tags: [versions]
      operationId: promoteVersion
      summary: Promote a version to a target environment
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: version_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/PromoteVersionRequest' } } }
      responses:
        '200':
          description: Version promoted
          content: { application/json: { schema: { $ref: '#/components/schemas/AgentVersion' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }

  /agents/{agent_id}/dependencies:
    get:
      tags: [dependencies]
      operationId: listDependencies
      summary: List agent dependencies
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Dependencies
          content: { application/json: { schema: { $ref: '#/components/schemas/DependencyList' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }
    post:
      tags: [dependencies]
      operationId: addDependency
      summary: Add an agent dependency
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/DependencyRequest' } } }
      responses:
        '201':
          description: Dependency added
          content: { application/json: { schema: { $ref: '#/components/schemas/Dependency' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }
    delete:
      tags: [dependencies]
      operationId: removeDependency
      summary: Remove an agent dependency
      parameters:
        - name: agent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: dependency_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Dependency removed
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }
        '404': { $ref: '#/components/responses/ErrorResponse404' }

  /agents/search:
    post:
      tags: [agents]
      operationId: searchAgents
      summary: Search agents by capabilities, constraints, or metadata
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/AgentSearchRequest' } } }
      responses:
        '200':
          description: Search results
          content: { application/json: { schema: { $ref: '#/components/schemas/AgentSearchResponse' } } }
        '401': { $ref: '#/components/responses/ErrorResponse401' }
        '403': { $ref: '#/components/responses/ErrorResponse403' }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    TenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID

  schemas:
    AgentStatus:
      type: string
      description: Lifecycle status of the agent. Enum values are harmonized across OpenAPI, JSON Schema, and AsyncAPI contracts.
      enum: [active, inactive, deprecated, archived]

    VersionStatus:
      type: string
      description: Lifecycle status of an agent version. Enum values are harmonized across OpenAPI, JSON Schema, and AsyncAPI contracts.
      enum: [active, beta, deprecated, archived]

    DependencyType:
      type: string
      description: Nature of the dependency relationship. Enum values are harmonized across OpenAPI, JSON Schema, and AsyncAPI contracts.
      enum: [hard, soft, optional]

    Objective:
      type: object
      description: A specific objective for an agent, as defined in PRD Section 8 (Agent Object Model).
      required: [description, metric, tier]
      properties:
        description:
          type: string
          description: Human-readable description of the objective.
        metric:
          type: string
          description: Key performance indicator or measurable success criterion for this objective.
        weight:
          type: number
          minimum: 0
          maximum: 1
          description: Relative importance weight (0.0 to 1.0). Defaults to 0.5 if omitted.
        tier:
          $ref: '#/components/schemas/CapabilityTier'
          description: The autonomy tier this objective operates within.

    CapabilityTier:
      type: string
      description: Agent capability autonomy tier per PRD Section 4.3 (Human-Governed Autonomy).
      enum: [recommend, analyze, coordinate, draft, execute]

    ExecutionBudget:
      type: object
      description: Execution budget constraints for the agent, as defined in PRD Section 8 (Agent Object Model).
      properties:
        daily_token_limit:
          type: integer
          minimum: 0
          description: Maximum tokens the agent may consume per day.
        max_run_seconds:
          type: integer
          minimum: 1
          description: Maximum duration for a single execution run in seconds.
        monthly_execution_cap:
          type: integer
          minimum: 0
          description: Maximum number of executions per month.
        monthly_budget_usd:
          type: number
          minimum: 0
          description: Hard budget ceiling in USD per month.

    MemoryAccess:
      type: object
      description: Configuration for the agent's memory access permissions. Unified structured type across all contracts.
      properties:
        scope:
          type: string
          enum: [read, write, read_write]
          description: Access level for the agent's memory stores.
        isolated_stores:
          type: array
          items: { type: string }
          description: Memory stores isolated from other agents.
        allowed_types:
          type: array
          items: { type: string, enum: [episodic, semantic, procedural, graph, institutional] }
          description: Types of memory the agent may access.
        isolation_level:
          type: string
          enum: [logical, data, cryptographic, execution]
          description: Isolation level per PRD Section 9 (Multi-Tenant Isolation Model).

    CostProfile:
      type: object
      description: Cost and budget parameters for an agent. Expanded to match PRD Module 17 (Cost Governance Engine).
      properties:
        cost_per_execution:
          type: number
          minimum: 0
          description: Fixed cost incurred each time the agent is executed.
        cost_per_token:
          type: number
          minimum: 0
          description: Variable cost per token consumed.
        estimated_monthly_cost:
          type: number
          minimum: 0
          description: Estimated monthly cost based on projected usage.
        budget_limit:
          type: integer
          minimum: 0
          description: Maximum budget limit for the agent.
        throttle_threshold:
          type: number
          minimum: 0
          maximum: 1
          description: Threshold (0.0 to 1.0) at which the agent should be throttled.
        billing_tag:
          type: string
          description: Tag used for billing allocation.

    RuntimeConstraints:
      type: object
      properties:
        max_concurrent:
          type: integer
          minimum: 1
          description: Maximum number of concurrent executions.
        max_duration_seconds:
          type: integer
          minimum: 1
          description: Maximum duration for a single execution run.
        rate_limit_per_minute:
          type: integer
          minimum: 1
          description: Maximum requests per minute.
        resource_quota:
          type: object
          properties:
            cpu_millicores:
              type: integer
              description: CPU allocation in millicores.
            memory_mb:
              type: integer
              description: Memory allocation in megabytes.
            gpu:
              type: boolean
              description: Whether GPU access is granted.

    Agent:
      type: object
      description: A registered AI agent within the Operan platform. Fields objectives and execution_budget are PRD Section 8 Agent Object Model requirements.
      required: [id, name, role, tenant_id, status, capabilities, tools, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the agent.
        name:
          type: string
          maxLength: 200
          description: Human-readable name of the agent.
        role:
          type: string
          description: The functional role the agent fills within the platform.
        description:
          type: string
          description: Additional description of the agent's purpose.
        version:
          type: string
          description: Current agent version string.
        created_by:
          type: string
          format: uuid
          description: UUID of the user or system that created the agent.
        dependencies:
          type: array
          description: List of agent UUIDs this agent depends on.
          items: { type: string, format: uuid }
        tenant_id:
          type: string
          format: uuid
          description: UUID of the tenant that owns this agent.
        department_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the department this agent belongs to (Module 05). Optional.
        status:
          $ref: '#/components/schemas/AgentStatus'
        current_version_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the current active version.
        objectives:
          type: array
          description: Agent objectives as defined in PRD Section 8 (Agent Object Model).
          items:
            $ref: '#/components/schemas/Objective'
        capabilities:
          type: array
          description: List of capability identifiers the agent provides.
          items: { type: string }
        tools:
          type: array
          description: List of tool identifiers the agent can invoke.
          items: { type: string }
        memory_access:
          $ref: '#/components/schemas/MemoryAccess'
        escalation_rules:
          type: array
          description: Rules governing when and how the agent escalates tasks.
          items: { type: string }
        governance_policies:
          type: array
          description: Governance policies that apply to this agent.
          items: { type: string }
        supported_languages:
          type: array
          description: Languages the agent supports (Module 19 - Arabic Language Intelligence).
          items: { type: string }
        runtime_constraints:
          $ref: '#/components/schemas/RuntimeConstraints'
        cost_profile:
          $ref: '#/components/schemas/CostProfile'
        execution_budget:
          $ref: '#/components/schemas/ExecutionBudget'
        access_control:
          type: object
          description: Access control configuration for this agent.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the agent was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the agent was last updated.

    CreateAgentRequest:
      type: object
      description: Request payload for creating a new agent.
      required: [name, role, tenant_id]
      properties:
        name:
          type: string
          maxLength: 200
          description: Human-readable name of the agent.
        role:
          type: string
          description: The functional role the agent will fill.
        description:
          type: string
          description: Additional description of the agent's purpose.
        tenant_id:
          type: string
          format: uuid
          description: UUID of the tenant that will own the agent.
        department_id:
          type: string
          format: uuid
          nullable: true
          description: UUID of the parent department (Module 05). Optional.
        objectives:
          type: array
          description: Agent objectives as defined in PRD Section 8.
          items:
            $ref: '#/components/schemas/Objective'
        capabilities:
          type: array
          description: List of capability identifiers the agent provides.
          items: { type: string }
        tools:
          type: array
          description: List of tool identifiers the agent can invoke.
          items: { type: string }
        memory_access:
          $ref: '#/components/schemas/MemoryAccess'
        escalation_rules:
          type: array
          items: { type: string }
        governance_policies:
          type: array
          items: { type: string }
        supported_languages:
          type: array
          description: Languages the agent supports (Module 19).
          items: { type: string }
        runtime_constraints:
          $ref: '#/components/schemas/RuntimeConstraints'
        cost_profile:
          $ref: '#/components/schemas/CostProfile'
        execution_budget:
          $ref: '#/components/schemas/ExecutionBudget'

    UpdateAgentRequest:
      type: object
      description: Request payload for updating an existing agent. All fields optional.
      properties:
        name:
          type: string
          maxLength: 200
        role:
          type: string
        description:
          type: string
        department_id:
          type: string
          format: uuid
          nullable: true
        objectives:
          type: array
          items:
            $ref: '#/components/schemas/Objective'
        capabilities:
          type: array
          items: { type: string }
        tools:
          type: array
          items: { type: string }
        memory_access:
          $ref: '#/components/schemas/MemoryAccess'
        escalation_rules:
          type: array
          items: { type: string }
        governance_policies:
          type: array
          items: { type: string }
        supported_languages:
          type: array
          items: { type: string }
        status:
          $ref: '#/components/schemas/AgentStatus'
        runtime_constraints:
          $ref: '#/components/schemas/RuntimeConstraints'
        cost_profile:
          $ref: '#/components/schemas/CostProfile'
        execution_budget:
          $ref: '#/components/schemas/ExecutionBudget'

    CapabilityEntry:
      type: object
      required: [capability, score]
      properties:
        capability:
          type: string
          description: Name of the capability.
        score:
          type: number
          minimum: 0
          maximum: 1
          description: Capability proficiency score (0.0 to 1.0).
        last_evaluated:
          type: string
          format: date-time
          description: Timestamp of last capability evaluation.
        tier:
          $ref: '#/components/schemas/CapabilityTier'
          description: Autonomy tier of this capability.

    CapabilityList:
      type: object
      required: [agent_id, capabilities]
      properties:
        agent_id:
          type: string
          format: uuid
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityEntry'

    CapabilityUpdate:
      type: object
      required: [capabilities]
      properties:
        capabilities:
          type: array
          items:
            type: object
            required: [capability, score]
            properties:
              capability: { type: string }
              score: { type: number, minimum: 0, maximum: 1 }
              tier:
                $ref: '#/components/schemas/CapabilityTier'

    AgentVersion:
      type: object
      description: Versioned snapshot of an agent's configuration.
      required: [id, agent_id, version, created_at]
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        version:
          type: string
          pattern: '^\\d+\\.\\d+\\.\\d+$'
          description: Semantic version of this agent configuration.
        status:
          $ref: '#/components/schemas/VersionStatus'
        model_config:
          type: object
          description: Model configuration for this version.
        prompt_template_ref:
          type: string
          description: Reference to the prompt template used.
        description:
          type: string
          description: Human-readable description of this version.
        change_summary:
          type: string
          description: Summary of changes in this version.
        diff_from_previous:
          type: string
          description: Detailed diff or description of changes from the previous version.
        created_by:
          type: string
          format: uuid
          description: UUID of the user or system that created this version.
        promoted_to:
          type: object
          additionalProperties:
            type: string
          description: Map of environment names to promoted version IDs. Matches Go AgentVersion.PromotedTo.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateVersionRequest:
      type: object
      required: [agent_id, version]
      properties:
        agent_id:
          type: string
          format: uuid
        version:
          type: string
          pattern: '^\\d+\\.\\d+\\.\\d+$'
        model_config:
          type: object
        prompt_template_ref:
          type: string
        description:
          type: string
        change_summary:
          type: string
          description: Summary of changes in this version.

    UpdateVersionRequest:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/VersionStatus'
        description:
          type: string
        change_summary:
          type: string

    PromoteVersionRequest:
      type: object
      required: [environment]
      properties:
        environment:
          type: string
          enum: [dev, staging, production]

    Dependency:
      type: object
      description: Describes a dependency relationship between two agents.
      required: [agent_id, dependency_id, dependency_type]
      properties:
        agent_id:
          type: string
          format: uuid
          description: UUID of the agent that has the dependency.
        dependency_id:
          type: string
          format: uuid
          description: UUID of the agent being depended upon.
        dependency_type:
          $ref: '#/components/schemas/DependencyType'
        version_constraint:
          type: string
          description: Version constraint for the dependency.
        description:
          type: string
          description: Description of this dependency.
        active:
          type: boolean
          description: Whether this dependency is currently active.
        created_at:
          type: string
          format: date-time

    DependencyList:
      type: object
      required: [dependencies]
      properties:
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/Dependency'

    DependencyRequest:
      type: object
      required: [dependency_id]
      properties:
        dependency_id:
          type: string
          format: uuid
          description: UUID of the agent being depended upon.
        dependency_type:
          $ref: '#/components/schemas/DependencyType'
        version_constraint:
          type: string
        description:
          type: string

    AgentListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean

    VersionList:
      type: object
      required: [agent_id, versions]
      properties:
        agent_id:
          type: string
          format: uuid
        versions:
          type: array
          items:
            $ref: '#/components/schemas/AgentVersion'

    AgentSearchRequest:
      type: object
      required: [tenant_id]
      properties:
