openapi: 3.0.3
info:
  title: Operan Identity & Access Management API
  description: Enterprise-grade authentication and authorization. Module 02.
  version: 1.0.0
  contact:
    name: Operan Platform Team

servers:
  - url: /api/v1/iam

security:
  - BearerAuth: []
    TenantHeader: []

paths:
  /users:
    post:
      summary: Create a new user
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              email: user@acme.corp
              display_name: "John Doe"
              roles: [department_admin]
              mfa_enabled: true
              ldap_dn: null
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request

  /users/{id}:
    get:
      summary: Get user by ID
      operationId: getUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    patch:
      summary: Update user
      operationId: updateUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated

    delete:
      summary: Deactivate user
      operationId: deactivateUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: User deactivated

  /users/{id}/roles:
    put:
      summary: Set user roles (replaces all)
      operationId: setUserRoles
      tags: [roles]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRolesRequest'
      responses:
        '200':
          description: Roles updated

  /roles:
    post:
      summary: Define a custom role
      operationId: createRole
      tags: [roles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Role created

  /roles/{id}:
    delete:
      summary: Delete a custom role
      operationId: deleteRole
      tags: [roles]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Role deleted

  /service-identities:
    post:
      summary: Create a service identity
      description: For non-human entities (agents, external systems, CI/CD).
      operationId: createServiceIdentity
      tags: [service-identities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceIdentityRequest'
      responses:
        '201':
          description: Service identity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceIdentity'

  /agent-identities:
    post:
      summary: Register an agent identity
      description: Registers an autonomous agent with its capability set and permission scope.
      operationId: registerAgentIdentity
      tags: [agent-identities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAgentIdentityRequest'
      responses:
        '201':
          description: Agent identity registered

  /auth/sso/configure:
    post:
      summary: Configure SSO provider
      operationId: configureSSO
      tags: [sso]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSOConfig'
      responses:
        '201':
          description: SSO configured

  /auth/sso/test:
    post:
      summary: Test SSO connection
      operationId: testSSO
      tags: [sso]
      responses:
        '200':
          description: SSO connection successful

  /scim/users:
    get:
      summary: SCIM user listing
      description: SCIM 2.0 compliant user provisioning endpoint.
      operationId: scimListUsers
      tags: [scim]
      parameters:
        - name: filter
          in: query
          schema:
            type: string
        - name: startIndex
          in: query
          schema:
            type: integer
        - name: count
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: SCIM user list

  /audit/trails:
    get:
      summary: Get audit trail entries
      operationId: getAuditTrails
      tags: [audit]
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: actor_id
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Audit trail entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
                  total:
                    type: integer

  /audit/session-replay/{session_id}:
    get:
      summary: Get session replay data
      operationId: getSessionReplay
      tags: [audit]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session replay data

  /rbac/evaluate:
    post:
      summary: Evaluate RBAC/ABAC policy
      description: Check if an actor has a specific permission. Supports attribute-based evaluation.
      operationId: evaluatePermission
      tags: [rbac]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionCheckRequest'
      responses:
        '200':
          description: Permission evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionCheckResult'

  # ─── LDAP Integration ───

  /auth/ldap/configure:
    post:
      summary: Configure LDAP directory
      operationId: configureLDAP
      tags: [ldap]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigureLDAPRequest'
      responses:
        '201':
          description: LDAP configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LDAPConfig'
        '400':
          description: Invalid request

  /auth/ldap/config:
    get:
      summary: Get LDAP configuration
      operationId: getLDAPConfig
      tags: [ldap]
      responses:
        '200':
          description: LDAP configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LDAPConfig'
        '404':
          description: LDAP config not found

    patch:
      summary: Update LDAP configuration
      operationId: updateLDAPConfig
      tags: [ldap]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLDAPRequest'
      responses:
        '200':
          description: LDAP configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LDAPConfig'

    delete:
      summary: Delete LDAP configuration
      operationId: deleteLDAPConfig
      tags: [ldap]
      responses:
        '204':
          description: LDAP configuration deleted

  /auth/ldap/test:
    post:
      summary: Test LDAP connection
      operationId: testLDAP
      tags: [ldap]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestLDAPRequest'
      responses:
        '200':
          description: LDAP connection test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LDAPSyncResult'

  # ─── Active Directory Integration ───

  /auth/ad/configure:
    post:
      summary: Configure Active Directory
      operationId: configureAD
      tags: [active-directory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigureADRequest'
      responses:
        '201':
          description: AD configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ADConfig'
        '400':
          description: Invalid request

  /auth/ad/config:
    get:
      summary: Get AD configuration
      operationId: getADConfig
      tags: [active-directory]
      responses:
        '200':
          description: AD configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ADConfig'
        '404':
          description: AD config not found

    patch:
      summary: Update AD configuration
      operationId: updateADConfig
      tags: [active-directory]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateADRequest'
      responses:
        '200':
          description: AD configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ADConfig'

    delete:
      summary: Delete AD configuration
      operationId: deleteADConfig
      tags: [active-directory]
      responses:
        '204':
          description: AD configuration deleted

  /auth/ad/test:
    post:
      summary: Test AD connection
      operationId: testAD
      tags: [active-directory]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestADRequest'
      responses:
        '200':
          description: AD connection test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ADSyncResult'

  # ─── Delegated Admin Roles ───

  /admin/delegations:
    post:
      summary: Create a delegated admin role
      operationId: createDelegationRole
      tags: [delegated-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDelegationRoleRequest'
      responses:
        '201':
          description: Delegation role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelegationRole'
        '400':
          description: Invalid request

    get:
      summary: List delegation roles
      operationId: listDelegationRoles
      tags: [delegated-admin]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: List of delegation roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDelegationRolesResponse'

  /admin/delegations/{role_id}:
    get:
      summary: Get delegation role by ID
      operationId: getDelegationRole
      tags: [delegated-admin]
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Delegation role details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelegationRole'
        '404':
          description: Delegation role not found

    patch:
      summary: Update delegation role
      operationId: updateDelegationRole
      tags: [delegated-admin]
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDelegationRoleRequest'
      responses:
        '200':
          description: Delegation role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelegationRole'
        '400':
          description: Invalid request

    delete:
      summary: Delete delegation role
      operationId: deleteDelegationRole
      tags: [delegated-admin]
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Delegation role deleted

  /admin/delegations/{role_id}/grant:
    post:
      summary: Grant delegation role to a user
      operationId: grantDelegation
      tags: [delegated-admin]
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelegateRoleRequest'
      responses:
        '201':
          description: Delegation granted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelegationGrant'

  /admin/delegations/{role_id}/revoke:
    post:
      summary: Revoke delegation from a user
      operationId: revokeDelegation
      tags: [delegated-admin]
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeDelegationRequest'
      responses:
        '200':
          description: Delegation revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /admin/delegations/{role_id}/delegations:
    get:
      summary: List delegation grants for a role
      operationId: listDelegations
      tags: [delegated-admin]
      parameters:
        - name: role_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of delegation grants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDelegationsResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
    X-Request-ID:
      name: X-Request-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    CreateUserRequest:
      type: object
      required:
        - email
        - display_name
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
        mfa_enabled:
          type: boolean
          default: false
        ldap_dn:
          type: string
          nullable: true

    UpdateUserRequest:
      type: object
      properties:
        display_name:
          type: string
        roles:
          type: array
          items:
            type: string
        mfa_enabled:
          type: boolean
        status:
          type: string
          enum: [active, suspended, deactivated, pending]

    User:
      type: object
      required:
        - id
        - email
        - display_name
        - tenant_id
        - status
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        display_name:
          type: string
        tenant_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string
        mfa_enabled:
          type: boolean
        ldap_dn:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, suspended, deactivated, pending]
        created_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time

    SetRolesRequest:
      type: object
      required:
        - roles
      properties:
        roles:
          type: array
          items:
            type: string

    CreateRoleRequest:
      type: object
      required:
        - name
        - permissions
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
        is_system:
          type: boolean
          default: false

    CreateServiceIdentityRequest:
      type: object
      required:
        - name
        - tenant_id
        - roles
      properties:
        name:
          type: string
        tenant_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string
        metadata:
          type: object
          nullable: true

    ServiceIdentity:
      type: object
      required:
        - id
        - name
        - tenant_id
        - api_key_id
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        tenant_id:
          type: string
          format: uuid
        roles:
          type: array
          items:
            type: string
        api_key_id:
          type: string
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time

    RegisterAgentIdentityRequest:
      type: object
      required:
        - agent_id
        - tenant_id
        - capabilities
      properties:
        agent_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        capabilities:
          type: array
          items:
            type: string
        memory_scope:
          type: array
          items:
            type: string
        allowed_tools:
          type: array
          items:
            type: string
        escalation_targets:
          type: array
          items:
            type: string

    SSOConfig:
      type: object
      required:
        - id
        - tenant_id
        - provider
        - type
        - configuration
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the SSO configuration.
        tenant_id:
          type: string
          format: uuid
          description: Unique identifier for the tenant this SSO configuration applies to.
        provider:
          type: string
          enum:
            - azure_ad
            - okta
            - authentik
            - google_workspace
          description: The SSO identity provider.
        type:
          type: string
          enum: [saml, oidc]
          description: The SSO protocol used by this configuration.
        configuration:
          type: object
          description: Provider-specific configuration details.
          properties:
            metadata_url:
              type: string
              format: uri
              description: URL to the identity provider's metadata document.
            issuer_url:
              type: string
              description: OIDC issuer URL for the identity provider.
            client_id:
              type: string
              description: Client identifier for the application.
            client_secret:
              type: string
              description: Client secret for the application (write-only).
            redirect_uri:
              type: string
              format: uri
              description: Callback URL for the SSO flow.
            scopes:
              type: array
              items:
                type: string
              description: OAuth/OIDC scopes to request.
        status:
          type: string
          enum: [active, inactive]
          description: Whether this SSO configuration is currently enabled.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the SSO configuration was created.
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the SSO configuration was last updated.
      additionalProperties: false

    AuditEvent:
      type: object
      required:
        - id
        - timestamp
        - actor_id
        - actor_type
        - action
        - resource_type
        - resource_id
        - result
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        actor_id:
          type: string
          format: uuid
          description: ID of the user, service identity, or agent that performed the action.
        actor_type:
          type: string
          enum: [user, service_identity, agent_identity]
        action:
          type: string
          description: The action that was performed (e.g., user.create, policy.update).
        resource_type:
          type: string
          description: The type of resource the action was performed on.
        resource_id:
          type: string
          description: ID of the resource the action was performed on.
        result:
          type: string
          enum: [success, failure, denied]
          description: Outcome of the action.
        details:
          type: object
          description: Additional contextual information about the audit event.
        ip_address:
          type: string
          description: IP address from which the action was performed.
        user_agent:
          type: string
          description: User-Agent header string from the client.
      additionalProperties: false

    PermissionCheckRequest:
      type: object
      required:
        - actor_id
        - action
        - resource
      properties:
        actor_id:
          type: string
        action:
          type: string
        resource:
          type: string
        attributes:
          type: object
          description: ABAC attributes for policy evaluation

    PermissionCheckResult:
      type: object
      required:
        - allowed
        - reason
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        policy_match:
          type: string
          nullable: true
        evaluated_at:
          type: string
          format: date-time

    # ─── LDAP Schemas ───

    LDAPConfig:
      type: object
      required:
        - id
        - tenant_id
        - status
        - enabled
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the LDAP configuration.
        tenant_id:
          type: string
          format: uuid
          description: Tenant this configuration belongs to.
        display_name:
          type: string
          description: Human-readable name for this LDAP configuration.
        url:
          type: string
          format: uri
          description: LDAP server URL (e.g., ldap://server:389 or ldaps://server:636).
        base_dn:
          type: string
          description: Base DN for searches (e.g., dc=example,dc=com).
        bind_dn:
          type: string
          description: Distinguished Name used for binding to the LDAP server.
        bind_password:
          type: string
          writeOnly: true
          description: Password for the bind DN (write-only).
        search_scope:
          type: string
          enum: [base, oneLevel, subtree]
          description: Scope of LDAP searches.
        user_filter:
          type: string
          description: Filter to match user objects (e.g., (objectClass=person)).
        group_filter:
          type: string
          description: Filter to match group objects (e.g., (objectClass=groupOfNames)).
        config:
          type: object
          description: Additional LDAP configuration settings.
          properties:
            tls_enabled:
              type: boolean
            start_tls:
              type: boolean
            port:
              type: integer
            timeout_seconds:
              type: integer
        enabled:
          type: boolean
          description: Whether this LDAP configuration is active.
        status:
          type: string
          enum: [active, inactive, error]
          description: Current status of the LDAP configuration.
        last_sync_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last successful LDAP sync.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    ConfigureLDAPRequest:
      type: object
      required:
        - tenant_id
        - display_name
        - url
        - base_dn
        - bind_dn
        - bind_password
        - enabled
      properties:
        display_name:
          type: string
        url:
          type: string
          format: uri
        base_dn:
          type: string
        bind_dn:
          type: string
        bind_password:
          type: string
        search_scope:
          type: string
          enum: [base, oneLevel, subtree]
          default: subtree
        user_filter:
          type: string
        group_filter:
          type: string
        config:
          type: object
          properties:
            tls_enabled:
              type: boolean
            start_tls:
              type: boolean
            port:
              type: integer
            timeout_seconds:
              type: integer
        enabled:
          type: boolean

    UpdateLDAPRequest:
      type: object
      properties:
        display_name:
          type: string
        url:
          type: string
          format: uri
        base_dn:
          type: string
        bind_dn:
          type: string
        bind_password:
          type: string
        search_scope:
          type: string
          enum: [base, oneLevel, subtree]
        user_filter:
          type: string
        group_filter:
          type: string
        config:
          type: object
          properties:
            tls_enabled:
              type: boolean
            start_tls:
              type: boolean
            port:
              type: integer
            timeout_seconds:
              type: integer
        enabled:
          type: boolean

    TestLDAPRequest:
      type: object
      required:
        - url
        - base_dn
        - bind_dn
        - bind_password
      properties:
        url:
          type: string
          format: uri
        base_dn:
          type: string
        bind_dn:
          type: string
        bind_password:
          type: string

    LDAPSyncResult:
      type: object
      required:
        - success
        - message
        - users_synced
        - groups_synced
      properties:
        success:
          type: boolean
          description: Whether the connection test was successful.
        message:
          type: string
          description: Result message or error details.
        users_synced:
          type: integer
          description: Number of users found during test.
        groups_synced:
          type: integer
          description: Number of groups found during test.
        details:
          type: object
          nullable: true
          description: Additional details from the test.

    # ─── Active Directory Schemas ───

    ADConfig:
      type: object
      required:
        - id
        - tenant_id
        - status
        - enabled
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the AD configuration.
        tenant_id:
          type: string
          format: uuid
          description: Tenant this configuration belongs to.
        display_name:
          type: string
          description: Human-readable name for this AD configuration.
        domain_name:
          type: string
          description: AD domain name (e.g., example.corp).
        domain_controller:
          type: string
          format: uri
          description: AD domain controller URL.
        bind_dn:
          type: string
          description: Distinguished Name used for binding to AD.
        bind_password:
          type: string
          writeOnly: true
          description: Password for the bind DN (write-only).
        organizational_unit:
          type: string
          description: Optional OU filter for user searches.
        config:
          type: object
          description: Additional AD configuration settings.
          properties:
            use_ssl:
              type: boolean
            port:
              type: integer
            timeout_seconds:
              type: integer
            referral_chasing:
              type: boolean
        enabled:
          type: boolean
          description: Whether this AD configuration is active.
        status:
          type: string
          enum: [active, inactive, error]
          description: Current status of the AD configuration.
        last_sync_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last successful AD sync.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    ConfigureADRequest:
      type: object
      required:
        - tenant_id
        - display_name
        - domain_name
        - domain_controller
        - bind_dn
        - bind_password
        - enabled
      properties:
        display_name:
          type: string
        domain_name:
          type: string
        domain_controller:
          type: string
          format: uri
        bind_dn:
          type: string
        bind_password:
          type: string
        organizational_unit:
          type: string
        config:
          type: object
          properties:
            use_ssl:
              type: boolean
            port:
              type: integer
            timeout_seconds:
              type: integer
            referral_chasing:
              type: boolean
        enabled:
          type: boolean

    UpdateADRequest:
      type: object
      properties:
        display_name:
          type: string
        domain_name:
          type: string
        domain_controller:
          type: string
          format: uri
        bind_dn:
          type: string
        bind_password:
          type: string
        organizational_unit:
          type: string
        config:
          type: object
          properties:
            use_ssl:
              type: boolean
            port:
              type: integer
            timeout_seconds:
              type: integer
            referral_chasing:
              type: boolean
        enabled:
          type: boolean

    TestADRequest:
      type: object
      required:
        - domain_name
        - domain_controller
        - bind_dn
        - bind_password
      properties:
        domain_name:
          type: string
        domain_controller:
          type: string
          format: uri
        bind_dn:
          type: string
        bind_password:
          type: string

    ADSyncResult:
      type: object
