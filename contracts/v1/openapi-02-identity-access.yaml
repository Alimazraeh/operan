    # ─── Delegated Admin Roles Schemas ───

    DelegationRole:
      type: object
      required:
        - id
        - tenant_id
        - name
        - permissions
        - scope
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the delegation role.
        tenant_id:
          type: string
          format: uuid
          description: Tenant this delegation role belongs to.
        name:
          type: string
          description: Name of the delegation role.
        description:
          type: string
          description: Description of the delegation role's purpose.
        permissions:
          type: array
          items:
            type: string
          description: List of permissions granted by this role.
        scope:
          type: string
          description: The scope of the delegation role (e.g., department, project).
        max_depth:
          type: integer
          description: Maximum nesting depth for sub-delegation.
        status:
          type: string
          enum: [active, inactive]
          description: Current status of the delegation role.
        created_by:
          type: string
          format: uuid
          description: ID of the user who created this delegation.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDelegationRoleRequest:
      type: object
      required:
        - tenant_id
        - name
        - permissions
        - scope
      properties:
        name:
          type: string
          description: Name of the delegation role.
        description:
          type: string
          description: Description of the delegation role.
        permissions:
          type: array
          items:
            type: string
          description: List of permissions to grant.
        scope:
          type: string
          description: The scope this delegation applies to.
        max_depth:
          type: integer
          description: Maximum nesting depth for sub-delegation.

    UpdateDelegationRoleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
        scope:
          type: string
        max_depth:
          type: integer

    ListDelegationRolesResponse:
      type: object
      required:
        - delegations
        - total
        - page
        - page_size
      properties:
        delegations:
          type: array
          items:
            $ref: '#/components/schemas/DelegationRole'
        total:
          type: integer
          description: Total number of delegation roles.
        page:
          type: integer
          description: Current page number.
        page_size:
          type: integer
          description: Number of items per page.

    DelegateRoleRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
          description: ID of the user to grant the delegation to.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration for the delegation.
        note:
          type: string
          description: Note about why this delegation was granted.

    RevokeDelegationRequest:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
          description: ID of the user to revoke delegation from.
        reason:
          type: string
          description: Reason for revoking the delegation.

    DelegationGrant:
      type: object
      required:
        - id
        - role_id
        - user_id
        - granted_by
        - granted_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the delegation grant.
        role_id:
          type: string
          format: uuid
          description: ID of the delegation role.
        user_id:
          type: string
          format: uuid
          description: ID of the user who received the delegation.
        granted_by:
          type: string
          format: uuid
          description: ID of the user who granted the delegation.
        granted_at:
          type: string
          format: date-time
          description: Timestamp when the delegation was granted.
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Optional expiration for the delegation.
        note:
          type: string
          description: Note about why this delegation was granted.
        status:
          type: string
          enum: [active, revoked, expired]
          description: Current status of the delegation grant.

    ListDelegationsResponse:
      type: object
      required:
        - grants
        - total
      properties:
        grants:
          type: array
          items:
            $ref: '#/components/schemas/DelegationGrant'
        total:
          type: integer
          description: Total number of delegation grants.
