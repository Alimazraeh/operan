# Operan ADOS — Docker Compose Template
# Generated by ARCH (Platform Architect & Contract Manager)
# Usage: Copy to module directory and customize SERVICE_NAME

# =============================================================================
# ARCH STANDARD DOCKER COMPOSE TEMPLATE
# =============================================================================
# - Local development environment
# - Connects to shared infrastructure (Kafka, PostgreSQL, Redis)
# - Volume mounts for hot reload
# =============================================================================

version: "3.9"

services:
  SERVICE_NAME:
    build:
      context: .
      dockerfile: Dockerfile.module
      args:
        MODULE_NAME: SERVICE_NAME
        MODULE_VERSION: 0.0.0-dev
    container_name: operan-SERVICE_NAME
    restart: unless-stopped
    ports:
      - "8080:8080"  # REST API
      - "5672:5672"  # AMQP
    environment:
      - MODULE_NAME=SERVICE_NAME
      - LOG_LEVEL=debug
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/operan_SERVICE_NAME
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BROKERS=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_SERVICE_NAME=operan-SERVICE_NAME
    volumes:
      - ./config:/app/config:ro
      - ./contracts/v1:/app/contracts/v1:ro
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - operan-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Shared infrastructure
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: operan_SERVICE_NAME
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-operan-service_name:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - operan-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - operan-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - operan-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - operan-network

  otel-collector:
    image: otel/opentelemetry-collector:0.105.0
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command: ["--config", "/etc/otel-collector-config.yaml"]
    networks:
      - operan-network

volumes:
  postgres-operan-service_name:

networks:
  operan-network:
    driver: bridge
