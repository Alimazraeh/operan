# Operan ADOS — Helm Chart Values Template
# Generated by ARCH (Platform Architect & Contract Manager)
# Usage: Copy to module directory and customize RELEASE_NAME

# =============================================================================
# ARCH STANDARD HELM VALUES TEMPLATE
# =============================================================================
# - Production-ready Kubernetes deployment
# - Resource limits and requests
# - HPA (Horizontal Pod Autoscaler)
# - Liveness/readiness probes
# - Tenant isolation via namespace or labels
# =============================================================================

# -----------------------------------------------------------------------------
# Module Configuration
# -----------------------------------------------------------------------------
module:
  name: MODULE_NAME
  version: MODULE_VERSION
  replicas:
    min: 2
    max: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# -----------------------------------------------------------------------------
# Image
# -----------------------------------------------------------------------------
image:
  repository: ghcr.io/alimazraeh/operan/MODULE_NAME
  tag: "{{ .Chart.AppVersion }}"
  pullPolicy: IfNotPresent
  pullSecrets:
    - name: operan-ghcr-pull-secret

# -----------------------------------------------------------------------------
# Service
# -----------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  protocol: TCP

serviceAccount:
  create: true
  name: operan-MODULE_NAME
  annotations: {}

# -----------------------------------------------------------------------------
# Ingress (optional)
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: operan.example.com
      paths:
        - path: /api/v1/MODULE_NAME
          pathType: Prefix
  tls:
    - secretName: operan-tls
      hosts:
        - operan.example.com

# -----------------------------------------------------------------------------
# Resources
# -----------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

# -----------------------------------------------------------------------------
# Autoscaling (HPA)
# -----------------------------------------------------------------------------
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# -----------------------------------------------------------------------------
# Probes
# -----------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -----------------------------------------------------------------------------
# Persistence (if needed)
# -----------------------------------------------------------------------------
persistence:
  enabled: false
  storageClass: "standard"
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /data

# -----------------------------------------------------------------------------
# Environment Variables
# -----------------------------------------------------------------------------
env:
  LOG_LEVEL: "info"
  OTEL_ENABLED: "true"
  # Database (overridden by Secret)
  DATABASE_URL:
    valueFrom:
      secretKeyRef:
        name: operan-MODULE_NAME-db-credentials
        key: url
  # Redis
  REDIS_URL:
    valueFrom:
      secretKeyRef:
        name: operan-redis-credentials
        key: url
  # Kafka
  KAFKA_BROKERS:
    valueFrom:
      configMapKeyRef:
        name: operan-kafka-config
        key: brokers
  # OpenTelemetry
  OTEL_EXPORTER_OTLP_ENDPOINT:
    valueFrom:
      configMapKeyRef:
        name: operan-otel-config
        key: endpoint

# -----------------------------------------------------------------------------
# Security Context
# -----------------------------------------------------------------------------
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

# -----------------------------------------------------------------------------
# Tenant Isolation
# -----------------------------------------------------------------------------
tenantIsolation:
  enabled: true
  mode: namespace  # options: namespace | label | network-policy
  namespace: ""     # set if mode=namespace
  labels:           # set if mode=label
    operan.tenant: ""

# -----------------------------------------------------------------------------
# Network Policies
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              operan.network/isolated: "true"
        - podSelector:
            matchLabels:
              operan.network/access: "true"
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              operan.network/isolated: "true"
      ports:
        - protocol: TCP
          port: 5432   # PostgreSQL
        - protocol: TCP
          port: 6379   # Redis
        - protocol: TCP
          port: 9092   # Kafka
        - protocol: UDP
          port: 53     # DNS
        - protocol: TCP
          port: 4317   # OpenTelemetry
