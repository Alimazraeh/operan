# Operan ADOS — CI Pipeline Template
# Generated by ARCH (Platform Architect & Contract Manager)
# Usage: Copy to .github/workflows/ci.yaml in module directory

# =============================================================================
# ARCH STANDARD CI PIPELINE
# =============================================================================
# - Linting
# - Contract validation (OpenAPI/AsyncAPI/JSON Schema)
# - Unit tests
# - Security scanning
# - Docker build
# - Helm lint
# - Deploy to staging
# =============================================================================

name: CI — MODULE_NAME

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alimazraeh/operan/MODULE_NAME

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -d relaxed contracts/v1/

      - name: Install jsonlin
        run: pip install jsonlint

      - name: Run jsonlint
        run: jsonlint contracts/v1/schema-*.json || true

  # ---------------------------------------------------------------------------
  # Job 2: Validate Contracts
  # ---------------------------------------------------------------------------
  validate-contracts:
    name: Validate Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install @asyncapi/cli
        run: npm install -g @asyncapi/cli

      - name: Validate AsyncAPI contracts
        run: |
          for f in contracts/v1/asyncapi-*.yaml; do
            echo "Validating $f"
            asyncapi validate "$f"
          done

      - name: Install swagger-cli
        run: npm install -g swagger-cli

      - name: Validate OpenAPI contracts
        run: |
          for f in contracts/v1/openapi-*.yaml; do
            echo "Validating $f"
            swagger-cli validate "$f"
          done

  # ---------------------------------------------------------------------------
  # Job 3: Unit Tests
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: make test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0

  # ---------------------------------------------------------------------------
  # Job 4: Security Scan
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/alimazraeh/operan/MODULE_NAME:latest
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ---------------------------------------------------------------------------
  # Job 5: Build Docker Image
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, validate-contracts, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: contracts/v1/scaffold/docker/Dockerfile.module
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 6: Helm Lint
  # ---------------------------------------------------------------------------
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Helm lint
        run: |
          helm lint contracts/v1/scaffold/helm/ \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=latest

  # ---------------------------------------------------------------------------
  # Job 7: Deploy to Staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [helm-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_STAGING }}

      - name: Deploy to Staging
        run: |
          helm upgrade --install operan-MODULE_NAME contracts/v1/scaffold/helm/ \
            --namespace operan-staging \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=sha-${{ github.sha }} \
            --set ingress.enabled=true \
            --wait --timeout=300s
