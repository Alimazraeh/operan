# Operan ADOS — CD Pipeline Template
# Generated by ARCH (Platform Architect & Contract Manager)
# Usage: Copy to .github/workflows/cd.yaml in module directory

# =============================================================================
# ARCH STANDARD CD PIPELINE
# =============================================================================
# - Triggered on tag or manual approval
# - Deploys to production with canary strategy
# - Automated rollback on health check failure
# =============================================================================

name: CD — MODULE_NAME

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., v1.2.3)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alimazraeh/operan/MODULE_NAME

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Prepare Release
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Validate version
        run: |
          if ! [[ ${{ steps.version.outputs.tag }} =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: ${{ steps.version.outputs.tag }}"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Job 2: Build Production Image
  # ---------------------------------------------------------------------------
  build-prod:
    name: Build Production Image
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: contracts/v1/scaffold/docker/Dockerfile.module
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Production (Manual Approval)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-prod, prepare]
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Deploy to Production (Canary)
        run: |
          # Step 1: Deploy canary (10% traffic)
          helm upgrade --install operan-MODULE_NAME-canary contracts/v1/scaffold/helm/ \
            --namespace operan-production \
            --set replicaCount=1 \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.prepare.outputs.version }} \
            --set canary=true \
            --wait --timeout=300s

      - name: Wait for canary stabilization
        run: sleep 300

      - name: Run canary health checks
        run: |
          # Check error rates, latency, pod status
          kubectl rollout status deployment/operan-MODULE_NAME-canary \
            --namespace operan-production \
            --timeout=120s

      - name: Promote canary to production
        if: success()
        run: |
          helm upgrade --install operan-MODULE_NAME contracts/v1/scaffold/helm/ \
            --namespace operan-production \
            --set replicaCount=3 \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.prepare.outputs.version }} \
            --set canary=false \
            --wait --timeout=300s

          # Delete canary
          helm uninstall operan-MODULE_NAME-canary \
            --namespace operan-production

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/operan-MODULE_NAME \
            --namespace operan-production
          echo "ROLLBACK: Automated rollback triggered"

  # ---------------------------------------------------------------------------
  # Job 4: Notify
  # ---------------------------------------------------------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-production, prepare]
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          payload: |
            {
              "text": "${{ needs.deploy-production.result == 'success' && '✅' || '❌' }} Operan MODULE_NAME deployed successfully!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ needs.deploy-production.result == 'success' && '✅' || '❌' }} *Operan MODULE_NAME* deployed to production\nVersion: ${{ needs.prepare.outputs.version }}"
                  }
                }
              ]
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
