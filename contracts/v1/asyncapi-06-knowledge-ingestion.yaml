asyncapi: 2.6.0
info:
  title: Operan Knowledge Ingestion Events
  version: 1.0.0
  description: Module 06 — Knowledge Ingestion event schema for the Operan ADOS platform
servers:
  production:
    url: amqp://broker.prod.operan.internal:5672
    protocol: amqp
    description: Production AMQP broker
  staging:
    url: amqp://broker.staging.operan.internal:5672
    protocol: amqp
    description: Staging AMQP broker

channels:
  operan/events/knowledge/ingestion/requested:
    publish:
      summary: Emitted when a knowledge ingestion request is initiated
      operationId: onIngestionRequested
      message:
        $ref: '#/components/messages/IngestionRequested'
  operan/events/knowledge/ingestion/parsing:
    publish:
      summary: Emitted during document parsing progress
      operationId: onIngestionParsing
      message:
        $ref: '#/components/messages/IngestionParsing'
  operan/events/knowledge/ingestion/completed:
    publish:
      summary: Emitted when document ingestion and chunking are complete
      operationId: onIngestionCompleted
      message:
        $ref: '#/components/messages/IngestionCompleted'
  operan/events/knowledge/chunking/ready:
    publish:
      summary: Emitted when document chunks are ready for indexing
      operationId: onChunkingReady
      message:
        $ref: '#/components/messages/ChunkingReady'
  operan/events/knowledge/semantic/query/executed:
    publish:
      summary: Emitted when a semantic retrieval query is executed
      operationId: onSemanticQueryExecuted
      message:
        $ref: '#/components/messages/SemanticQueryExecuted'
  operan/events/knowledge/ingestion/failed:
    publish:
      summary: Emitted when document ingestion fails at any stage
      operationId: onIngestionFailed
      message:
        $ref: '#/components/messages/IngestionFailed'

components:
  schemas:
    StringWithMetadata:
      type: object
      description: A string value with associated metadata
      properties:
        value:
          type: string
          description: The primary string value
        metadata:
          type: object
          additionalProperties: true
          description: Additional metadata associated with the string value
      required:
        - value
    ProcessingOptions:
      type: object
      description: Optional processing configurations for ingestion
      properties:
        chunk_size:
          type: integer
          description: Maximum tokens per chunk
        chunk_overlap:
          type: integer
          description: Overlap tokens between adjacent chunks
        enable_embedding:
          type: boolean
          description: Whether to generate semantic embeddings
        enable_graph_extraction:
          type: boolean
          description: Whether to extract knowledge graph relations
        language:
          type: string
          description: Preferred language for processing (ISO 639-1)
        max_file_size_mb:
          type: integer
          description: Maximum allowed file size in megabytes
    CommonMessageTraits:
      type: object
      description: Shared properties for all ingestion events
      properties:
        correlationId:
          type: string
          format: uuid
          description: Correlation identifier linking related events
        tenantId:
          type: string
          format: uuid
          description: Tenant identifier
        messageId:
          type: string
          format: uuid
          description: Unique message identifier
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp of event creation
  messages:
    IngestionRequested:
      summary: Ingestion request event
      messageId: ingestion_requested
      contentType: application/json
      headers:
        type: object
        required:
          - X-Tenant-ID
        properties:
          X-Tenant-ID:
            type: string
            description: Tenant ID required in message header
      payload:
        type: object
        properties:
          ingestion_id:
            type: string
            format: uuid
            description: Unique ingestion session identifier
          tenant_id:
            type: string
            format: uuid
            description: Tenant identifier
          source_type:
            type: string
            enum:
              - pdf
              - docx
              - pptx
              - csv
              - json
              - xml
              - html
              - text
              - email
              - url
            description: Type of source document
          source_uri:
            type: string
            description: URI or path to the source document
          department_id:
            type:
              - string
              - 'null'
            format: uuid
            description: Department identifier; null if not applicable
          processing_options:
            $ref: '#/components/schemas/ProcessingOptions'
          requested_by:
            type: string
            description: Agent ID or user ID that initiated the ingestion
          requested_at:
            type: string
            format: date-time
            description: Timestamp of when the request was made
        required:
          - ingestion_id
          - tenant_id
          - source_type
          - source_uri
          - requested_by
          - requested_at
    IngestionParsing:
      summary: Document parsing progress event
      messageId: ingestion_parsing
      contentType: application/json
      headers:
        type: object
        required:
          - X-Tenant-ID
        properties:
          X-Tenant-ID:
            type: string
            description: Tenant ID required in message header
      payload:
        type: object
        properties:
          ingestion_id:
            type: string
            format: uuid
            description: Unique ingestion session identifier
          tenant_id:
            type: string
            format: uuid
            description: Tenant identifier
          file_name:
            type: string
            description: Name of the file being parsed
          file_size:
            type: integer
            description: File size in bytes
          pages_detected:
            type: integer
            description: Number of pages detected in the document
          sections_detected:
            type: integer
            description: Number of sections identified during parsing
          language_detected:
            type: array
            items:
              type: string
            description: Detected languages in the document
          language_confidence:
            type: number
            minimum: 0
            maximum: 1
            description: Confidence score of language detection
          parsing_progress:
            type: number
            minimum: 0
            maximum: 1
            description: Parsing progress as a fraction between 0 and 1
        required:
          - ingestion_id
          - tenant_id
          - parsing_progress
    IngestionCompleted:
      summary: Document ingestion completion event
      messageId: ingestion_completed
      contentType: application/json
      headers:
        type: object
        required:
          - X-Tenant-ID
        properties:
          X-Tenant-ID:
            type: string
            description: Tenant ID required in message header
      payload:
        type: object
        properties:
          ingestion_id:
            type: string
            format: uuid
            description: Unique ingestion session identifier
          tenant_id:
            type: string
            format: uuid
            description: Tenant identifier
          document_id:
            type: string
            format: uuid
            description: Document identifier assigned after successful ingestion
          source_type:
            type: string
            enum:
              - pdf
              - docx
              - pptx
              - csv
              - json
              - xml
              - html
              - text
              - email
              - url
            description: Type of source document
          file_name:
            type: string
            description: Name of the ingested file
          sections:
            type: array
            items:
              $ref: '#/components/schemas/StringWithMetadata'
            description: Extracted sections with metadata
          total_chunks:
            type: integer
            description: Total number of chunks generated
          languages:
            type: array
            items:
              $ref: '#/components/schemas/StringWithMetadata'
            description: Detected languages with metadata
          status:
            type: string
            enum:
              - success
              - partial_failure
              - failed
            description: Final status of the ingestion
          completed_at:
            type: string
            format: date-time
            description: Timestamp of completion
        required:
          - ingestion_id
          - tenant_id
          - source_type
          - file_name
          - status
          - completed_at
    ChunkingReady:
      summary: Chunking readiness event
      messageId: chunking_ready
      contentType: application/json
      headers:
        type: object
        required:
          - X-Tenant-ID
        properties:
          X-Tenant-ID:
            type: string
            description: Tenant ID required in message header
      payload:
        type: object
        properties:
          document_id:
            type: string
            format: uuid
            description: Document identifier for which chunks are ready
          tenant_id:
            type: string
            format: uuid
            description: Tenant identifier
          chunk_count:
            type: integer
            description: Total number of chunks generated
          chunk_size_range:
            type: object
            properties:
              min:
                type: integer
                description: Minimum chunk size in tokens
              max:
                type: integer
                description: Maximum chunk size in tokens
            required:
              - min
              - max
          chunk_strategy:
            type: string
            enum:
              - token
              - paragraph
              - heading
            description: Strategy used for chunking
          semantic_boundary_respecting:
            type: boolean
            description: Whether semantic boundaries were respected during chunking
          ready_at:
            type: string
            format: date-time
            description: Timestamp when chunks became available
        required:
          - document_id
          - tenant_id
          - chunk_count
          - chunk_size_range
          - chunk_strategy
          - semantic_boundary_respecting
          - ready_at
    SemanticQueryExecuted:
      summary: Semantic query execution event
      messageId: semantic_query_executed
      contentType: application/json
      headers:
        type: object
        required:
          - X-Tenant-ID
        properties:
          X-Tenant-ID:
            type: string
            description: Tenant ID required in message header
      payload:
        type: object
        properties:
          query_id:
            type: string
            format: uuid
            description: Unique query execution identifier
          tenant_id:
            type: string
            format: uuid
            description: Tenant identifier
          query_text:
            type: string
            description: The executed query text
          results_count:
            type: integer
            description: Number of results returned
          top_n:
            type: integer
            description: Maximum number of results requested
          retrieval_strategy:
            type: string
            enum:
              - hybrid
              - semantic
              - keyword
              - graph
            description: Strategy used for retrieval
          response_time_ms:
            type: integer
            description: Response time in milliseconds
          source_document_ids:
            type: array
            items:
              type: string
              format: uuid
            description: Identifiers of source documents consulted
          executed_by:
            type: string
            description: Agent ID or user ID that executed the query
          timestamp:
            type: string
            format: date-time
            description: Timestamp of query execution
        required:
          - query_id
          - tenant_id
          - query_text
          - results_count
          - top_n
          - retrieval_strategy
          - response_time_ms
          - source_document_ids
          - executed_by
          - timestamp
    IngestionFailed:
      summary: Ingestion failure event
      messageId: ingestion_failed
      contentType: application/json
      headers:
        type: object
        required:
          - X-Tenant-ID
        properties:
          X-Tenant-ID:
            type: string
            description: Tenant ID required in message header
      payload:
        type: object
        properties:
          ingestion_id:
            type: string
            format: uuid
            description: Unique ingestion session identifier
          tenant_id:
            type: string
            format: uuid
            description: Tenant identifier
          error_code:
            type: string
            description: Application-specific error code
          error_message:
            type: string
            description: Human-readable error description
          failed_at:
            type: string
            format: date-time
            description: Timestamp of the failure
          failed_stage:
            type: string
            enum:
              - download
              - parsing
              - chunking
              - embedding
            description: Stage at which the failure occurred
        required:
          - ingestion_id
          - tenant_id
          - error_code
          - error_message
          - failed_at
          - failed_stage
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token for authentication
    TenantContext:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant context header required for all requests
security:
  - BearerAuth: []
  - TenantContext: []
