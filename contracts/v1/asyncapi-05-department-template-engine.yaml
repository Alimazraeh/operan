asyncapi: "2.6.0"
info:
  title: Operan Module 05 — Department Template Engine Events
  description: >
    Event schemas for the Department Template Engine. Covers the full template
    lifecycle from creation through deployment, failure, and undeployment.
  version: "1.0.0"
  contact:
    name: Operan Platform Team
  license:
    name: Proprietary

defaultContentType: application/json

servers:
  production:
    url: events.operan.io
    protocol: mqtt
    description: Production event broker
  staging:
    url: staging-events.operan.io
    protocol: mqtt
    description: Staging event broker

channels:
  # ─── template.created ───
  operan/events/template/created:
    description: Published when a new department template is created.
    address: operan/events/template/created
    publish:
      summary: A template was created.
      operationId: onTemplateCreated
      message:
        $ref: '#/components/messages/TemplateCreated'

  # ─── template.updated ───
  operan/events/template/updated:
    description: Published when an existing department template is updated.
    address: operan/events/template/updated
    publish:
      summary: A template was updated.
      operationId: onTemplateUpdated
      message:
        $ref: '#/components/messages/TemplateUpdated'

  # ─── template.deployed ───
  operan/events/template/deployed:
    description: Published when a template deployment reaches operational status.
    address: operan/events/template/deployed
    publish:
      summary: A template deployment completed successfully.
      operationId: onTemplateDeployed
      message:
        $ref: '#/components/messages/TemplateDeployed'

  # ─── template.deployment_failed ───
  operan/events/template/deployment_failed:
    description: Published when a template deployment fails at any stage.
    address: operan/events/template/deployment_failed
    publish:
      summary: A template deployment failed.
      operationId: onTemplateDeploymentFailed
      message:
        $ref: '#/components/messages/TemplateDeploymentFailed'

  # ─── template.undeployed ───
  operan/events/template/undeployed:
    description: Published when a template deployment is undeployed / rolled back.
    address: operan/events/template/undeployed
    publish:
      summary: A template deployment was undeployed.
      operationId: onTemplateUndeployed
      message:
        $ref: '#/components/messages/TemplateUndeployed'

  # ─── template.deleted ───
  operan/events/template/deleted:
    description: Published when a template is deleted.
    address: operan/events/template/deleted
    publish:
      summary: A template was deleted.
      operationId: onTemplateDeleted
      message:
        $ref: '#/components/messages/TemplateDeleted'

  # ─── template.versioned ───
  operan/events/template/versioned:
    description: Published when a new version of a template is created.
    address: operan/events/template/versioned
    publish:
      summary: A new template version was created.
      operationId: onTemplateVersioned
      message:
        $ref: '#/components/messages/TemplateVersioned'

  # ─── template.cloned ───
  operan/events/template/cloned:
    description: Published when a template is cloned.
    address: operan/events/template/cloned
    publish:
      summary: A template was cloned.
      operationId: onTemplateCloned
      message:
        $ref: '#/components/messages/TemplateCloned'

components:
  messages:
    # ─── TemplateCreated ───
    TemplateCreated:
      name: TemplateCreated
      summary: Event payload for template creation.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TemplateCreatedPayload'
      traits:
        - $ref: '#/components/traits/commonHeaders'

    # ─── TemplateUpdated ───
    TemplateUpdated:
      name: TemplateUpdated
      summary: Event payload for template update.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TemplateUpdatedPayload'
      traits:
        - $ref: '#/components/traits/commonHeaders'

    # ─── TemplateDeployed ───
    TemplateDeployed:
      name: TemplateDeployed
      summary: Event payload for successful template deployment.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TemplateDeployedPayload'
      traits:
        - $ref: '#/components/traits/commonHeaders'

    # ─── TemplateDeploymentFailed ───
    TemplateDeploymentFailed:
      name: TemplateDeploymentFailed
      summary: Event payload for failed template deployment.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TemplateDeploymentFailedPayload'
      traits:
        - $ref: '#/components/traits/commonHeaders'

    # ─── TemplateUndeployed ───
    TemplateUndeployed:
      name: TemplateUndeployed
      summary: Event payload for template undeployment.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TemplateUndeployedPayload'
      traits:
        - $ref: '#/components/traits/commonHeaders'

    # ─── TemplateDeleted ───
    TemplateDeleted:
      name: TemplateDeleted
      summary: Event payload for template deletion.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TemplateDeletedPayload'
      traits:
        - $ref: '#/components/traits/commonHeaders'

    # ─── TemplateVersioned ───
    TemplateVersioned:
      name: TemplateVersioned
      summary: Event payload for template version creation.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TemplateVersionedPayload'
      traits:
        - $ref: '#/components/traits/commonHeaders'

    # ─── TemplateCloned ───
    TemplateCloned:
      name: TemplateCloned
      summary: Event payload for template cloning.
      contentType: application/json
      payload:
        $ref: '#/components/schemas/TemplateClonedPayload'
      traits:
        - $ref: '#/components/traits/commonHeaders'

  schemas:
    # ─── TemplateCreatedPayload ───
    TemplateCreatedPayload:
      type: object
      required: [event, template_id, name, category, version, created_at]
      properties:
        event:
          type: string
          const: template.created
        template_id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        version:
          type: string
          description: Semantic version (semver)
        description:
          type: string
        agents_count:
          type: integer
        workflows_count:
          type: integer
        integrations_count:
          type: integer
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true

    # ─── TemplateUpdatedPayload ───
    TemplateUpdatedPayload:
      type: object
      required: [event, template_id, version, updated_at]
      properties:
        event:
          type: string
          const: template.updated
        template_id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        version:
          type: string
          description: Updated semantic version (semver)
        previous_version:
          type: string
          description: Previous semantic version before this update
        changed_fields:
          type: array
          items:
            type: string
            enum: [agents, workflows, memory_topology, governance_rules, kpis, integrations, operational_policies, metadata, tags]
        updated_at:
          type: string
          format: date-time
        updated_by:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid

    # ─── TemplateDeployedPayload ───
    TemplateDeployedPayload:
      type: object
      required: [event, deployment_id, template_id, version, environment, status, deployed_at]
      properties:
        event:
          type: string
          const: template.deployed
        deployment_id:
          type: string
          format: uuid
        template_id:
          type: string
          format: uuid
        version:
          type: string
          description: Semantic version deployed
        environment:
          type: string
          enum: [dev, staging, production]
        status:
          type: string
          const: operational
        configuration:
          type: object
          additionalProperties: true
        provisioned_entities:
          type: object
          additionalProperties: true
        deployed_at:
          type: string
          format: date-time
        deployed_by:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true

    # ─── TemplateDeploymentFailedPayload ───
    TemplateDeploymentFailedPayload:
      type: object
      required: [event, deployment_id, template_id, version, environment, error_message, failed_at]
      properties:
        event:
          type: string
          const: template.deployment_failed
        deployment_id:
          type: string
          format: uuid
        template_id:
          type: string
          format: uuid
        version:
          type: string
          description: Semantic version that failed to deploy
        environment:
          type: string
          enum: [dev, staging, production]
        deployment_stage:
          type: string
          enum: [select, configure, connect_data, provision_memory, deploy_swarm, operational, failed, rolled_back]
        error_message:
          type: string
        error_code:
          type: string
        failed_at:
          type: string
          format: date-time
        failed_by:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true

    # ─── TemplateUndeployedPayload ───
    TemplateUndeployedPayload:
      type: object
      required: [event, deployment_id, template_id, version, environment, undeployed_at]
      properties:
        event:
          type: string
          const: template.undeployed
        deployment_id:
          type: string
          format: uuid
        template_id:
          type: string
          format: uuid
        version:
          type: string
          description: Semantic version that was undeployed
        environment:
          type: string
          enum: [dev, staging, production]
        undeployed_at:
          type: string
          format: date-time
        undeployed_by:
          type: string
          format: uuid
        reason:
          type: string
        tenant_id:
          type: string
          format: uuid
        metadata:
          type: object
          additionalProperties: true

    # ─── TemplateDeletedPayload ───
    TemplateDeletedPayload:
      type: object
      required: [event, template_id, deleted_at]
      properties:
        event:
          type: string
          const: template.deleted
        template_id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        deleted_at:
          type: string
          format: date-time
        deleted_by:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid

    # ─── TemplateVersionedPayload ───
    TemplateVersionedPayload:
      type: object
      required: [event, template_id, version, created_at]
      properties:
        event:
          type: string
          const: template.versioned
        template_id:
          type: string
          format: uuid
        version:
          type: string
          description: New semantic version
        previous_version:
          type: string
          description: Previous semantic version
        name:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid

    # ─── TemplateClonedPayload ───
    TemplateClonedPayload:
      type: object
      required: [event, source_template_id, cloned_template_id, created_at]
      properties:
        event:
          type: string
          const: template.cloned
        source_template_id:
          type: string
          format: uuid
        cloned_template_id:
          type: string
          format: uuid
        name:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid

  traits:
    commonHeaders:
      description: Standard CloudEvents-compatible headers for all template events.
      headers:
        schema:
          type: object
          properties:
            id:
              type: string
              format: uuid
              description: Unique event identifier
            source:
              type: string
              description: Event source identifier
            specversion:
              type: string
              description: CloudEvents spec version
            type:
              type: string
              description: Event type
            subject:
              type: string
              description: Subject of the event
            time:
              type: string
              format: date-time
            tenant_id:
              type: string
              format: uuid
              description: Multi-tenant partition key
