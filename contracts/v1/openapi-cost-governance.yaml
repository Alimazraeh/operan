openapi: 3.0.3
info:
  title: Operan Cost Governance Engine API
  description: Prevent runaway operational costs through token budgets, execution quotas, agent throttling, usage forecasting, and tenant billing. Module 17.
  version: 1.0.0

servers:
  - url: /api/v1/cost-governance

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /token-budgets:
    post:
      summary: Create token budget
      operationId: createTokenBudget
      tags: [token-budgets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTokenBudgetRequest'
      responses:
        '201':
          description: Token budget created

    get:
      summary: List token budgets
      operationId: listTokenBudgets
      tags: [token-budgets]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, warning, exceeded, disabled]
      responses:
        '200':
          description: Token budget list

  /token-budgets/{id}:
    get:
      summary: Get token budget details
      operationId: getTokenBudget
      tags: [token-budgets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Token budget details

    patch:
      summary: Update token budget
      operationId: updateTokenBudget
      tags: [token-budgets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTokenBudgetRequest'
      responses:
        '200':
          description: Token budget updated

    delete:
      summary: Delete token budget
      operationId: deleteTokenBudget
      tags: [token-budgets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Token budget deleted

  /token-budgets/{id}/usage:
    get:
      summary: Get token usage for budget
      operationId: getTokenBudgetUsage
      tags: [token-budgets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: period
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly]
      responses:
        '200':
          description: Token usage data

  /token-budgets/{id}/alert:
    post:
      summary: Trigger token budget alert
      operationId: triggerTokenBudgetAlert
      tags: [token-budgets]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Alert triggered

  /execution-quotas:
    post:
      summary: Create execution quota
      operationId: createExecutionQuota
      tags: [quotas]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExecutionQuotaRequest'
      responses:
        '201':
          description: Execution quota created

    get:
      summary: List execution quotas
      operationId: listExecutionQuotas
      tags: [quotas]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Execution quota list

  /execution-quotas/{id}:
    get:
      summary: Get execution quota details
      operationId: getExecutionQuota
      tags: [quotas]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Execution quota details

    patch:
      summary: Update execution quota
      operationId: updateExecutionQuota
      tags: [quotas]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExecutionQuotaRequest'
      responses:
        '200':
          description: Execution quota updated

    delete:
      summary: Delete execution quota
      operationId: deleteExecutionQuota
      tags: [quotas]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Execution quota deleted

  /execution-quotas/{id}/check:
    post:
      summary: Check execution quota
      operationId: checkExecutionQuota
      tags: [quotas]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecutionCheckRequest'
      responses:
        '200':
          description: Quota check result

  /agent-throttling:
    post:
      summary: Create agent throttling rule
      operationId: createThrottlingRule
      tags: [throttling]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateThrottlingRuleRequest'
      responses:
        '201':
          description: Throttling rule created

    get:
      summary: List agent throttling rules
      operationId: listThrottlingRules
      tags: [throttling]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Throttling rule list

  /agent-throttling/{id}:
    get:
      summary: Get agent throttling rule
      operationId: getThrottlingRule
      tags: [throttling]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Throttling rule

    patch:
      summary: Update agent throttling rule
      operationId: updateThrottlingRule
      tags: [throttling]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThrottlingRuleRequest'
      responses:
        '200':
          description: Throttling rule updated

    delete:
      summary: Delete agent throttling rule
      operationId: deleteThrottlingRule
      tags: [throttling]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Throttling rule deleted

  /agent-throttling/{id}/status:
    get:
      summary: Get throttling status for agent
      operationId: getThrottlingStatus
      tags: [throttling]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Throttling status

  /usage-forecasting:
    post:
      summary: Generate usage forecast
      operationId: generateForecast
      tags: [forecasting]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateForecastRequest'
      responses:
        '202':
          description: Forecast generation started

    get:
      summary: List usage forecasts
      operationId: listForecasts
      tags: [forecasting]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Forecast list

  /usage-forecasting/{id}:
    get:
      summary: Get usage forecast details
      operationId: getForecast
      tags: [forecasting]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Forecast details

  /usage-forecasting/{id}/export:
    post:
      summary: Export usage forecast
      operationId: exportForecast
      tags: [forecasting]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportForecastRequest'
      responses:
        '202':
          description: Export started

  /tenant-billing:
    post:
      summary: Create tenant billing record
      operationId: createBillingRecord
      tags: [billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBillingRecordRequest'
      responses:
        '201':
          description: Billing record created

    get:
      summary: List tenant billing records
      operationId: listBillingRecords
      tags: [billing]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: period_start
          in: query
          schema:
            type: string
            format: date-time
        - name: period_end
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Billing record list

  /tenant-billing/{id}:
    get:
      summary: Get tenant billing record
      operationId: getBillingRecord
      tags: [billing]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Billing record details

  /tenant-billing/{id}/invoice:
    post:
      summary: Generate invoice for billing record
      operationId: generateInvoice
      tags: [billing]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Invoice generation started

  /tenant-billing/export:
    post:
      summary: Export billing records
      operationId: exportBillingRecords
      tags: [billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportBillingRequest'
      responses:
        '202':
          description: Export started

  /cost-dashboard:
    get:
      summary: Get cost governance dashboard
      operationId: getCostDashboard
      tags: [dashboard]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cost dashboard data

  /health:
    get:
      summary: Service health check
      operationId: healthCheck
      tags: [health]
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    # Token Budget Schemas
    CreateTokenBudgetRequest:
      type: object
      required:
        - tenant_id
        - name
        - limit_tokens
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        limit_tokens:
          type: integer
          minimum: 1
        period:
          type: string
          enum: [daily, weekly, monthly, yearly]
        target_type:
          type: string
          enum: [tenant, department, team, agent, user, model]
        target_id:
          type: string
          format: uuid
        warning_threshold:
          type: number
          minimum: 0
          maximum: 100
          default: 80
        alert_actions:
          type: array
          items:
            type: string
            enum: [notify, throttle, block, escalate]
        metadata:
          type: object
        tags:
          type: array
          items:
            type: string

    TokenBudget:
      type: object
      required:
        - id
        - name
        - limit_tokens
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        limit_tokens:
          type: integer
        period:
          type: string
          enum: [daily, weekly, monthly, yearly]
        current_usage:
          type: integer
        target_type:
          type: string
          enum: [tenant, department, team, agent, user, model]
        target_id:
          type: string
          format: uuid
        warning_threshold:
          type: number
        alert_actions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, warning, exceeded, disabled]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        metadata:
          type: object
        tags:
          type: array
          items:
            type: string

    UpdateTokenBudgetRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        limit_tokens:
          type: integer
        warning_threshold:
          type: number
        alert_actions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, warning, exceeded, disabled]
        metadata:
          type: object

    TokenBudgetUsage:
      type: object
      required:
        - budget_id
        - current_usage
        - limit
      properties:
        budget_id:
          type: string
          format: uuid
        current_usage:
          type: integer
        limit:
          type: integer
        percentage_used:
          type: number
        remaining:
          type: integer
        period:
          type: string
          enum: [daily, weekly, monthly]
        daily_breakdown:
          type: array
          items:
            type: object
        top_consumers:
          type: array
          items:
            type: object

    # Execution Quota Schemas
    CreateExecutionQuotaRequest:
      type: object
      required:
        - tenant_id
        - name
        - max_executions
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        max_executions:
          type: integer
          minimum: 1
        period:
          type: string
          enum: [daily, weekly, monthly]
        target_type:
          type: string
          enum: [tenant, department, team, agent, workflow]
        target_id:
          type: string
          format: uuid
        actions:
          type: array
          items:
            type: string
        override_roles:
          type: array
          items:
            type: string
        metadata:
          type: object

    ExecutionQuota:
      type: object
      required:
        - id
        - name
        - max_executions
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        max_executions:
          type: integer
        period:
          type: string
          enum: [daily, weekly, monthly]
        current_executions:
          type: integer
        target_type:
          type: string
          enum: [tenant, department, team, agent, workflow]
        target_id:
          type: string
          format: uuid
        actions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, warning, exceeded, disabled]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        metadata:
          type: object

    UpdateExecutionQuotaRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        max_executions:
          type: integer
        actions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, warning, exceeded, disabled]
        metadata:
          type: object

    ExecutionCheckRequest:
      type: object
      required:
        - tenant_id
        - target_type
        - target_id
      properties:
        tenant_id:
          type: string
          format: uuid
        target_type:
          type: string
          enum: [tenant, department, team, agent, workflow]
        target_id:
          type: string
          format: uuid
        action_type:
          type: string
        requested_executions:
          type: integer
          default: 1

    ExecutionCheckResult:
      type: object
      required:
        - allowed
      properties:
        allowed:
          type: boolean
        quota_id:
          type: string
          format: uuid
        quota_name:
          type: string
        current_usage:
          type: integer
        limit:
          type: integer
        remaining:
          type: integer
        action_taken:
          type: string
        retry_after:
          type: string
          format: date-time

    # Agent Throttling Schemas
    CreateThrottlingRuleRequest:
      type: object
      required:
        - tenant_id
        - name
        - rate_limit
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        rate_limit:
          type: integer
          minimum: 1
        window_seconds:
          type: integer
          minimum: 1
          default: 60
        target_type:
          type: string
          enum: [agent, model, tenant, department]
        target_id:
          type: string
          format: uuid
        throttle_actions:
          type: array
          items:
            type: string
            enum: [queue, delay, reject, backoff]
        priority:
          type: integer
          minimum: 1
          default: 5
        metadata:
          type: object

    ThrottlingRule:
      type: object
      required:
        - id
        - name
        - rate_limit
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        rate_limit:
          type: integer
        window_seconds:
          type: integer
        target_type:
          type: string
          enum: [agent, model, tenant, department]
        target_id:
          type: string
          format: uuid
        throttle_actions:
          type: array
          items:
            type: string
        priority:
          type: integer
        current_rate:
          type: integer
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        metadata:
          type: object

    UpdateThrottlingRuleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        rate_limit:
          type: integer
        window_seconds:
          type: integer
        throttle_actions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]
        metadata:
          type: object

    ThrottlingStatus:
      type: object
      required:
        - rule_id
        - throttled
      properties:
        rule_id:
          type: string
          format: uuid
        rule_name:
          type: string
        throttled:
          type: boolean
        current_rate:
          type: integer
        rate_limit:
          type: integer
        window_seconds:
          type: integer
        throttled_count:
          type: integer
        last_throttled_at:
          type: string
          format: date-time

    # Usage Forecasting Schemas
    GenerateForecastRequest:
      type: object
      required:
        - tenant_id
        - forecast_type
      properties:
        tenant_id:
          type: string
          format: uuid
        forecast_type:
          type: string
          enum: [token_usage, execution_count, cost, resource_utilization]
        horizon_days:
          type: integer
          minimum: 1
          maximum: 365
          default: 30
        granularity:
          type: string
          enum: [hourly, daily, weekly]
        include_models:
          type: array
          items:
            type: string
        metadata:
          type: object

    UsageForecast:
      type: object
      required:
        - id
        - tenant_id
        - forecast_type
        - generated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        forecast_type:
          type: string
        horizon_days:
          type: integer
        granularity:
          type: string
        generated_at:
          type: string
          format: date-time
        predictions:
          type: array
          items:
            type: object
        confidence_intervals:
          type: object
        recommendations:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [generating, completed, failed]

    ExportForecastRequest:
      type: object
      required:
        - format
      properties:
        format:
          type: string
          enum: [csv, json, pdf]
        include_raw_data:
          type: boolean
          default: true

    # Billing Schemas
    CreateBillingRecordRequest:
      type: object
      required:
        - tenant_id
        - period_start
        - period_end
      properties:
        tenant_id:
          type: string
          format: uuid
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        charge_items:
          type: array
          items:
            type: object
        currency:
          type: string
          default: USD
        metadata:
          type: object

    BillingRecord:
      type: object
      required:
        - id
        - tenant_id
        - period_start
        - period_end
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        charge_items:
          type: array
          items:
            type: object
        total_cost:
          type: number
        currency:
          type: string
        invoice_id:
          type: string
        status:
          type: string
          enum: [pending, invoiced, paid, disputed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        metadata:
          type: object

    ExportBillingRequest:
      type: object
      required:
        - tenant_id
        - format
      properties:
        tenant_id:
          type: string
          format: uuid
        format:
          type: string
          enum: [csv, json, pdf]
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time

    # Dashboard Schemas
    CostDashboard:
      type: object
      required:
        - tenant_id
      properties:
        tenant_id:
          type: string
          format: uuid
        total_tokens_used:
          type: integer
        total_tokens_budget:
          type: integer
        token_usage_percentage:
          type: number
        total_executions:
          type: integer
        active_quotas:
          type: integer
        throttled_requests:
          type: integer
        estimated_cost:
          type: number
        currency:
          type: string
        top_consumers:
          type: array
          items:
            type: object
        budget_alerts:
          type: array
          items:
            type: object
        forecast_summary:
          type: object

    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        uptime_seconds:
          type: integer
        active_budgets:
          type: integer
        active_quotas:
          type: integer
        active_throttling_rules:
          type: integer
        pending_forecasts:
          type: integer
        last_check:
          type: string
          format: date-time
