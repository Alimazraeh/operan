openapi: 3.0.3
info:
  title: Operan Memory Fabric API
  description: Persistent organizational cognition layer. Semantic, episodic, procedural, graph, and institutional memory with lineage tracking and provenance. Module 07.
  version: 1.0.0

servers:
  - url: /api/v1/memory

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /semantic:
    post:
      summary: Store semantic memory entry
      operationId: storeSemantic
      tags: [semantic]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticEntry'
      responses:
        '201':
          description: Semantic memory stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryResult'

    get:
      summary: Query semantic memory
      operationId: querySemantic
      tags: [semantic]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: top_k
          in: query
          schema:
            type: integer
            default: 10
        - name: min_confidence
          in: query
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 1
        - name: memory_type
          in: query
          schema:
            type: string
            enum: [fact, document_chunk, embedding, knowledge]
      responses:
        '200':
          description: Semantic memory results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemorySearchResult'

  /episodic:
    post:
      summary: Store an episode
      operationId: storeEpisode
      tags: [episodic]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpisodeEntry'
      responses:
        '201':
          description: Episode stored

    get:
      summary: Query episodic memory
      operationId: queryEpisodic
      tags: [episodic]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: department_id
          in: query
          schema:
            type: string
            format: uuid
        - name: agent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: workflow_id
          in: query
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          schema:
            type: string
            format: date-time
        - name: event_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Episodic memory results

  /procedural:
    post:
      summary: Register a procedure
      operationId: registerProcedure
      tags: [procedural]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcedureEntry'
      responses:
        '201':
          description: Procedure registered

    get:
      summary: Query procedural memory
      operationId: queryProcedures
      tags: [procedural]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: domain
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Procedures list

  /graph:
    post:
      summary: Create graph memory edges
      operationId: createGraphEdges
      tags: [graph]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GraphEdgeBatch'
      responses:
        '201':
          description: Graph edges created

    get:
      summary: Query graph memory
      operationId: queryGraph
      tags: [graph]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: string
            format: uuid
        - name: depth
          in: query
          schema:
            type: integer
            default: 2
        - name: max_results
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: Graph memory results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphResult'

  /institutional:
    get:
      summary: Get institutional memory summaries
      operationId: getInstitutionalMemory
      tags: [institutional]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: time_window
          in: query
          schema:
            type: string
            default: "30d"
        - name: domain
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Institutional memory summaries

  /knowledge/{id}/lineage:
    get:
      summary: Get memory entry lineage
      operationId: getMemoryLineage
      tags: [lineage]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Memory lineage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryLineage'

  /knowledge/{id}/provenance:
    get:
      summary: Get memory entry provenance
      operationId: getMemoryProvenance
      tags: [provenance]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Memory provenance

  /memory/flush:
    delete:
      summary: Flush expired memory entries
      operationId: flushExpiredMemory
      tags: [maintenance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FlushRequest'
      responses:
        '200':
          description: Flush complete

  /memory/compress:
    post:
      summary: Compress episodic memory into summaries
      operationId: compressEpisodicMemory
      tags: [maintenance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompressRequest'
      responses:
        '202':
          description: Compression started

  /health:
    get:
      summary: Get memory fabric health
      operationId: memoryHealth
      tags: [health]
      responses:
        '200':
          description: Memory fabric health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryHealth'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    SemanticEntry:
      type: object
      required:
        - tenant_id
        - content
        - embedding
      properties:
        tenant_id:
          type: string
          format: uuid
        content:
          type: string
        embedding:
          type: array
          items:
            type: number
            format: float
        metadata:
          type: object
        tags:
          type: array
          items:
            type: string
        source_document:
          type: string
          format: uuid
        confidence:
          type: number
          format: float
        expires_at:
          type: string
          format: date-time

    MemoryResult:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [stored, indexed, failed]
        storage_backend:
          type: string
        vector_id:
          type: string

    MemorySearchResult:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SemanticResult'
        total:
          type: integer
        query_latency_ms:
          type: integer

    SemanticResult:
      type: object
      required:
        - id
        - content
        - similarity
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        similarity:
          type: number
          format: float
        source_document:
          type: string
          format: uuid
        metadata:
          type: object
        confidence:
          type: number
          format: float

    EpisodeEntry:
      type: object
      required:
        - tenant_id
        - department_id
        - timestamp
      properties:
        tenant_id:
          type: string
          format: uuid
        department_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        event_type:
          type: string
        description:
          type: string
        context:
          type: object
        outcome:
          type: string
          enum: [success, failure, partial, pending]
        evidence:
          type: array
          items:
            type: string
            format: uuid
        timestamp:
          type: string
          format: date-time
        memory_weight:
          type: number
          format: float
          description: Importance weight for compression priority

    ProcedureEntry:
      type: object
      required:
        - tenant_id
        - name
        - steps
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        domain:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/ProcedureStep'
        conditions:
          type: array
          items:
            type: string
        version:
          type: string
        last_updated:
          type: string
          format: date-time

    ProcedureStep:
      type: object
      required:
        - order
        - action
      properties:
        order:
          type: integer
        action:
          type: string
        agent_role:
          type: string
        tools_required:
          type: array
          items:
            type: string
        expected_output:
          type: string

    GraphEdgeBatch:
      type: object
      required:
        - tenant_id
        - edges
      properties:
        tenant_id:
          type: string
          format: uuid
        edges:
          type: array
          items:
            $ref: '#/components/schemas/GraphEdge'

    GraphEdge:
      type: object
      required:
        - source
        - target
        - relation
      properties:
        source:
          type: string
        target:
          type: string
        relation:
          type: string
        metadata:
          type: object
        weight:
          type: number
          format: float

    GraphResult:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/GraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/GraphEdge'
        traversal_count:
          type: integer

    GraphNode:
      type: object
      required:
        - id
        - entity_type
      properties:
        id:
          type: string
        entity_type:
          type: string
        label:
          type: string
        properties:
          type: object

    MemoryLineage:
      type: object
      required:
        - entry_id
        - created_at
        - chain
      properties:
        entry_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        chain:
          type: array
          items:
            $ref: '#/components/schemas/LineageNode'

    LineageNode:
      type: object
      required:
        - stage
        - timestamp
      properties:
        stage:
          type: string
          enum: [source, ingest, parse, chunk, embed, index, graph_build, merge]
        timestamp:
          type: string
          format: date-time
        source_id:
          type: string
          format: uuid
        details:
          type: object

    FlushRequest:
      type: object
      required:
        - tenant_id
      properties:
        tenant_id:
          type: string
          format: uuid
        memory_types:
          type: array
          items:
            type: string
            enum: [semantic, episodic, procedural, graph]
        expire_threshold:
          type: string
          description: Max age of entries to flush (e.g., "90d")

    CompressRequest:
      type: object
      required:
        - tenant_id
      properties:
        tenant_id:
          type: string
          format: uuid
        source_type:
          type: string
          enum: [episodic]
        retention_days:
          type: integer
        summary_model:
          type: string

    MemoryHealth:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, critical]
        semantic_storage:
          $ref: '#/components/schemas/StorageHealth'
        graph_storage:
          $ref: '#/components/schemas/StorageHealth'
        episodic_storage:
          $ref: '#/components/schemas/StorageHealth'
        total_entries:
          type: integer
        compression_ratio:
          type: number
          format: float
        avg_query_latency_ms:
          type: integer

    StorageHealth:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, offline]
        backend:
          type: string
        entries_count:
          type: integer
        last_compression:
          type: string
          format: date-time
