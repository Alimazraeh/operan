openapi: 3.0.3
info:
  title: Operan Arabic Language Intelligence Layer API
  description: Arabic-first NLP capabilities including embeddings, terminology governance, dialect normalization, OCR, semantic retrieval, and translation memory. Module 19: arabic_language_core.
  version: 1.0.0

servers:
  - url: /api/v1/arabic-language

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /embeddings:
    post:
      summary: Generate Arabic embeddings
      operationId: generateArabicEmbeddings
      tags: [embeddings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateArabicEmbeddingsRequest'
      responses:
        '200':
          description: Arabic embeddings generated

    get:
      summary: List embedding jobs
      operationId: listArabicEmbeddingJobs
      tags: [embeddings]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processing, completed, failed]
      responses:
        '200':
          description: Embedding job list

  /embeddings/{id}:
    get:
      summary: Get embedding job status
      operationId: getArabicEmbeddingJob
      tags: [embeddings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Embedding job status

  /terminology:
    post:
      summary: Create terminology entry
      operationId: createTerminologyEntry
      tags: [terminology]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTerminologyEntryRequest'
      responses:
        '201':
          description: Terminology entry created

    get:
      summary: List terminology entries
      operationId: listTerminologyEntries
      tags: [terminology]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: language_code
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Terminology entry list

  /terminology/{id}:
    get:
      summary: Get terminology entry
      operationId: getTerminologyEntry
      tags: [terminology]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Terminology entry

    patch:
      summary: Update terminology entry
      operationId: updateTerminologyEntry
      tags: [terminology]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTerminologyEntryRequest'
      responses:
        '200':
          description: Terminology entry updated

    delete:
      summary: Delete terminology entry
      operationId: deleteTerminologyEntry
      tags: [terminology]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Terminology entry deleted

  /terminology/search:
    post:
      summary: Search terminology
      operationId: searchTerminology
      tags: [terminology]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchTerminologyRequest'
      responses:
        '200':
          description: Terminology search results

  /dialect-normalization:
    post:
      summary: Normalize text to Modern Standard Arabic
      operationId: normalizeDialect
      tags: [dialect-normalization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DialectNormalizationRequest'
      responses:
        '200':
          description: Normalized text

    get:
      summary: List normalization rules
      operationId: listNormalizationRules
      tags: [dialect-normalization]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Normalization rule list

  /dialect-normalization/{id}:
    get:
      summary: Get normalization rule
      operationId: getNormalizationRule
      tags: [dialect-normalization]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Normalization rule

    patch:
      summary: Update normalization rule
      operationId: updateNormalizationRule
      tags: [dialect-normalization]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNormalizationRuleRequest'
      responses:
        '200':
          description: Normalization rule updated

  /ocr:
    post:
      summary: Process Arabic OCR
      operationId: processArabicOCR
      tags: [ocr]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArabicOCRRequest'
      responses:
        '202':
          description: OCR processing started

    get:
      summary: List OCR jobs
      operationId: listArabicOCRJobs
      tags: [ocr]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, processing, completed, failed]
      responses:
        '200':
          description: OCR job list

  /ocr/{id}:
    get:
      summary: Get OCR job results
      operationId: getArabicOCRJob
      tags: [ocr]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OCR job results

  /semantic-retrieval:
    post:
      summary: Perform semantic search
      operationId: semanticSearch
      tags: [semantic-retrieval]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticSearchRequest'
      responses:
        '200':
          description: Semantic search results

  /translation-memory:
    post:
      summary: Create translation memory entry
      operationId: createTranslationMemoryEntry
      tags: [translation-memory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTranslationMemoryEntryRequest'
      responses:
        '201':
          description: Translation memory entry created

    get:
      summary: List translation memory entries
      operationId: listTranslationMemoryEntries
      tags: [translation-memory]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: source_lang
          in: query
          schema:
            type: string
        - name: target_lang
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Translation memory entry list

  /translation-memory/{id}:
    get:
      summary: Get translation memory entry
      operationId: getTranslationMemoryEntry
      tags: [translation-memory]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Translation memory entry

    patch:
      summary: Update translation memory entry
      operationId: updateTranslationMemoryEntry
      tags: [translation-memory]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTranslationMemoryEntryRequest'
      responses:
        '200':
          description: Translation memory entry updated

    delete:
      summary: Delete translation memory entry
      operationId: deleteTranslationMemoryEntry
      tags: [translation-memory]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Translation memory entry deleted

  /translation-memory/search:
    post:
      summary: Search translation memory
      operationId: searchTranslationMemory
      tags: [translation-memory]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchTranslationMemoryRequest'
      responses:
        '200':
          description: Translation memory search results

  /health:
    get:
      summary: Service health check
      operationId: healthCheck
      tags: [health]
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    # Embedding Schemas
    GenerateArabicEmbeddingsRequest:
      type: object
      required:
        - tenant_id
        - texts
      properties:
        tenant_id:
          type: string
          format: uuid
        texts:
          type: array
          items:
            type: string
        model:
          type: string
          default: "arabic-embeddings-v1"
        normalize_dialect:
          type: boolean
          default: false
        metadata:
          type: object

    ArabicEmbedding:
      type: object
      required:
        - id
        - model
      properties:
        id:
          type: string
          format: uuid
        model:
          type: string
        texts:
          type: array
          items:
            type: object
        embedding_dimensions:
          type: integer
        created_at:
          type: string
          format: date-time

    # Terminology Schemas
    CreateTerminologyEntryRequest:
      type: object
      required:
        - tenant_id
        - term
      properties:
        tenant_id:
          type: string
          format: uuid
        term:
          type: string
        translation:
          type: string
        definition:
          type: string
        category:
          type: string
        source_language:
          type: string
          default: "ar"
        target_language:
          type: string
        domain:
          type: string
        usage_examples:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, approved, deprecated]
        metadata:
          type: object

    TerminologyEntry:
      type: object
      required:
        - id
        - term
      properties: {
        "id": { "type": "string", "format": "uuid" },
        "tenant_id": { "type": "string", "format": "uuid" },
        "term": { "type": "string" },
        "translation": { "type": "string" },
        "definition": { "type": "string" },
        "category": { "type": "string" },
        "source_language": { "type": "string" },
        "target_language": { "type": "string" },
        "domain": { "type": "string" },
        "usage_examples": { "type": "array", "items": { "type": "string" } },
        "status": { "type": "string", "enum": ["draft", "approved", "deprecated"] },
        "created_at": { "type": "string", "format": "date-time" },
        "updated_at": { "type": "string", "format": "date-time" },
        "metadata": { "type": "object" }
      }

    UpdateTerminologyEntryRequest:
      type: object
      properties: {
        "term": { "type": "string" },
        "translation": { "type": "string" },
        "definition": { "type": "string" },
        "category": { "type": "string" },
        "domain": { "type": "string" },
        "usage_examples": { "type": "array", "items": { "type": "string" } },
        "status": { "type": "string", "enum": ["draft", "approved", "deprecated"] },
        "metadata": { "type": "object" }
      }

    SearchTerminologyRequest:
      type: object
      required:
        - tenant_id
        - query
      properties:
        tenant_id:
          type: string
          format: uuid
        query:
          type: string
        category:
          type: string
        domain:
          type: string
        language_code:
          type: string
        status:
          type: string
          enum: [draft, approved, deprecated]
        limit:
          type: integer
          default: 20
        offset:
          type: integer
          default: 0

    # Dialect Normalization Schemas
    DialectNormalizationRequest:
      type: object
      required:
        - tenant_id
        - texts
      properties:
        tenant_id:
          type: string
          format: uuid
        texts:
          type: array
          items:
            type: string
        source_dialect:
          type: string
        target_dialect:
          type: string
          default: "MSA"
        preserve_formatting:
          type: boolean
          default: true

    DialectNormalizationResult:
      type: object
      required:
        - input
        - output
      properties:
        input:
          type: string
        output:
          type: string
        source_dialect:
          type: string
        target_dialect:
          type: string
        confidence:
          type: number

    NormalizeNormalizationRuleRequest:
      type: object
      required:
        - tenant_id
        - name
        - rules
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        rules:
          type: array
          items:
            type: object
        source_dialect:
          type: string
        target_dialect:
          type: string
          default: "MSA"
        metadata:
          type: object

    NormalizationRule:
      type: object
      required:
        - id
        - name
        - rules
      properties: {
        "id": { "type": "string", "format": "uuid" },
        "tenant_id": { "type": "string", "format": "uuid" },
        "name": { "type": "string" },
        "description": { "type": "string" },
        "rules": { "type": "array", "items": { "type": "object" } },
        "source_dialect": { "type": "string" },
        "target_dialect": { "type": "string" },
        "status": { "type": "string", "enum": ["active", "inactive"] },
        "created_at": { "type": "string", "format": "date-time" },
        "updated_at": { "type": "string", "format": "date-time" },
        "metadata": { "type": "object" }
      }

    UpdateNormalizationRuleRequest:
      type: object
      properties: {
        "name": { "type": "string" },
        "description": { "type": "string" },
        "rules": { "type": "array", "items": { "type": "object" } },
        "status": { "type": "string", "enum": ["active", "inactive"] },
        "metadata": { "type": "object" }
      }

    # OCR Schemas
    ArabicOCRRequest:
      type: object
      required:
        - tenant_id
        - image
      properties:
        tenant_id:
          type: string
          format: uuid
        image:
          type: string
          format: byte
        image_url:
          type: string
        language:
          type: string
          default: "ar"
        output_format:
          type: string
          enum: [text, json, hocr]
        preprocess:
          type: boolean
          default: true

    ArabicOCRResult:
      type: object
      required:
        - id
        - tenant_id
        - text
      properties: {
        "id": { "type": "string", "format": "uuid" },
        "tenant_id": { "type": "string", "format": "uuid" },
        "text": { "type": "string" },
        "confidence": { "type": "number" },
        "language": { "type": "string" },
        "words": { "type": "array", "items": { "type": "object" } },
        "pages": { "type": "integer" },
        "status": { "type": "string", "enum": ["pending", "processing", "completed", "failed"] },
        "error_message": { "type": "string" },
        "created_at": { "type": "string", "format": "date-time" },
        "completed_at": { "type": "string", "format": "date-time" }
      }

    # Semantic Retrieval Schemas
    SemanticSearchRequest:
      type: object
      required:
        - tenant_id
        - query
      properties:
        tenant_id:
          type: string
          format: uuid
        query:
          type: string
        collection:
          type: string
        top_k:
          type: integer
          default: 10
        min_score:
          type: number
          default: 0.7
        filters:
          type: object
        metadata:
          type: object

    SemanticSearchResult:
      type: object
      required:
        - query
        - results
      properties: {
        "query": { "type": "string" },
        "results": { "type": "array", "items": { "type": "object" } },
        "query_embedding": { "type": "array", "items": { "type": "number" } },
        "total_results": { "type": "integer" }
      }

    # Translation Memory Schemas
    CreateTranslationMemoryEntryRequest:
      type: object
      required:
        - tenant_id
        - source_text
        - target_text
        - source_lang
        - target_lang
      properties:
        tenant_id:
          type: string
          format: uuid
        source_text:
          type: string
        target_text:
          type: string
        source_lang:
          type: string
        target_lang:
          type: string
        domain:
          type: string
        context:
          type: string
        quality_score:
          type: number
        status:
          type: string
          enum: [draft, approved, deprecated]
        metadata:
          type: object

    TranslationMemoryEntry:
      type: object
      required:
        - id
        - source_text
        - target_text
      properties: {
        "id": { "type": "string", "format": "uuid" },
        "tenant_id": { "type": "string", "format": "uuid" },
        "source_text": { "type": "string" },
        "target_text": { "type": "string" },
        "source_lang": { "type": "string" },
        "target_lang": { "type": "string" },
        "domain": { "type": "string" },
        "context": { "type": "string" },
        "quality_score": { "type": "number" },
        "usage_count": { "type": "integer" },
        "status": { "type": "string", "enum": ["draft", "approved", "deprecated"] },
        "created_at": { "type": "string", "format": "date-time" },
        "updated_at": { "type": "string", "format": "date-time" },
        "metadata": { "type": "object" }
      }

    UpdateTranslationMemoryEntryRequest:
      type: object
      properties: {
        "source_text": { "type": "string" },
        "target_text": { "type": "string" },
        "domain": { "type": "string" },
        "context": { "type": "string" },
        "quality_score": { "type": "number" },
        "status": { "type": "string", "enum": ["draft", "approved", "deprecated"] },
        "metadata": { "type": "object" }
      }

    SearchTranslationMemoryRequest:
      type: object
      required:
        - tenant_id
        - source_text
      properties:
        tenant_id:
          type: string
          format: uuid
        source_text:
          type: string
        source_lang:
          type: string
        target_lang:
          type: string
        domain:
          type: string
        top_k:
          type: integer
          default: 5
        min_similarity:
          type: number
          default: 0.5

    # Health Schemas
    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        uptime_seconds:
          type: integer
        active_embeddings:
          type: integer
        active_ocr_jobs:
          type: integer
        terminology_entries:
          type: integer
        translation_memory_entries:
          type: integer
        last_check:
          type: string
          format: date-time
