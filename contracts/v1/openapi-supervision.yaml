openapi: 3.0.3
info:
  title: Operan Human Supervision Layer API
  description: Govern autonomous execution safely. Approvals, escalations, interventions, override controls, and human-in-the-loop review. Module 09.
  version: 1.0.0

servers:
  - url: /api/v1/supervision

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /approvals:
    post:
      summary: Submit an approval request
      operationId: submitApproval
      tags: [approvals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitApprovalRequest'
      responses:
        '201':
          description: Approval request submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalRequest'

    get:
      summary: List approval requests
      operationId: listApprovals
      tags: [approvals]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, expired, withdrawn]
        - name: requester_id
          in: query
          schema:
            type: string
            format: uuid
        - name: approver_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Approval list

  /approvals/{id}:
    get:
      summary: Get approval details
      operationId: getApproval
      tags: [approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Approval details

  /approvals/{id}/approve:
    post:
      summary: Approve a request
      operationId: approveRequest
      tags: [approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecision'
      responses:
        '200':
          description: Approval recorded

  /approvals/{id}/reject:
    post:
      summary: Reject a request
      operationId: rejectRequest
      tags: [approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectionDecision'
      responses:
        '200':
          description: Rejection recorded

  /approvals/{id}/delegate:
    post:
      summary: Delegate an approval request
      operationId: delegateApproval
      tags: [approvals]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelegationRequest'
      responses:
        '200':
          description: Approval delegated

  /escalations:
    post:
      summary: Submit an escalation
      operationId: submitEscalation
      tags: [escalations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitEscalationRequest'
      responses:
        '201':
          description: Escalation submitted

    get:
      summary: List escalations
      operationId: listEscalations
      tags: [escalations]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical, p0]
      responses:
        '200':
          description: Escalation list

  /escalations/{id}:
    get:
      summary: Get escalation details
      operationId: getEscalation
      tags: [escalations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Escalation details

  /escalations/{id}/resolve:
    post:
      summary: Resolve an escalation
      operationId: resolveEscalation
      tags: [escalations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveEscalationRequest'
      responses:
        '200':
          description: Escalation resolved

  /interventions:
    post:
      summary: Issue an intervention
      operationId: createIntervention
      tags: [interventions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterventionRequest'
      responses:
        '201':
          description: Intervention issued

    get:
      summary: List active interventions
      operationId: listInterventions
      tags: [interventions]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: target_type
          in: query
          schema:
            type: string
            enum: [agent, department, workflow, system]
      responses:
        '200':
          description: Active interventions

  /interventions/{id}:
    get:
      summary: Get intervention details
      operationId: getIntervention
      tags: [interventions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Intervention details

  /interventions/{id}/revoke:
    post:
      summary: Revoke an intervention
      operationId: revokeIntervention
      tags: [interventions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Intervention revoked

  /overviews/queue:
    get:
      summary: Get human review queue summary
      operationId: getQueueSummary
      tags: [overviews]
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: string
            enum: [approvals, escalations, interventions, all]
      responses:
        '200':
          description: Queue summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueSummary'

  /overviews/risk-dashboard:
    get:
      summary: Get risk dashboard
      operationId: getRiskDashboard
      tags: [overviews]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Risk dashboard

  /human-in-the-loop/{request_id}/answer:
    post:
      summary: Provide answer to human-in-the-loop question
      operationId: answerHITLQuestion
      tags: [hitl]
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HITLAnswer'
      responses:
        '200':
          description: Answer recorded

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    SubmitApprovalRequest:
      type: object
      required:
        - tenant_id
        - requester_id
        - title
        - action_type
      properties:
        tenant_id:
          type: string
          format: uuid
        requester_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        action_type:
          type: string
          description: Type of action requiring approval (e.g., "payment", "contract_sign", "hiring_decision")
        target_resource:
          type: string
          format: uuid
        target_type:
          type: string
          enum: [agent, department, workflow, system]
        approval_model:
          type: string
          enum: [sequential, parallel, conditional, threshold]
        approvers:
          type: array
          items:
            type: string
            format: uuid
        approval_chain:
          type: array
          items:
            type: string
            format: uuid
        threshold_value:
          type: number
          description: Required threshold for threshold approvals
        context:
          type: object
        metadata:
          type: object
        timeout_hours:
          type: integer

    ApprovalRequest:
      type: object
      required:
        - id
        - requester_id
        - status
        - approval_model
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        requester_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        action_type:
          type: string
        target_resource:
          type: string
          format: uuid
        target_type:
          type: string
          enum: [agent, department, workflow, system]
        approval_model:
          type: string
          enum: [sequential, parallel, conditional, threshold]
        approvers:
          type: array
          items:
            type: string
            format: uuid
        approval_chain:
          type: array
          items:
            $ref: '#/components/schemas/ApprovalChainStep'
        current_step_index:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected, expired, withdrawn]
        context:
          type: object
        created_at:
          type: string
          format: date-time
        decided_at:
          type: string
          format: date-time
        timeout_hours:
          type: integer

    ApprovalDecision:
      type: object
      required:
        - approver_id
      properties:
        approver_id:
          type: string
          format: uuid
        comments:
          type: string
        condition:
          type: string
          description: Conditional approval criteria

    RejectionDecision:
      type: object
      required:
        - approver_id
        - reason
      properties:
        approver_id:
          type: string
          format: uuid
        reason:
          type: string
        alternative_action:
          type: string

    DelegationRequest:
      type: object
      required:
        - delegate_id
      properties:
        delegate_id:
          type: string
          format: uuid
        reason:
          type: string
        transfer_comments:
          type: string

    SubmitEscalationRequest:
      type: object
      required:
        - tenant_id
        - reporter_id
        - severity
      properties:
        tenant_id:
          type: string
          format: uuid
        reporter_id:
          type: string
          format: uuid
        severity:
          type: string
          enum: [low, medium, high, critical, p0]
        category:
          type: string
          enum: [hallucination, security, financial, operational, compliance, system]
        title:
          type: string
        description:
          type: string
        affected_resource:
          type: string
          format: uuid
        affected_type:
          type: string
          enum: [agent, department, workflow, system, data]
        impact_assessment:
          type: string
        evidence:
          type: array
          items:
            type: string
            format: uuid
        escalation_target:
          type: array
          items:
            type: string
            format: uuid

    Escalation:
      type: object
      required:
        - id
        - reporter_id
        - severity
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        reporter_id:
          type: string
          format: uuid
        severity:
          type: string
          enum: [low, medium, high, critical, p0]
        category:
          type: string
        title:
          type: string
        description:
          type: string
        affected_resource:
          type: string
          format: uuid
        affected_type:
          type: string
        impact_assessment:
          type: string
        status:
          type: string
          enum: [open, acknowledged, in_progress, resolved, closed]
        assigned_to:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
        resolution_summary:
          type: string

    ResolveEscalationRequest:
      type: object
      required:
        - resolver_id
      properties:
        resolver_id:
          type: string
          format: uuid
        resolution_summary:
          type: string
        evidence:
          type: array
          items:
            type: string
            format: uuid
        follow_up_required:
          type: boolean
          default: false

    CreateInterventionRequest:
      type: object
      required:
        - tenant_id
        - issuer_id
        - target_id
        - target_type
        - action
      properties:
        tenant_id:
          type: string
          format: uuid
        issuer_id:
          type: string
          format: uuid
        target_id:
          type: string
          format: uuid
        target_type:
          type: string
          enum: [agent, department, workflow, system]
        action:
          type: string
          enum: [pause, stop, restrict, override, redirect, suspend]
        reason:
          type: string
        scope:
          type: object
          description: Intervention scope (e.g., specific tools, time window)
        auto_revert_hours:
          type: integer
          description: Automatically revert after this period

    Intervention:
      type: object
      required:
        - id
        - target_id
        - target_type
        - action
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        issuer_id:
          type: string
          format: uuid
        target_id:
          type: string
          format: uuid
        target_type:
          type: string
          enum: [agent, department, workflow, system]
        action:
          type: string
          enum: [pause, stop, restrict, override, redirect, suspend]
        reason:
          type: string
        scope:
          type: object
        status:
          type: string
          enum: [active, revoked, auto_reverted]
        auto_revert_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: string
          format: date-time

    QueueSummary:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
        pending_approvals:
          type: integer
        pending_escalations:
          type: integer
        active_interventions:
          type: integer
        critical_items:
          type: integer
        average_wait_time_minutes:
          type: integer

    ApprovalChainStep:
      type: object
      properties:
        step_index:
          type: integer
        approver_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, rejected, skipped, delegated]
        decided_at:
          type: string
          format: date-time
        decision:
          type: string
          enum: [approved, rejected]
        comments:
          type: string

    HITLAnswer:
      type: object
      required:
        - user_id
        - answer
      properties:
        user_id:
          type: string
          format: uuid
        answer:
          type: string
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        comments:
          type: string
