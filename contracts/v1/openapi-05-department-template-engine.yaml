openapi: "3.0.3"
info:
  title: Operan Module 05 — Department Template Engine API
  description: >
    Manages department templates that define agent compositions, workflows,
    memory topologies, governance rules, KPIs, integrations, and operational
    policies for enterprise departments. Supports templating, versioning,
    custom template creation, and structured deployment flows.
  version: "1.0.0"
  contact:
    name: Operan Platform Team
  license:
    name: Proprietary

servers:
  - url: https://api.operan.io/v1
    description: Production
  - url: https://staging-api.operan.io/v1
    description: Staging

security:
  - BearerAuth: []
  - TenantHeader: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    TenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID

  schemas:
    # ─── Core types ───
    Error:
      type: object
      required: [type, title, status, detail]
      properties:
        type:
          type: string
          format: uri
          description: "An absolute URI that identifies the problem type. Defaults to 'about:blank'."
          default: "about:blank"
        title:
          type: string
          description: "A short, human-readable summary of the problem type."
        status:
          type: integer
          description: "The HTTP status code generated by the origin server for this occurrence of the problem."
        detail:
          type: string
          description: "A human-readable explanation specific to this occurrence of the problem."
        instance:
          type: string
          format: uri
          description: "An absolute URI that identifies the specific occurrence of the problem."
        request_id:
          type: string
          format: uuid
          description: "Correlation ID for request tracing."
      additionalProperties: false

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required: [total, page, page_size, has_more]

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required: [data, meta]

    # ─── Agent definition ───
    AgentDefinition:
      type: object
      required: [id, role, capabilities]
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          description: Agent role within the department (e.g., 'analyst', 'coordinator')
        name:
          type: string
          maxLength: 200
        capabilities:
          type: array
          items:
            type: string
        model:
          type: string
        system_prompt:
          type: string
        memory_profile:
          type: string
        tool_requirements:
          type: array
          items:
            type: string
        constraints:
          type: object
          additionalProperties: true
        access_control:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    # ─── Workflow definition ───
    WorkflowDefinition:
      type: object
      required: [id, name, steps]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
        steps:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStep'
        triggers:
          type: array
          items:
            type: string
        error_handling:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    WorkflowStep:
      type: object
      required: [id, type]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [agent_call, api_call, data_fetch, transformation, approval, notification, tool_call, conditional]
        name:
          type: string
        config:
          type: object
          additionalProperties: true
        timeout_seconds:
          type: integer
        retry_policy:
          type: object
          additionalProperties: true
      additionalProperties: false

    # ─── Memory topology ───
    MemoryTopology:
      type: object
      properties:
        semantic_enabled:
          type: boolean
          default: true
        episodic_enabled:
          type: boolean
          default: true
        procedural_enabled:
          type: boolean
          default: true
        graph_enabled:
          type: boolean
          default: true
        memory_profiles:
          type: object
          additionalProperties:
            type: string
        retention_policy:
          type: object
          additionalProperties: true
        compression_settings:
          type: object
          additionalProperties: true
      additionalProperties: false

    # ─── Governance rules ───
    GovernanceRule:
      type: object
      required: [id, name, type, enforcement]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        type:
          type: string
          enum: [access_control, data_usage, rate_limit, audit, compliance, custom]
        description:
          type: string
        enforcement:
          type: string
          enum: [enforce, warn, log]
        conditions:
          type: object
          additionalProperties: true
        actions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    # ─── KPI definition ───
    KPIDefinition:
      type: object
      required: [id, name, metric_type]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
        metric_type:
          type: string
          enum: [counter, gauge, histogram, timer, boolean]
        unit:
          type: string
        thresholds:
          type: object
          properties:
            warning:
              type: number
            critical:
              type: number
        aggregation_period:
          type: string
          enum: [minute, hour, day, week, month]
        dashboard_link:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    # ─── Integration definition ───
    IntegrationDefinition:
      type: object
      required: [id, type, config]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [erp, crm, email, calendar, document, messaging, custom]
        name:
          type: string
          maxLength: 200
        provider:
          type: string
        config:
          type: object
          additionalProperties: true
          description: Provider-specific connection configuration
        auth_method:
          type: string
          enum: [oauth2, api_key, basic, jwt, custom]
        status:
          type: string
          enum: [active, inactive, error, pending]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    # ─── Operational policy ───
    OperationalPolicy:
      type: object
      required: [id, name, scope]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
        scope:
          type: string
          enum: [agent, workflow, department, system]
        rules:
          type: array
          items:
            type: object
            additionalProperties: true
        effective_from:
          type: string
          format: date-time
        effective_to:
          type: string
          format: date-time
        version:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    # ─── Template ───
    Template:
      type: object
      required: [id, name, category, version]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        version:
          type: string
          description: Semantic version (semver), e.g. "1.2.3"
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentDefinition'
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowDefinition'
        memory_topology:
          $ref: '#/components/schemas/MemoryTopology'
        governance_rules:
          type: array
          items:
            $ref: '#/components/schemas/GovernanceRule'
        kpis:
          type: array
          items:
            $ref: '#/components/schemas/KPIDefinition'
        integrations:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationDefinition'
        operational_policies:
          type: array
          items:
            $ref: '#/components/schemas/OperationalPolicy'
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, deprecated, published, archived]
        tags:
          type: array
          items:
            type: string
      additionalProperties: false

    TemplateCreate:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentDefinition'
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowDefinition'
        memory_topology:
          $ref: '#/components/schemas/MemoryTopology'
        governance_rules:
          type: array
          items:
            $ref: '#/components/schemas/GovernanceRule'
        kpis:
          type: array
          items:
            $ref: '#/components/schemas/KPIDefinition'
        integrations:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationDefinition'
        operational_policies:
          type: array
          items:
            $ref: '#/components/schemas/OperationalPolicy'
        metadata:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
      additionalProperties: false

    TemplatePatch:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentDefinition'
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowDefinition'
        memory_topology:
          $ref: '#/components/schemas/MemoryTopology'
        governance_rules:
          type: array
          items:
            $ref: '#/components/schemas/GovernanceRule'
        kpis:
          type: array
          items:
            $ref: '#/components/schemas/KPIDefinition'
        integrations:
          type: array
          items:
            $ref: '#/components/schemas/IntegrationDefinition'
        operational_policies:
          type: array
          items:
            $ref: '#/components/schemas/OperationalPolicy'
        metadata:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, deprecated, published, archived]
      additionalProperties: false

    # ─── Deployment ───
    TemplateDeployment:
      type: object
      required: [id, template_id, version, status]
      properties:
        id:
          type: string
          format: uuid
        template_id:
          type: string
          format: uuid
        version:
          type: string
        status:
          type: string
          enum: [select, configure, connect_data, provision_memory, deploy_swarm, operational, failed, rolled_back]
        environment:
          type: string
          enum: [dev, staging, production]
        configuration:
          type: object
          additionalProperties: true
        provisioned_entities:
          type: object
          additionalProperties: true
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error_message:
          type: string
        deployed_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    TemplateDeployRequest:
      type: object
      required: [version, environment]
      properties:
        version:
          type: string
        environment:
          type: string
          enum: [dev, staging, production]
        configuration:
          type: object
          additionalProperties: true
      additionalProperties: false

    # ─── Custom Template ───
    CustomTemplate:
      type: object
      required: [id, name, category]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        content:
          type: object
          additionalProperties: true
          description: Free-form template content for custom templates
        owner_id:
          type: string
          format: uuid
        shared_with:
          type: array
          items:
            type: string
            format: uuid
        version:
          type: string
        status:
          $ref: '#/components/schemas/agentStatus'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
      additionalProperties: false

    CustomTemplateCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        content:
          type: object
          additionalProperties: true
        shared_with:
          type: array
          items:
            type: string
            format: uuid
      additionalProperties: false

    CustomTemplatePatch:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        category:
          type: string
          enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
        content:
          type: object
          additionalProperties: true
        shared_with:
          type: array
          items:
            type: string
            format: uuid
        status:
          $ref: '#/components/schemas/agentStatus'
      additionalProperties: false

  parameters:
    TemplateId:
      name: id
      in: path
      required: true
      description: UUID of the template
      schema:
        type: string
        format: uuid
    CustomTemplateId:
      name: id
      in: path
      required: true
      description: UUID of the custom template
      schema:
        type: string
        format: uuid
    CategoryParam:
      name: category
      in: query
      required: false
      description: Filter by template category
      schema:
        type: string
        enum: [hr, finance, procurement, engineering, translation, legal, compliance, research, custom]
    VersionParam:
      name: version
      in: query
      required: false
      description: Filter by template semantic version
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      description: Page number (1-indexed)
      schema:
        type: integer
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        default: 20
        maximum: 100

paths:
  # ─── Standard Templates ───

  /templates:
    post:
      summary: Create a new department template
      description: Create a new department template with agents, workflows, memory topology, governance rules, KPIs, integrations, and operational policies.
      operationId: createTemplate
      tags:
        - Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreate'
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List templates
      description: List department templates with optional category and version filters.
      operationId: listTemplates
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/CategoryParam'
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Templates retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                required: [data, meta]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /templates/{id}:
    get:
      summary: Get a template
      description: Retrieve a specific department template by ID.
      operationId: getTemplate
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update a template
      description: Partially update a department template.
      operationId: updateTemplate
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplatePatch'
      responses:
        '200':
          description: Template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete a template
      description: Delete a department template. Must not have active deployments.
      operationId: deleteTemplate
      tags:
        - Templates
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '204':
          description: Template deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /templates/{id}/deploy:
    post:
      summary: Deploy a template
      description: >
        Deploy a template to an environment. Follows the deployment flow:
        select → configure → connect data → provision memory → deploy swarm → operational.
      operationId: deployTemplate
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateDeployRequest'
      responses:
        '201':
          description: Deployment initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateDeployment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /templates/{id}/deployments:
    get:
      summary: List deployments for a template
      description: Retrieve the deployment history for a specific template.
      operationId: listDeployments
      tags:
        - Deployments
      parameters:
        - $ref: '#/components/parameters/TemplateId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Deployments retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TemplateDeployment'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                required: [data, meta]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Custom Templates ───

  /templates/custom:
    get:
      summary: List custom templates
      description: List custom templates with optional category and version filters.
      operationId: listCustomTemplates
      tags:
        - Custom Templates
      parameters:
        - $ref: '#/components/parameters/CategoryParam'
        - $ref: '#/components/parameters/VersionParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Custom templates retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomTemplate'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                required: [data, meta]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      summary: Create a custom template
      description: Create a free-form custom department template owned by the authenticated user.
      operationId: createCustomTemplate
      tags:
        - Custom Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTemplateCreate'
      responses:
        '201':
          description: Custom template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTemplate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /templates/custom/{id}:
    get:
      summary: Get a custom template
      description: Retrieve a specific custom template by ID.
      operationId: getCustomTemplate
      tags:
        - Custom Templates
      parameters:
        - $ref: '#/components/parameters/CustomTemplateId'
      responses:
        '200':
          description: Custom template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTemplate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      summary: Update a custom template
      description: Partially update a custom template.
      operationId: updateCustomTemplate
      tags:
        - Custom Templates
      parameters:
        - $ref: '#/components/parameters/CustomTemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTemplatePatch'
      responses:
        '200':
          description: Custom template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTemplate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete a custom template
      description: Delete a custom template by ID.
      operationId: deleteCustomTemplate
      tags:
        - Custom Templates
      parameters:
        - $ref: '#/components/parameters/CustomTemplateId'
      responses:
        '204':
          description: Custom template deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Template Versioning ───

  /templates/{id}/versions:
    get:
      summary: List template versions
      description: List all versions of a template, ordered by version descending.
      operationId: listTemplateVersions
      tags:
        - Template Versions
      parameters:
        - $ref: '#/components/parameters/TemplateId'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Template versions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                required: [data, meta]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /templates/{id}/versions/{version}:
    get:
      summary: Get a specific template version
      description: Retrieve a specific version of a template.
      operationId: getTemplateVersion
      tags:
        - Template Versions
      parameters:
        - $ref: '#/components/parameters/TemplateId'
        - name: version
          in: path
          required: true
          description: Semantic version to retrieve
          schema:
            type: string
      responses:
        '200':
          description: Template version retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /templates/{id}/clone:
    post:
      summary: Clone a template
      description: Clone an existing template as a new draft template.
      operationId: cloneTemplate
      tags:
        - Template Operations
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 200
                  description: Optional override name for the cloned template
                description:
                  type: string
                  description: Optional override description for the cloned template
      responses:
        '201':
          description: Template cloned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ─── Standard Error Responses ───

  responses:
    BadRequest:
      description: Bad request — validation failed or malformed input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized — missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict — resource already exists or state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Unprocessable entity — semantic validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

tags:
  - name: Templates
    description: Standard department template CRUD operations
  - name: Deployments
    description: Template deployment lifecycle management
  - name: Custom Templates
    description: Free-form custom template operations
  - name: Template Versions
    description: Template versioning operations
  - name: Template Operations
    description: Template deployment and cloning operations
