openapi: "3.0.3"
info:
  title: Operan Tool Execution API
  description: Tool registration, execution, and cost tracking. Module 08.
  version: 1.0.0
  contact:
    name: Platform Architecture
    email: arch@operan.io

servers:
  - url: https://api.operan.io/v1/tools
    description: Production
  - url: https://api-staging.operan.io/v1/tools
    description: Staging

security:
  - BearerAuth: []
  - TenantHeader: []

paths:
  /register:
    post:
      operationId: registerTool
      summary: Register a new tool
      tags: [Registration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolRegisterRequest'
      responses:
        '201':
          description: Tool registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /:
    get:
      operationId: listTools
      summary: List available tools
      tags: [Registration]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: category
          in: query
          required: false
          description: Filter by tool category
          schema:
            type: string
            enum: [knowledge, communication, enterprise, utility, business_logic, security, ai_model]
        - name: status
          in: query
          required: false
          description: Filter by tool status
          schema:
            type: string
            enum: [active, deprecated, disabled]
      responses:
        '200':
          description: Tool list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the tool
        schema:
          type: string
          format: uuid
    get:
      operationId: getTool
      summary: Get tool details
      tags: [Registration]
      responses:
        '200':
          description: Tool details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: updateTool
      summary: Update tool metadata
      tags: [Registration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolUpdateRequest'
      responses:
        '200':
          description: Tool updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tool'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /{id}/versions:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the tool
        schema:
          type: string
          format: uuid
    get:
      operationId: listToolVersions
      summary: List tool versions
      tags: [Versions]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          required: false
          description: Filter by version status
          schema:
            type: string
            enum: [active, deprecated, draft]
      responses:
        '200':
          description: Version list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolVersionList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /execute:
    post:
      operationId: executeTool
      summary: Execute a tool
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolExecutionRequest'
      responses:
        '202':
          description: Execution accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolExecutionRecord'
        '400':
          description: Invalid execution request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tool not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /executions:
    get:
      operationId: listExecutions
      summary: List tool execution records
      tags: [Execution]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          required: false
          description: Filter by execution status
          schema:
            type: string
            enum: [queued, running, completed, failed, cancelled]
        - name: tool
          in: query
          required: false
          description: Filter by tool name
          schema:
            type: string
        - name: agent_id
          in: query
          required: false
          description: Filter by agent ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Execution list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /executions/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the execution record
        schema:
          type: string
          format: uuid
    get:
      operationId: getExecution
      summary: Get execution details
      tags: [Execution]
      responses:
        '200':
          description: Execution details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolExecutionRecord'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Execution not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /executions/{id}/retry:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the execution record to retry
        schema:
          type: string
          format: uuid
    post:
      operationId: retryExecution
      summary: Retry a failed execution
      tags: [Execution]
      responses:
        '202':
          description: Retry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolExecutionRecord'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Execution not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cost:
    get:
      operationId: getToolCost
      summary: Get cost summary for tool executions
      tags: [Cost]
      parameters:
        - $ref: '#/components/parameters/TenantIdParam'
        - name: tool
          in: query
          required: false
          description: Filter by tool name
          schema:
            type: string
        - name: start
          in: query
          required: false
          description: Start of time period
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: false
          description: End of time period
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Cost summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostSummary'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token with tenant-scoped claims
    TenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier header required on every request

  parameters:
    TenantIdPath:
      name: id
      in: path
      required: true
      description: UUID of the tenant
      schema:
        type: string
        format: uuid
    TenantIdParam:
      name: tenant_id
      in: query
      required: true
      description: UUID of the tenant
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    ToolRegisterRequest:
      type: object
      required: [tenant_id, name]
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [knowledge, communication, enterprise, utility, business_logic, security, ai_model]
        input_schema:
          type: object
        output_schema:
          type: object
        auth_requirements:
          type: array
          items:
            type: string
        rate_limit:
          $ref: '#/components/schemas/RateLimit'
        cost_per_call:
          $ref: '#/components/schemas/CostPerCall'
        security_requirements:
          type: array
          items:
            type: string
      additionalProperties: false

    ToolUpdateRequest:
      type: object
      properties:
        description:
          type: string
        category:
          type: string
          enum: [knowledge, communication, enterprise, utility, business_logic, security, ai_model]
        input_schema:
          type: object
        output_schema:
          type: object
        rate_limit:
          $ref: '#/components/schemas/RateLimit'
        status:
          type: string
          enum: [active, deprecated, disabled]
        cost_per_call:
          $ref: '#/components/schemas/CostPerCall'
      additionalProperties: false

    Tool:
      type: object
      required: [id, tenant_id, name]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        description:
          type: string
        category:
          type: string
          enum: [knowledge, communication, enterprise, utility, business_logic, security, ai_model]
        input_schema:
          type: object
        output_schema:
          type: object
        auth_requirements:
          type: array
          items:
            type: string
        rate_limit:
          $ref: '#/components/schemas/RateLimit'
        status:
          type: string
          enum: [active, deprecated, disabled]
        cost_per_call:
          $ref: '#/components/schemas/CostPerCall'
        security_requirements:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    ToolList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tool'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    RateLimit:
      type: object
      properties:
        max_requests_per_minute:
          type: integer
        max_burst:
          type: integer
        retry_after_ms:
          type: integer
      additionalProperties: false

    CostPerCall:
      type: object
      required: [currency, amount]
      properties:
        currency:
          type: string
        amount:
          type: number
      additionalProperties: false

    ToolExecutionRequest:
      type: object
      required: [tenant_id, agent_id, tool, input]
      properties:
        tenant_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        tool:
          type: string
        tool_version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        input:
          type: object
        cost_estimate:
          $ref: '#/components/schemas/CostPerCall'
        timeout_ms:
          type: integer
        priority:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
      additionalProperties: false

    ToolExecutionRecord:
      type: object
      required: [id, tenant_id, agent_id, tool, status, retry_count, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        tool:
          type: string
        tool_version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        input:
          type: object
        output:
          type: object
        execution_time_ms:
          type: integer
        error_code:
          type: string
        error_message:
          type: string
        retry_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    ExecutionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ToolExecutionRecord'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    ToolVersion:
      type: object
      required: [id, tool_id, version]
      properties:
        id:
          type: string
          format: uuid
        tool_id:
          type: string
          format: uuid
        version:
          type: string
          pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
        change_summary:
          type: string
          enum: [major, minor, patch, breaking]
        input_schema:
          type: object
        output_schema:
          type: object
        status:
          type: string
          enum: [active, deprecated, draft]
      additionalProperties: false

    ToolVersionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ToolVersion'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    CostSummary:
      type: object
      properties:
        tool:
          type: string
        total_calls:
          type: integer
        total_cost:
          $ref: '#/components/schemas/CostPerCall'
        avg_cost_per_call:
          $ref: '#/components/schemas/CostPerCall'
        period:
          type: object
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
          additionalProperties: false
      additionalProperties: false

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string
        request_id:
          type: string
          format: uuid
      required:
        - code
        - message
        - request_id

    ErrorList:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
      required:
        - errors
