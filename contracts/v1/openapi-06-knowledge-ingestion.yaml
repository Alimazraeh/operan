openapi: "3.0.3"
info:
  title: Operan Knowledge Ingestion API
  description: Knowledge document ingestion, chunking, and semantic search. Module 06.
  version: 1.0.0
  contact:
    name: Platform Architecture
    email: arch@operan.io

servers:
  - url: https://api.operan.io/v1/knowledge
    description: Production
  - url: https://api-staging.operan.io/v1/knowledge
    description: Staging

security:
  - BearerAuth: []
  - TenantHeader: []

paths:
  /ingest:
    post:
      operationId: ingestKnowledge
      summary: Initiate knowledge document ingestion
      tags: [Ingestion]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '202':
          description: Ingestion accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionStatus'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /documents:
    get:
      operationId: listDocuments
      summary: List knowledge documents for the current tenant
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          required: false
          description: Filter documents by processing status
          schema:
            type: string
            enum: [pending, parsing, chunking, embedding, indexed, failed]
        - name: source_type
          in: query
          required: false
          description: Filter documents by source type
          schema:
            type: string
            enum: [pdf, docx, pptx, csv, json, xml, html, text, email, url]
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /documents/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the knowledge document
        schema:
          type: string
          format: uuid
    get:
      operationId: getDocument
      summary: Get document details
      tags: [Documents]
      responses:
        '200':
          description: Document details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeDocument'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteDocument
      summary: Delete a knowledge document and its chunks
      tags: [Documents]
      responses:
        '204':
          description: Document deleted
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /documents/{id}/chunks:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the knowledge document
        schema:
          type: string
          format: uuid
    get:
      operationId: listDocumentChunks
      summary: List chunks for a document
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Chunk list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChunkList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search:
    post:
      operationId: searchKnowledge
      summary: Search ingested knowledge documents and sections
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchQuery'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultList'
        '400':
          description: Invalid search query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /ingestions/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the ingestion job
        schema:
          type: string
          format: uuid
    get:
      operationId: getIngestionStatus
      summary: Get ingestion job status
      tags: [Ingestion]
      responses:
        '200':
          description: Ingestion status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionStatus'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Ingestion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token with tenant-scoped claims
    TenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier header required on every request

  parameters:
    TenantIdPath:
      name: id
      in: path
      required: true
      description: UUID of the tenant
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    IngestRequest:
      type: object
      required: [tenant_id, source_type, source_uri]
      properties:
        tenant_id:
          $ref: '#/components/schemas/TenantId'
        source_type:
          type: string
          enum: [pdf, docx, pptx, csv, json, xml, html, text, email, url]
        source_uri:
          type: string
          description: URI or path to the source document
        file_name:
          type: string
        file_size:
          type: integer
        department_id:
          type: string
          format: uuid
        processing_options:
          $ref: '#/components/schemas/ProcessingOptions'
        requested_by:
          type: string
      additionalProperties: false

    ProcessingOptions:
      type: object
      properties:
        language_detection:
          type: boolean
          default: true
        chunking_strategy:
          type: string
          enum: [token, paragraph, heading]
          default: token
        max_chunk_size:
          type: integer
          default: 500
        overlap_size:
          type: integer
          default: 50
        extract_tables:
          type: boolean
          default: true
        extract_images:
          type: boolean
          default: false
        extract_metadata:
          type: boolean
          default: true
      additionalProperties: false

    KnowledgeDocument:
      type: object
      required: [id, tenant_id, source_type, source_uri, status]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          $ref: '#/components/schemas/TenantId'
        source_type:
          type: string
          enum: [pdf, docx, pptx, csv, json, xml, html, text, email, url]
        source_uri:
          type: string
        status:
          type: string
          enum: [pending, parsing, chunking, embedding, indexed, failed]
        file_name:
          type: string
        file_size:
          type: integer
        department_id:
          type: string
          format: uuid
        language:
          type: array
          items:
            type: string
        chunk_count:
          type: integer
        embedding_model:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    IngestionStatus:
      type: object
      required: [id, tenant_id, status]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          $ref: '#/components/schemas/TenantId'
        document_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, parsing, chunking, embedding, indexed, completed, failed]
        progress:
          type: number
          minimum: 0
          maximum: 1
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    DocumentList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeDocument'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    KnowledgeSection:
      type: object
      required: [id, title, content]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        section_number:
          type: integer
        parent_section_id:
          type: string
          format: uuid
        metadata:
          type: object
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
      additionalProperties: false

    ChunkList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeSection'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    SearchQuery:
      type: object
      required: [tenant_id, query_text]
      properties:
        tenant_id:
          $ref: '#/components/schemas/TenantId'
        query_text:
          type: string
        filters:
          type: object
        top_n:
          type: integer
          default: 10
        retrieval_strategy:
          type: string
          enum: [hybrid, semantic, keyword, graph]
          default: hybrid
        relevance_threshold:
          type: number
          minimum: 0
          maximum: 1
        include_metadata:
          type: boolean
          default: true
      additionalProperties: false

    SearchResult:
      type: object
      required: [id, document_id, score, content]
      properties:
        id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        score:
          type: number
          minimum: 0
          maximum: 1
        content:
          type: string
        section_id:
          type: string
          format: uuid
        title:
          type: string
        snippet:
          type: string
        metadata:
          type: object
        similarity_score:
          type: number
          minimum: 0
          maximum: 1
      additionalProperties: false

    SearchResultList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string
        request_id:
          type: string
          format: uuid
      required:
        - code
        - message
        - request_id

    ErrorList:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
      required:
        - errors
