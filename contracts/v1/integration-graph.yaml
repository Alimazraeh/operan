# Operan ADOS — Integration Dependency Graph
# Generated by ARCH (Platform Architect & Contract Manager)
# DO NOT edit manually — use `arch update-graph` CLI tool
#
# Legend:
#   caller → callee  : explicit edge direction
#   protocol          : primary inter-module protocol
#   sla_ms            : expected latency SLA (p99)
#   required          : hard dependency; module fails without it
#   optional          : soft dependency; module degrades gracefully

version: v1.0
platform: operan-ados
modules:
  tenant_control_plane:
    id: 01
    description: Centralized tenant provisioning and lifecycle management
    endpoints:
      rest: /api/v1/tenants
      async: tenant.*
    schemas:
      openapi: openapi-01-tenant-control-plane.yaml
      asyncapi: asyncapi-01-tenant-control-plane.yaml
      json: schema-01-tenant-control-plane.json

  identity_access_mgmt:
    id: 02
    description: Enterprise-grade authentication and authorization
    endpoints:
      async: identity.*
    schemas:
      asyncapi: asyncapi-02-identity-access.yaml
      json: schema-02-identity-access.json

  agent_orchestration:
    id: 03
    description: Core runtime engine for agent swarms
    endpoints:
      async: orchestration.*
    schemas:
      asyncapi: asyncapi-03-agent-orchestration.yaml
      json: schema-03-agent-orchestration.json

  agent_registry:
    id: 04
    description: Central registry for reusable agents
    endpoints:
      async: registry.*
    schemas:
      asyncapi: asyncapi-04-agent-registry.yaml
      json: schema-04-agent-registry.json

  department_template_engine:
    id: 05
    description: Deploy reusable organizational structures
    endpoints:
      rest: /api/v1/templates
      async: template.*
    schemas:
      openapi: openapi-05-department-template-engine.yaml
      asyncapi: asyncapi-05-department-template-engine.yaml
      json: schema-05-department-template-engine.json
      asyncapi_v2: asyncapi-05-department-template.yaml
      json_v2: schema-05-department-template.json

  knowledge_ingestion:
    id: 06
    description: Transform enterprise data into operational memory
    endpoints:
      async: ingestion.*
    schemas:
      asyncapi: asyncapi-06-knowledge-ingestion.yaml
      json: schema-06-knowledge-ingestion.json

  memory_fabric:
    id: 07
    description: Persistent organizational cognition layer
    endpoints:
      async: memory.*
    schemas:
      asyncapi: asyncapi-07-memory-fabric.yaml
      json: schema-07-memory-fabric.json

  tool_execution:
    id: 08
    description: Secure external action execution
    endpoints:
      async: tools.*
    schemas:
      asyncapi: asyncapi-08-tool-execution.yaml
      json: schema-08-tool-execution.json

  human_supervision:
    id: 09
    description: Govern autonomous execution safely
    endpoints:
      rest: /api/v1/supervision
      async: supervision.*
    schemas:
      openapi: openapi-09-human-supervision.yaml
      asyncapi: asyncapi-09-human-supervision.yaml
      json: schema-09-human-supervision.json

  policy_governance:
    id: 10
    description: Enterprise compliance and control
    endpoints:
      rest: /api/v1/policies
      async: governance.*
    schemas:
      openapi: openapi-10-policy-governance.yaml
      asyncapi: asyncapi-10-policy-governance.yaml
      json: schema-10-policy-governance.json

  observability:
    id: 11
    description: Operational transparency and telemetry
    endpoints:
      async: observability.*
    schemas:
      asyncapi: asyncapi-11-observability.yaml
      json: schema-11-observability.json

  model_abstraction:
    id: 12
    description: Decouple orchestration from model vendors
    endpoints:
      async: models.*
    schemas:
      asyncapi: asyncapi-12-model-abstraction.yaml
      json: schema-12-model-abstraction.json

  multi_model_routing:
    id: 13
    description: Intelligent model assignment
    endpoints:
      rest: /api/v1/routing
      async: routing.*, workflow.*
    schemas:
      openapi: openapi-13-multi-model-routing-engine.yaml
      asyncapi: asyncapi-13-multi-model-routing-engine.yaml
      asyncapi_v2: asyncapi-13-workflow-orchestration.yaml
      json: schema-13-multi-model-routing-engine.json
      json_v2: schema-13-workflow-orchestration.json

  agent_collaboration:
    id: 14
    description: Inter-agent messaging infrastructure
    endpoints:
      async: collaboration.*
    schemas:
      asyncapi: asyncapi-14-agent-collaboration.yaml
      json: schema-14-agent-collaboration.json

  agent_marketplace:
    id: 15
    description: Procure, license, and deploy agents from internal and external registries
    endpoints:
      rest: /api/v1/marketplace
      async: marketplace.*
    schemas:
      openapi: openapi-15-agent-marketplace.yaml
      asyncapi: asyncapi-15-agent-marketplace.yaml
      json: schema-15-agent-marketplace.json

  execution_sandbox:
    id: 16
    description: Isolated execution environment for agents with resource tracking
    endpoints:
      rest: /api/v1/sandbox
      async: sandbox.*
    schemas:
      openapi: openapi-16-execution-sandbox.yaml
      asyncapi: asyncapi-16-execution-sandbox.yaml
      json: schema-16-execution-sandbox.json

  cost_governance:
    id: 17
    description: Prevent runaway operational costs
    endpoints:
      rest: /api/v1/cost-governance
      async: cost.*
    schemas:
      openapi: openapi-17-cost-governance-engine.yaml
      asyncapi: asyncapi-17-cost-governance-engine.yaml
      json: schema-17-cost-governance-engine.json

  enterprise_connector:
    id: 18
    description: Enterprise system integrations
    endpoints:
      rest: /api/v1/connectors
      async: connectors.*
    schemas:
      openapi: openapi-18-enterprise-connector-fabric.yaml
      asyncapi: asyncapi-18-enterprise-connector-fabric.yaml
      json: schema-18-enterprise-connector-fabric.json

  arabic_language_core:
    id: 19
    description: Arabic-first language intelligence
    endpoints:
      rest: /api/v1/arabic
      async: arabic.*
    schemas:
      openapi: openapi-19-arabic-language-core.yaml
      asyncapi: asyncapi-19-arabic-language-core.yaml
      json: schema-19-arabic-language-core.json

  sovereign_deployment_fabric:
    id: 20
    description: Sovereign deployment lifecycle and infrastructure provisioning
    endpoints:
      rest: /api/v1/deployments
      async: deployment.*
    schemas:
      openapi: openapi-20-sovereign-deployment-fabric.yaml
      asyncapi: asyncapi-20-sovereign-deployment-fabric.yaml
      json: schema-20-sovereign-deployment-fabric.json

# Inter-module dependency edges
edges:
  # Module 01 — Tenant Control Plane (foundation)
  - caller: tenant_control_plane
    callee: identity_access_mgmt
    protocol: REST
    direction: synchronous
    sla_ms: 100
    required: true
    description: Tenant provisioning creates initial IAM entities

  - caller: tenant_control_plane
    callee: policy_governance
    protocol: REST
    direction: synchronous
    sla_ms: 100
    required: true
    description: Tenant onboarding applies default governance policies

  - caller: tenant_control_plane
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 200
    required: false
    description: Tenant lifecycle events emitted for monitoring

  # Module 02 — IAM (all modules authenticate here)
  - caller: identity_access_mgmt
    callee: tenant_control_plane
    protocol: REST
    direction: lookup
    sla_ms: 50
    required: true
    description: IAM validates tenant context from X-Tenant-ID header

  # Module 03 — Agent Orchestration (core runtime)
  - caller: agent_orchestration
    callee: agent_registry
    protocol: REST
    direction: lookup
    sla_ms: 50
    required: true
    description: Runtime resolves agent identities and capabilities

  - caller: agent_orchestration
    callee: memory_fabric
    protocol: AsyncEvent
    direction: publish/subscribe
    sla_ms: 100
    required: true
    description: Workflow state persisted to memory fabric

  - caller: agent_orchestration
    callee: policy_governance
    protocol: REST
    direction: validate
    sla_ms: 50
    required: true
    description: Pre-execution policy validation

  - caller: agent_orchestration
    callee: human_supervision
    protocol: AsyncEvent
    direction: escalate
    sla_ms: 200
    required: false
    description: Escalation requests for human approval

  - caller: agent_orchestration
    callee: tool_execution
    protocol: AsyncEvent
    direction: execute
    sla_ms: 500
    required: true
    description: Delegated tool execution

  - caller: agent_orchestration
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Execution telemetry emitted

  - caller: agent_orchestration
    callee: execution_sandbox
    protocol: AsyncEvent
    direction: publish
    sla_ms: 200
    required: false
    description: Usage metrics for billing

  - caller: agent_orchestration
    callee: model_abstraction
    protocol: REST
    direction: invoke
    sla_ms: 300
    required: true
    description: LLM call abstraction for agent decisions

  - caller: agent_orchestration
    callee: multi_model_routing
    protocol: REST
    direction: route
    sla_ms: 50
    required: true
    description: Dynamic model assignment

  - caller: agent_orchestration
    callee: agent_collaboration
    protocol: AsyncEvent
    direction: publish/subscribe
    sla_ms: 100
    required: false
    description: Inter-agent coordination events

  - caller: agent_orchestration
    callee: agent_marketplace
    protocol: AsyncEvent
    direction: publish
    sla_ms: 200
    required: false
    description: Notification triggers

  - caller: agent_orchestration
    callee: department_template_engine
    protocol: REST
    direction: lookup
    sla_ms: 100
    required: false
    description: Template context for department operations

  # Module 04 — Agent Registry
  - caller: agent_registry
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 200
    required: false
    description: Registry change events

  # Module 05 — Department Template Engine
  - caller: department_template_engine
    callee: agent_orchestration
    protocol: REST
    direction: deploy
    sla_ms: 500
    required: true
    description: Deploy template-configured agent swarms

  - caller: department_template_engine
    callee: agent_registry
    protocol: REST
    direction: register
    sla_ms: 200
    required: true
    description: Register template agents

  - caller: department_template_engine
    callee: memory_fabric
    protocol: REST
    direction: configure
    sla_ms: 200
    required: true
    description: Provision memory topology

  - caller: department_template_engine
    callee: policy_governance
    protocol: REST
    direction: apply
    sla_ms: 200
    required: true
    description: Apply governance rules

  - caller: department_template_engine
    callee: enterprise_connector
    protocol: REST
    direction: connect
    sla_ms: 500
    required: false
    description: Configure data source integrations

  # Module 06 — Knowledge Ingestion
  - caller: knowledge_ingestion
    callee: memory_fabric
    protocol: AsyncEvent
    direction: publish
    sla_ms: 500
    required: true
    description: Ingested content indexed in memory

  - caller: knowledge_ingestion
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 200
    required: false
    description: Ingestion pipeline telemetry

  - caller: knowledge_ingestion
    callee: arabic_language_core
    protocol: REST
    direction: process
    sla_ms: 300
    required: false
    description: Arabic text normalization and processing

  # Module 07 — Memory Fabric
  - caller: memory_fabric
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: false
    description: Memory access and modification events

  # Module 08 — Tool Execution
  - caller: tool_execution
    callee: policy_governance
    protocol: REST
    direction: validate
    sla_ms: 50
    required: true
    description: Pre-execution policy check

  - caller: tool_execution
    callee: enterprise_connector
    protocol: REST
    direction: invoke
    sla_ms: 1000
    required: false
    description: External system interaction

  - caller: tool_execution
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Execution results and audit

  - caller: tool_execution
    callee: execution_sandbox
    protocol: AsyncEvent
    direction: publish
    sla_ms: 200
    required: false
    description: Tool usage metrics

  # Module 09 — Human Supervision
  - caller: human_supervision
    callee: agent_orchestration
    protocol: AsyncEvent
    direction: signal
    sla_ms: 200
    required: true
    description: Approval/rejection signals to workflow

  - caller: human_supervision
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Supervision events

  - caller: human_supervision
    callee: agent_marketplace
    protocol: AsyncEvent
    direction: notify
    sla_ms: 100
    required: true
    description: Escalation notifications

  # Module 10 — Policy Governance
  - caller: policy_governance
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Policy violations and compliance events

  # Module 11 — Observability (consumes from all modules)
  # No outgoing edges — observability is a leaf consumer

  # Module 12 — Model Abstraction
  - caller: model_abstraction
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Model invocation telemetry

  - caller: model_abstraction
    callee: cost_governance
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: false
    description: Model cost data

  # Module 13 — Multi-Model Routing
  - caller: multi_model_routing
    callee: model_abstraction
    protocol: REST
    direction: invoke
    sla_ms: 100
    required: true
    description: Routed model invocation

  - caller: multi_model_routing
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Routing decisions and quality scores

  # Module 14 — Agent Collaboration
  - caller: agent_collaboration
    callee: memory_fabric
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: false
    description: Shared state synchronization

  - caller: agent_collaboration
    callee: agent_marketplace
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: false
    description: Collaboration notifications

  - caller: agent_collaboration
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Communication bus telemetry

  # Module 15 — Notification Routing
  - caller: agent_marketplace
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Notification delivery status

  # Module 16 — Billing Metering
  - caller: execution_sandbox
    callee: cost_governance
    protocol: REST
    direction: check
    sla_ms: 50
    required: false
    description: Cost threshold validation

  - caller: execution_sandbox
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 200
    required: true
    description: Billing events

  # Module 17 — Cost Governance
  - caller: cost_governance
    callee: agent_orchestration
    protocol: AsyncEvent
    direction: throttle
    sla_ms: 50
    required: false
    description: Throttling signals

  - caller: cost_governance
    callee: policy_governance
    protocol: REST
    direction: sync
    sla_ms: 50
    required: false
    description: Cost policy enforcement

  - caller: cost_governance
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Cost governance events

  # Module 18 — Enterprise Connector
  - caller: enterprise_connector
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 200
    required: true
    description: Connector health and event telemetry

  # Module 19 — Knowledge Marketplace
  - caller: agent_marketplace
    callee: tenant_control_plane
    protocol: REST
    direction: validate
    sla_ms: 50
    required: true
    description: Tenant access validation

  - caller: agent_marketplace
    callee: execution_sandbox
    protocol: AsyncEvent
    direction: publish
    sla_ms: 200
    required: false
    description: Marketplace transaction events

  - caller: agent_marketplace
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Marketplace activity

  # Module 19 — Arabic Language Core
  - caller: arabic_language_core
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Processing telemetry

  - caller: arabic_language_core
    callee: memory_fabric
    protocol: AsyncEvent
    direction: store
    sla_ms: 200
    required: false
    description: Terminology and vocabulary persistence

  # Module 20 — Sovereign Deployment Fabric
  - caller: tenant_control_plane
    callee: sovereign_deployment_fabric
    protocol: REST
    direction: deploy
    sla_ms: 1000
    required: true
    description: Tenant onboarding triggers deployment provisioning

  - caller: agent_orchestration
    callee: sovereign_deployment_fabric
    protocol: REST
    direction: lookup
    sla_ms: 200
    required: false
