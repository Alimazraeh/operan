  - caller: sovereign_deployment_fabric
    callee: observability
    protocol: AsyncEvent
    direction: publish
    sla_ms: 100
    required: true
    description: Deployment lifecycle and health telemetry

  - caller: sovereign_deployment_fabric
    callee: identity_access_mgmt
