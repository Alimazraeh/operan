openapi: "3.0.3"
info:
  title: Operan Memory Fabric API
  description: Vector memory storage, semantic search, and retention management. Module 07.
  version: 1.0.0
  contact:
    name: Platform Architecture
    email: arch@operan.io

servers:
  - url: https://api.operan.io/v1/memory
    description: Production
  - url: https://api-staging.operan.io/v1/memory
    description: Staging

security:
  - BearerAuth: []
  - TenantHeader: []

paths:
  /vectors:
    post:
      operationId: ingestVectors
      summary: Ingest one or more memory vectors
      tags: [Vectors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VectorIngestRequest'
      responses:
        '201':
          description: Vectors ingested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorIngestResult'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      operationId: listVectors
      summary: List memory vectors
      tags: [Vectors]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: embedding_type
          in: query
          required: false
          description: Filter vectors by embedding type
          schema:
            type: string
            enum: [agent_personal, agent_ephemeral, department, platform]
        - name: segment_type
          in: query
          required: false
          description: Filter vectors by segment type
          schema:
            type: string
            enum: [fact, context, memory, tool_output, policy]
        - name: document_id
          in: query
          required: false
          description: Filter vectors by document ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Vector list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VectorList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /vectors/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the memory vector
        schema:
          type: string
          format: uuid
    get:
      operationId: getVector
      summary: Get vector details
      tags: [Vectors]
      responses:
        '200':
          description: Vector details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryVector'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Vector not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      operationId: updateVector
      summary: Update a memory vector
      tags: [Vectors]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VectorUpdateRequest'
      responses:
        '200':
          description: Vector updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryVector'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Vector not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      operationId: deleteVector
      summary: Delete a memory vector
      tags: [Vectors]
      responses:
        '204':
          description: Vector deleted
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Vector not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /search:
    post:
      operationId: searchMemory
      summary: Perform semantic search over memory vectors
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SemanticSearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultList'
        '400':
          description: Invalid search request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /agents/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the agent
        schema:
          type: string
          format: uuid
    get:
      operationId: getAgentMemory
      summary: Get an agent's aggregate memory state
      tags: [Agents]
      responses:
        '200':
          description: Agent memory state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentMemory'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /gc:
    post:
      operationId: triggerGarbageCollection
      summary: Trigger manual garbage collection for expired memory vectors
      tags: [GarbageCollection]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GCRequest'
      responses:
        '202':
          description: GC job started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationStatus'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /retention-policies:
    get:
      operationId: listRetentionPolicies
      summary: List retention policies
      tags: [Retention]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Policy list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionPolicyList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createRetentionPolicy
      summary: Create a retention policy
      tags: [Retention]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetentionPolicy'
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionPolicy'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token with tenant-scoped claims
    TenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier header required on every request

  parameters:
    TenantIdPath:
      name: id
      in: path
      required: true
      description: UUID of the tenant
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    VectorIngestRequest:
      type: object
      required: [tenant_id, items]
      properties:
        tenant_id:
          $ref: '#/components/schemas/TenantId'
        items:
          type: array
          items:
            $ref: '#/components/schemas/VectorWriteItem'
      additionalProperties: false

    VectorWriteItem:
      type: object
      required: [document_id, embedding_type, semantic_content]
      properties:
        document_id:
          type: string
          format: uuid
        embedding_type:
          type: string
          enum: [agent_personal, agent_ephemeral, department, platform]
        semantic_content:
          type: string
        metadata:
          type: object
        chunk_id:
          type: string
          format: uuid
        segment_type:
          type: string
          enum: [fact, context, memory, tool_output, policy]
        embedding_vector:
          type: array
          items:
            type: number
        ttl:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
      additionalProperties: false

    VectorIngestResult:
      type: object
      required: [ingested, failed]
      properties:
        ingested:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: string
      additionalProperties: false

    MemoryVector:
      type: object
      required: [id, tenant_id, document_id, embedding_type, semantic_content, metadata, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          $ref: '#/components/schemas/TenantId'
        document_id:
          type: string
          format: uuid
        embedding_type:
          type: string
          enum: [agent_personal, agent_ephemeral, department, platform]
        semantic_content:
          type: string
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        embedding_model:
          type: string
        chunk_id:
          type: string
          format: uuid
        segment_type:
          type: string
          enum: [fact, context, memory, tool_output, policy]
        embedding_vector:
          type: array
          items:
            type: number
        vector_hash:
          type: string
        ttl:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
      additionalProperties: false

    VectorUpdateRequest:
      type: object
      properties:
        semantic_content:
          type: string
        metadata:
          type: object
        segment_type:
          type: string
          enum: [fact, context, memory, tool_output, policy]
        ttl:
          oneOf:
            - type: string
              format: date-time
            - type: 'null'
      additionalProperties: false

    VectorList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MemoryVector'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    SemanticSearchRequest:
      type: object
      required: [tenant_id, query, embedding_type]
      properties:
        tenant_id:
          $ref: '#/components/schemas/TenantId'
        query:
          type: string
        embedding_type:
          type: string
          enum: [agent_personal, agent_ephemeral, department, platform]
        top_n:
          type: integer
          default: 10
        relevance_threshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0
        vector_ids:
          type: array
          items:
            type: string
            format: uuid
        filters:
          type: object
        include_context:
          type: boolean
          default: true
      additionalProperties: false

    SearchResult:
      type: object
      required: [id, vector_id, score, content]
      properties:
        id:
          type: string
          format: uuid
        vector_id:
          type: string
          format: uuid
        score:
          type: number
          minimum: 0
          maximum: 1
        content:
          type: string
        metadata:
          type: object
        source_type:
          type: string
          enum: [knowledge, memory, tool_output, policy]
        document_id:
          type: string
          format: uuid
        section_id:
          type: string
          format: uuid
        rank:
          type: integer
        embedding_model:
          type: string
      additionalProperties: false

    SearchResultList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    AgentMemory:
      type: object
      required: [agent_id, tenant_id]
      properties:
        agent_id:
          type: string
          format: uuid
        tenant_id:
          $ref: '#/components/schemas/TenantId'
        personal_memories:
          type: array
          items:
            type: string
            format: uuid
        ephemeral_window:
          $ref: '#/components/schemas/EphemeralWindow'
        last_updated:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, suspended]
      additionalProperties: false

    EphemeralWindow:
      type: object
      properties:
        max_tokens:
          type: integer
        ttl_seconds:
          type: integer
      additionalProperties: false

    GCRequest:
      type: object
      properties:
        memory_type:
          type: string
          enum: [personal, ephemeral, department, platform]
        max_age_days:
          type: integer
        dry_run:
          type: boolean
          default: false
      additionalProperties: false

    OperationStatus:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [processing, completed, failed]
        batch_size:
          type: integer
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error_message:
          type: string
      additionalProperties: false

    RetentionPolicy:
      type: object
      required: [id, tenant_id, memory_type]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          $ref: '#/components/schemas/TenantId'
        memory_type:
          type: string
          enum: [personal, ephemeral, department, platform]
        max_age_days:
          type: integer
        max_memory_count:
          type: integer
        ttl_seconds:
          type: integer
        auto_gc_enabled:
          type: boolean
        creation_date:
          type: string
          format: date-time
      additionalProperties: false

    RetentionPolicyList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RetentionPolicy'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string
        request_id:
          type: string
          format: uuid
      required:
        - code
        - message
        - request_id

    ErrorList:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
      required:
        - errors
