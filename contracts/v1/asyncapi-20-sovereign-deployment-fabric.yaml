asyncapi: 2.6.0
id: urn:uuid:operan-module20-sovereign-deployment
info:
  title: Operan — Sovereign Deployment Fabric Events
  version: 1.0.0
  description: Module 20 — Sovereign Deployment Fabric Event Definitions for Operan platform

servers:
  production:
    url: rabbitmq-operan.prod.internal:5672
    protocol: amqp
    description: Production RabbitMQ broker
  staging:
    url: rabbitmq-operan.staging.internal:5672
    protocol: amqp
    description: Staging RabbitMQ broker

channels:
  operan/events/deployment/provisioning/started:
    publish:
      summary: Published when a deployment provisioning process begins.
      operationId: receiveDeploymentProvisioningStarted
      message:
        $ref: '#/components/messages/DeploymentProvisioningStarted'

  operan/events/deployment/provisioning/completed:
    publish:
      summary: Published when a deployment provisioning process completes successfully.
      operationId: receiveDeploymentProvisioningCompleted
      message:
        $ref: '#/components/messages/DeploymentProvisioningCompleted'

  operan/events/deployment/provisioning/failed:
    publish:
      summary: Published when a deployment provisioning process fails.
      operationId: receiveDeploymentProvisioningFailed
      message:
        $ref: '#/components/messages/DeploymentProvisioningFailed'

  operan/events/deployment/active:
    publish:
      summary: Published when a deployment transitions to active/ready state.
      operationId: receiveDeploymentActive
      message:
        $ref: '#/components/messages/DeploymentActive'

  operan/events/deployment/deprovisioning/started:
    publish:
      summary: Published when a deployment deprovisioning process begins.
      operationId: receiveDeploymentDeprovisioningStarted
      message:
        $ref: '#/components/messages/DeploymentDeprovisioningStarted'

  operan/events/deployment/deprovisioning/completed:
    publish:
      summary: Published when a deployment deprovisioning process completes.
      operationId: receiveDeploymentDeprovisioningCompleted
      message:
        $ref: '#/components/messages/DeploymentDeprovisioningCompleted'

  operan/events/deployment/rollback/initiated:
    publish:
      summary: Published when a deployment rollback is initiated.
      operationId: receiveDeploymentRollbackInitiated
      message:
        $ref: '#/components/messages/DeploymentRollbackInitiated'

  operan/events/deployment/rollback/completed:
    publish:
      summary: Published when a deployment rollback completes successfully.
      operationId: receiveDeploymentRollbackCompleted
      message:
        $ref: '#/components/messages/DeploymentRollbackCompleted'

  operan/events/deployment/cancelled:
    publish:
      summary: Published when a deployment is cancelled.
      operationId: receiveDeploymentCancelled
      message:
        $ref: '#/components/messages/DeploymentCancelled'

  operan/events/deployment/health/degraded:
    publish:
      summary: Published when a deployment health status degrades.
      operationId: receiveDeploymentHealthDegraded
      message:
        $ref: '#/components/messages/DeploymentHealthDegraded'

  operan/events/deployment/health/recovered:
    publish:
      summary: Published when a deployment health status recovers to healthy.
      operationId: receiveDeploymentHealthRecovered
      message:
        $ref: '#/components/messages/DeploymentHealthRecovered'

  operan/events/deployment/compliance/validated:
    publish:
      summary: Published when a deployment passes all sovereign compliance checks.
      operationId: receiveDeploymentComplianceValidated
      message:
        $ref: '#/components/messages/DeploymentComplianceValidated'

  operan/events/deployment/compliance/violation:
    publish:
      summary: Published when a deployment fails sovereign compliance checks.
      operationId: receiveDeploymentComplianceViolation
      message:
        $ref: '#/components/messages/DeploymentComplianceViolation'

  operan/events/deployment/infrastructure/provisioned:
    publish:
      summary: Published when infrastructure resources for a deployment are provisioned.
      operationId: receiveDeploymentInfrastructureProvisioned
      message:
        $ref: '#/components/messages/DeploymentInfrastructureProvisioned'

  operan/events/deployment/infrastructure/scaled:
    publish:
      summary: Published when a deployment scales infrastructure resources.
      operationId: receiveDeploymentInfrastructureScaled
      message:
        $ref: '#/components/messages/DeploymentInfrastructureScaled'

components:
  messages:
    DeploymentProvisioningStarted:
      messageId: DeploymentProvisioningStarted
      name: DeploymentProvisioningStarted
      correlationId:
        description: UUID that correlates this event with the originating deployment creation request.
      tenantId:
        description: UUID of the tenant that initiated the deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - name
          - target_type
          - region_id
          - configuration
        properties:
          deployment_id:
            type: string
            format: uuid
            description: Unique identifier for the deployment being provisioned.
          tenant_id:
            type: string
            format: uuid
            description: Tenant that owns this deployment.
          name:
            type: string
            description: Human-readable deployment name.
          target_type:
            $ref: '#/components/schemas/DeploymentTarget'
          region_id:
            type: string
            format: uuid
            description: Target deployment region.
          configuration:
            $ref: '#/components/schemas/DeploymentConfiguration'
          version:
            type: integer
            description: Initial deployment version.
          estimated_duration_seconds:
            type: integer
            description: Estimated provisioning duration.

    DeploymentProvisioningCompleted:
      messageId: DeploymentProvisioningCompleted
      name: DeploymentProvisioningCompleted
      correlationId:
        description: UUID correlating with the provisioning_started event.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - version
          - provisioned_resources
          - duration_seconds
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          version:
            type: integer
          provisioned_resources:
            $ref: '#/components/schemas/InfrastructureResources'
          duration_seconds:
            type: integer
            description: Total provisioning duration.
          endpoints:
            type: object
            additionalProperties:
              type: string
            description: Resolved service endpoints for this deployment.

    DeploymentProvisioningFailed:
      messageId: DeploymentProvisioningFailed
      name: DeploymentProvisioningFailed
      correlationId:
        description: UUID correlating with the provisioning_started event.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - error
          - error_code
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          error:
            type: string
            description: Human-readable error message.
          error_code:
            type: string
            description: Machine-readable error code.
          failed_component:
            type: string
            description: Component that caused the failure (e.g., compute, storage, network).
          retryable:
            type: boolean
            description: Whether the failure can be retried automatically.

    DeploymentActive:
      messageId: DeploymentActive
      name: DeploymentActive
      correlationId:
        description: UUID correlating with the provisioning_completed event.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - version
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          version:
            type: integer
          active_agents_count:
            type: integer
            description: Number of agents activated in this deployment.
          active_integrations_count:
            type: integer
            description: Number of integrations activated.
          health_endpoint:
            type: string
            description: Health check endpoint URL.

    DeploymentDeprovisioningStarted:
      messageId: DeploymentDeprovisioningStarted
      name: DeploymentDeprovisioningStarted
      correlationId:
        description: UUID correlating with the original deployment creation or modification request.
      tenantId:
        description: UUID of the tenant that initiated deprovisioning.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          reason:
            type: string
            description: Reason for deprovisioning.
          graceful:
            type: boolean
            description: Whether to drain active workflows before deprovisioning.

    DeploymentDeprovisioningCompleted:
      messageId: DeploymentDeprovisioningCompleted
      name: DeploymentDeprovisioningCompleted
      correlationId:
        description: UUID correlating with the deprovisioning_started event.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - released_resources
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          released_resources:
            $ref: '#/components/schemas/InfrastructureResources'
          duration_seconds:
            type: integer
          data_retention_days:
            type: integer
            description: Number of days to retain deployment data before deletion.

    DeploymentRollbackInitiated:
      messageId: DeploymentRollbackInitiated
      name: DeploymentRollbackInitiated
      correlationId:
        description: UUID correlating with the original deployment or update request.
      tenantId:
        description: UUID of the tenant that initiated the rollback.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - source_version
          - target_version
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          source_version:
            type: integer
            description: Current version being rolled back from.
          target_version:
            type: integer
            description: Version to roll back to.
          reason:
            type: string
            description: Reason for rollback.

    DeploymentRollbackCompleted:
      messageId: DeploymentRollbackCompleted
      name: DeploymentRollbackCompleted
      correlationId:
        description: UUID correlating with the rollback_initiated event.
      tenantId:
        description: UUID of the tenant that initiated the rollback.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - target_version
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          target_version:
            type: integer
          duration_seconds:
            type: integer

    DeploymentCancelled:
      messageId: DeploymentCancelled
      name: DeploymentCancelled
      correlationId:
        description: UUID correlating with the original deployment request.
      tenantId:
        description: UUID of the tenant that cancelled the deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - cancelled_by
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          cancelled_by:
            type: string
            format: uuid
            description: UUID of the user or system that cancelled the deployment.
          reason:
            type: string
            description: Reason for cancellation.
          cancelled_at:
            type: string
            format: date-time

    DeploymentHealthDegraded:
      messageId: DeploymentHealthDegraded
      name: DeploymentHealthDegraded
      correlationId:
        description: UUID correlating with the deployment.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - component
          - severity
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          component:
            type: string
            description: Component that is degraded (e.g., agent-orchestration, memory-fabric).
          severity:
            $ref: '#/components/schemas/SeverityLevel'
          error_rate:
            type: number
            description: Current error rate for the component.
          latency_ms:
            type: integer
            description: Current average latency for the component.
          details:
            type: string
            description: Additional health diagnostic details.

    DeploymentHealthRecovered:
      messageId: DeploymentHealthRecovered
      name: DeploymentHealthRecovered
      correlationId:
        description: UUID correlating with the deployment.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - component
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          component:
            type: string
            description: Component that recovered.
          recovery_duration_seconds:
            type: integer
            description: Duration of the degraded state.
          root_cause:
            type: string
            nullable: true
            description: Identified root cause of the degradation, if known.

    DeploymentComplianceValidated:
      messageId: DeploymentComplianceValidated
      name: DeploymentComplianceValidated
      correlationId:
        description: UUID correlating with the deployment.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - region_id
          - rules_passed
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          region_id:
            type: string
            format: uuid
          rules_passed:
            type: integer
            description: Number of compliance rules that passed.
          rules_total:
            type: integer
            description: Total number of compliance rules checked.
          data_residency_compliant:
            type: boolean
          sovereign_compatible:
            type: boolean
          validated_by:
            type: string
            format: uuid
            description: UUID of the policy engine that validated compliance.

    DeploymentComplianceViolation:
      messageId: DeploymentComplianceViolation
      name: DeploymentComplianceViolation
      correlationId:
        description: UUID correlating with the deployment.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - region_id
          - violations
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          region_id:
            type: string
            format: uuid
          violations:
            type: array
            items:
              $ref: '#/components/schemas/ComplianceViolation'
          blocked:
            type: boolean
            description: Whether the deployment is blocked due to violations.

    DeploymentInfrastructureProvisioned:
      messageId: DeploymentInfrastructureProvisioned
      name: DeploymentInfrastructureProvisioned
      correlationId:
        description: UUID correlating with the provisioning_started event.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - resources
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          resources:
            $ref: '#/components/schemas/InfrastructureResources'

    DeploymentInfrastructureScaled:
      messageId: DeploymentInfrastructureScaled
      name: DeploymentInfrastructureScaled
      correlationId:
        description: UUID correlating with the deployment.
      tenantId:
        description: UUID of the tenant that owns this deployment.
      messageId:
        description: Unique UUID for this message instance.
      timestamp:
        description: ISO 8601 date-time when the event was emitted.
      contentType: application/json
      payload:
        type: object
        required:
          - deployment_id
          - tenant_id
          - scale_direction
          - resource_type
        properties:
          deployment_id:
            type: string
            format: uuid
          tenant_id:
            type: string
            format: uuid
          scale_direction:
            type: string
            enum: [up, down]
            description: Direction of scaling.
          resource_type:
            type: string
            enum: [compute, storage, network]
            description: Type of resource being scaled.
          previous_count:
            type: integer
            description: Previous resource count.
          new_count:
            type: integer
            description: New resource count after scaling.

  schemas:
    DeploymentTarget:
      type: string
      enum:
        - public-cloud
        - private-cloud
        - air-gapped
        - sovereign
        - edge
      description: Deployment target environment type.

    IsolationLevel:
      type: string
      enum:
        - logical
        - data
        - cryptographic
        - execution
      description: Multi-tenant isolation level for this deployment.

    DeploymentConfiguration:
      type: object
      properties:
        department_template_id:
          type: string
          format: uuid
          nullable: true
        agent_count:
          type: integer
        memory_topology:
          type: object
          properties:
            vector_enabled:
              type: boolean
            graph_enabled:
              type: boolean
            episodic_enabled:
              type: boolean
            semantic_enabled:
              type: boolean
        isolation_level:
          $ref: '#/components/schemas/IsolationLevel'

    InfrastructureResources:
      type: object
      properties:
        compute:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              resource_id:
                type: string
        storage:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              resource_id:
                type: string
        network:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              type:
                type: string
              resource_id:
                type: string

    ComplianceViolation:
      type: object
      required:
        - policy_name
        - status
      properties:
        policy_name:
          type: string
          description: Name of the violated policy.
        status:
          type: string
          enum: [fail, warn]
        message:
          type: string
          description: Details of the violation.
        severity:
          type: string
          enum: [critical, high, medium, low]
        remediation_steps:
          type: array
          items:
            type: string
          description: Suggested remediation actions.

    SeverityLevel:
      type: string
      enum:
        - critical
        - high
        - medium
        - low
      description: Severity level of a health or compliance event.

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HTTP Bearer JWT authentication for service-to-service and client authentication.
    TenantContext:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Required tenant identification header. Must be present on every request.

security:
  - BearerAuth: []
  - TenantContext: []
