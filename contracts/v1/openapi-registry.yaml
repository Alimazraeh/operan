openapi: 3.0.3
info:
  title: Operan Agent Registry API
  description: Central registry for reusable agents with versioning, capability indexing, dependency management, runtime constraints, and cost profiles. Module 04.
  version: 1.0.0

servers:
  - url: /api/v1/registry

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /agents:
    post:
      summary: Register a new agent
      operationId: registerAgent
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAgentRequest'
      responses:
        '201':
          description: Agent registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

    get:
      summary: List agents
      operationId: listAgents
      tags: [agents]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: capability
          in: query
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Agent list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentList'

  /agents/{id}:
    get:
      summary: Get agent details
      operationId: getAgent
      tags: [agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Agent details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'

    patch:
      summary: Update agent configuration
      operationId: updateAgent
      tags: [agents]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAgentRequest'
      responses:
        '200':
          description: Agent updated

  /agents/{id}/version:
    post:
      summary: Create a new version of an agent
      operationId: createAgentVersion
      tags: [versions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAgentVersionRequest'
      responses:
        '201':
          description: New version created

  /agents/{id}/versions:
    get:
      summary: List agent versions
      operationId: listAgentVersions
      tags: [versions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Agent versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  versions:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentVersion'

  /agents/{id}/capabilities:
    get:
      summary: Get agent capability index
      operationId: getAgentCapabilities
      tags: [capabilities]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Capability index
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityIndex'

  /agents/{id}/cost-profile:
    get:
      summary: Get agent cost profile
      operationId: getAgentCostProfile
      tags: [cost]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cost profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostProfile'

  /agents/{id}/dependencies:
    get:
      summary: Get agent dependency graph
      operationId: getAgentDependencies
      tags: [dependencies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dependency graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DependencyGraph'

  /agents/{id}/health:
    get:
      summary: Get agent runtime health
      operationId: getAgentHealth
      tags: [health]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Agent health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentHealth'

  /capability-index:
    get:
      summary: Search agents by capability
      operationId: searchByCapability
      tags: [search]
      parameters:
        - name: capability
          in: query
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Capability search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: string
                      format: uuid
                  capability:
                    type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    RegisterAgentRequest:
      type: object
      required:
        - tenant_id
        - name
        - role
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
        memory_access:
          type: array
          items:
            type: string
        escalation_rules:
          type: array
          items:
            type: string
        governance_policies:
          type: array
          items:
            type: string
        objectives:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        memory_scope:
          type: string
          enum: [global, department, tenant, restricted]
        escalation_targets:
          type: array
          items:
            type: string
        execution_budget:
          $ref: '#/components/schemas/ExecutionBudget'
        description:
          type: string

    UpdateAgentRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        capabilities:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
        memory_access:
          type: array
          items:
            type: string
        escalation_rules:
          type: array
          items:
            type: string
        governance_policies:
          type: array
          items:
            type: string
        memory_scope:
          type: string
          enum: [global, department, tenant, restricted]
        status:
          type: string
          enum: [active, inactive, deprecated]

    Agent:
      type: object
      required:
        - id
        - tenant_id
        - name
        - role
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
        memory_access:
          type: array
          items:
            type: string
        escalation_rules:
          type: array
          items:
            type: string
        governance_policies:
          type: array
          items:
            type: string
        memory_scope:
          type: string
          enum: [global, department, tenant, restricted]
        escalation_targets:
          type: array
          items:
            type: string
        execution_budget:
          $ref: '#/components/schemas/ExecutionBudget'
        version:
          type: string
        current_version:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, inactive, deprecated]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        cost_profile:
          $ref: '#/components/schemas/CostProfile'

    AgentVersion:
      type: object
      required:
        - id
        - agent_id
        - version
        - created_at
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        version:
          type: string
        changes:
          type: string
        status:
          type: string
          enum: [active, active, inactive, deprecated]
        created_at:
          type: string
          format: date-time
        created_by:
          type: string

    CreateAgentVersionRequest:
      type: object
      required:
        - version
        - changes
      properties:
        version:
          type: string
        changes:
          type: string
        capabilities:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
        governance_policies:
          type: array
          items:
            type: string

    CapabilityIndex:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
        capabilities:
          type: array
          items:
            $ref: '#/components/schemas/CapabilityEntry'

    CapabilityEntry:
      type: object
      required:
        - capability
        - proficiency
      properties:
        capability:
          type: string
        proficiency:
          type: number
          format: float
          minimum: 0
          maximum: 1
        confidence_score:
          type: number
          format: float
        tools_required:
          type: array
          items:
            type: string

    CostProfile:
      type: object
      properties:
        avg_tokens_per_execution:
          type: integer
        avg_cost_per_execution:
          type: number
          format: float
        cost_currency:
          type: string
          default: USD
        model_preference:
          type: string
        cost_per_capability:
          type: object
          additionalProperties:
            type: number
            format: float

    ExecutionBudget:
      type: object
      properties:
        max_tokens_per_execution:
          type: integer
        max_execution_time_ms:
          type: integer
        max_cost_per_execution:
          type: number
          format: float
        max_daily_tokens:
          type: integer
        max_daily_cost:
          type: number
          format: float

    DependencyGraph:
      type: object
      properties:
        agent_id:
          type: string
          format: uuid
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/AgentDependency'

    AgentDependency:
      type: object
      required:
        - agent_id
        - dependency_type
      properties:
        agent_id:
          type: string
          format: uuid
        dependency_type:
          type: string
          enum: [required, optional, tool, memory]
        version_constraint:
          type: string

    AgentHealth:
      type: object
      required:
        - agent_id
        - status
      properties:
        agent_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [healthy, degraded, unhealthy, offline]
        uptime_seconds:
          type: integer
        avg_response_time_ms:
          type: number
        last_execution_at:
          type: string
          format: date-time
        success_rate:
          type: number
          format: float
        error_rate:
          type: number
          format: float

    AgentList:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        total:
          type: integer
        has_more:
          type: boolean
