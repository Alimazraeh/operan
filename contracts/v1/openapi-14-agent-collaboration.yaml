openapi: "3.0.3"
info:
  title: Operan Agent Collaboration & Context Sharing API
  description: Inter-agent messaging, task coordination, and team management. Module 14.
  version: 1.0.0
  contact:
    name: Platform Architecture
    email: arch@operan.io

servers:
  - url: https://api.operan.io/v1/collaboration
    description: Production
  - url: https://api-staging.operan.io/v1/collaboration
    description: Staging

security:
  - BearerAuth: []
  - TenantHeader: []

paths:
  /messages:
    post:
      operationId: sendMessage
      summary: Send a collaboration message to other agents
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageSendRequest'
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      operationId: listMessages
      summary: List messages for the current tenant
      tags: [Messages]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/TenantIdParam'
        - name: message_type
          in: query
          required: false
          description: Filter by message type
          schema:
            type: string
            enum: [task_request, task_update, question, answer, resource_share, status_update, escalation]
        - name: sender_id
          in: query
          required: false
          description: Filter by sender agent ID
          schema:
            type: string
            format: uuid
        - name: conversation_id
          in: query
          required: false
          description: Filter by conversation ID
          schema:
            type: string
            format: uuid
        - name: priority
          in: query
          required: false
          description: Filter by message priority
          schema:
            type: string
            enum: [low, normal, high, urgent]
      responses:
        '200':
          description: Message list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /messages/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the message
        schema:
          type: string
          format: uuid
    get:
      operationId: getMessage
      summary: Get message details
      tags: [Messages]
      responses:
        '200':
          description: Message details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /messages/{id}/read:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the message to mark as read
        schema:
          type: string
          format: uuid
    post:
      operationId: markMessageRead
      summary: Mark a message as read
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkReadRequest'
      responses:
        '200':
          description: Message marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Message not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /conversations:
    post:
      operationId: createConversation
      summary: Create a new collaboration conversation
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConversationCreateRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          description: Invalid request body or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /conversations/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the conversation
        schema:
          type: string
          format: uuid
    get:
      operationId: getConversation
      summary: Get a conversation with its messages
      tags: [Conversations]
      responses:
        '200':
          description: Conversation detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationDetail'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks:
    get:
      operationId: listTasks
      summary: List tasks
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/TenantIdParam'
        - name: status
          in: query
          required: false
          description: Filter by task status
          schema:
            type: string
            enum: [pending, accepted, in_progress, completed, rejected, expired]
        - name: assignee_id
          in: query
          required: false
          description: Filter by assignee agent ID
          schema:
            type: string
            format: uuid
        - name: requester_id
          in: query
          required: false
          description: Filter by requester agent ID
          schema:
            type: string
            format: uuid
        - name: priority
          in: query
          required: false
          description: Filter by task priority
          schema:
            type: string
            enum: [low, normal, high, urgent]
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskList'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: createTask
      summary: Create and assign a new task to an agent
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid task request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the task
        schema:
          type: string
          format: uuid
    get:
      operationId: getTask
      summary: Get task details
      tags: [Tasks]
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{id}/complete:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the task to complete
        schema:
          type: string
          format: uuid
    post:
      operationId: completeTask
      summary: Mark a task as completed
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCompleteRequest'
      responses:
        '200':
          description: Task completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{id}/escalate:
    parameters:
      - $ref: '#/components/parameters/TenantIdPath'
      - name: id
        in: path
        required: true
        description: UUID of the task to escalate
        schema:
          type: string
          format: uuid
    post:
      operationId: escalateTask
      summary: Escalate a task
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskEscalateRequest'
      responses:
        '200':
          description: Task escalated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized — invalid or expired bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden — insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer token with tenant-scoped claims
    TenantHeader:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: Tenant identifier header required on every request

  parameters:
    TenantIdPath:
      name: id
      in: path
      required: true
      description: UUID of the tenant
      schema:
        type: string
        format: uuid
    TenantIdParam:
      name: tenant_id
      in: query
      required: true
      description: UUID of the tenant
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      required: false
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    MessageSendRequest:
      type: object
      required: [tenant_id, sender_id, content, message_type]
      properties:
        tenant_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        content:
          type: object
        message_type:
          type: string
          enum: [task_request, task_update, question, answer, resource_share, status_update, escalation]
        recipients:
          type: array
          items:
            type: string
            format: uuid
        priority:
          type: string
          enum: [low, normal, high, urgent]
        conversation_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        metadata:
          type: object
      additionalProperties: false

    Message:
      type: object
      required: [id, tenant_id, sender_id, content, message_type, sent_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        content:
          type: object
        message_type:
          type: string
          enum: [task_request, task_update, question, answer, resource_share, status_update, escalation]
        sent_at:
          type: string
          format: date-time
        recipients:
          type: array
          items:
            type: string
            format: uuid
        priority:
          type: string
          enum: [low, normal, high, urgent]
        conversation_id:
          type: string
          format: uuid
        expires_at:
          type: string
          format: date-time
        read_by:
          type: array
          items:
            $ref: '#/components/schemas/ReadReceipt'
        metadata:
          type: object
      additionalProperties: false

    ReadReceipt:
      type: object
      required: [user_id, read_at]
      properties:
        user_id:
          type: string
          format: uuid
        read_at:
          type: string
          format: date-time
      additionalProperties: false

    MessageList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    MarkReadRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
      additionalProperties: false

    Conversation:
      type: object
      required: [id, tenant_id, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        participant_ids:
          type: array
          items:
            type: string
            format: uuid
        title:
          type: string
        metadata:
          type: object
      additionalProperties: false

    ConversationDetail:
      type: object
      required: [id, tenant_id]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        participant_ids:
          type: array
          items:
            type: string
            format: uuid
        title:
          type: string
        metadata:
          type: object
      additionalProperties: false

    ConversationCreateRequest:
      type: object
      required: [tenant_id, participant_ids]
      properties:
        tenant_id:
          type: string
          format: uuid
        participant_ids:
          type: array
          items:
            type: string
            format: uuid
        title:
          type: string
        metadata:
          type: object
      additionalProperties: false

    TaskCreateRequest:
      type: object
      required: [tenant_id, assignee_id, task_description, task_context]
      properties:
        tenant_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          format: uuid
        task_description:
          type: string
        task_context:
          type: object
        priority:
          type: string
          enum: [low, normal, high, urgent]
        due_at:
          type: string
          format: date-time
        message_type:
          type: string
      additionalProperties: false

    Task:
      type: object
      required: [id, tenant_id, requester_id, assignee_id, task_description, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        requester_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          format: uuid
        task_description:
          type: string
        status:
          type: string
          enum: [pending, accepted, in_progress, completed, rejected, expired]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        task_context:
          type: object
        priority:
          type: string
          enum: [low, normal, high, urgent]
        due_at:
          type: string
          format: date-time
        result:
          type: object
        conversation_id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
      additionalProperties: false

    TaskList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_more:
          type: boolean
      required:
        - items
        - total
        - page
        - page_size
        - has_more
      additionalProperties: false

    TaskCompleteRequest:
      type: object
      required: [result]
      properties:
        result:
          type: object
      additionalProperties: false

    TaskEscalateRequest:
      type: object
      properties:
        new_assignee_id:
          type: string
          format: uuid
        reason:
          type: string
      additionalProperties: false

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string
        request_id:
          type: string
          format: uuid
      required:
        - code
        - message
        - request_id

    ErrorList:
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: "#/components/schemas/Error"
      required:
        - errors
