openapi: 3.0.3
info:
  title: Operan Policy & Governance Engine API
  description: Enterprise compliance and control. Policy enforcement, action validation, data governance, compliance auditing, and risk scoring. Module 10.
  version: 1.0.0

servers:
  - url: /api/v1/governance

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /policies:
    post:
      summary: Create a policy
      operationId: createPolicy
      tags: [policies]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'

    get:
      summary: List policies
      operationId: listPolicies
      tags: [policies]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, draft, deprecated, suspended]
      responses:
        '200':
          description: Policy list

  /policies/{id}:
    get:
      summary: Get policy details
      operationId: getPolicy
      tags: [policies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Policy details

    patch:
      summary: Update a policy
      operationId: updatePolicy
      tags: [policies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyRequest'
      responses:
        '200':
          description: Policy updated

    delete:
      summary: Delete a policy
      operationId: deletePolicy
      tags: [policies]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Policy deleted

  /policies/{id}/evaluate:
    post:
      summary: Evaluate an action against a policy
      operationId: evaluatePolicy
      tags: [evaluation]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationRequest'
      responses:
        '200':
          description: Policy evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyEvaluation'

  /policies/{id}/validate:
    post:
      summary: Validate policy syntax and logic
      operationId: validatePolicy
      tags: [validation]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Policy validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyValidation'

  /rules:
    post:
      summary: Create a policy rule
      operationId: createRule
      tags: [rules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: Rule created

    get:
      summary: List rules
      operationId: listRules
      tags: [rules]
      parameters:
        - name: policy_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Rule list

  /rules/{id}:
    patch:
      summary: Update a rule
      operationId: updateRule
      tags: [rules]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
      responses:
        '200':
          description: Rule updated

  /compliance/audits:
    post:
      summary: Trigger a compliance audit
      operationId: triggerAudit
      tags: [compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerAuditRequest'
      responses:
        '202':
          description: Audit initiated

    get:
      summary: List compliance audits
      operationId: listAudits
      tags: [compliance]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, running, completed, failed]
      responses:
        '200':
          description: Audit list

  /compliance/audits/{id}:
    get:
      summary: Get audit details
      operationId: getAudit
      tags: [compliance]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Audit details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceAudit'

  /compliance/reports:
    get:
      summary: Get compliance reports
      operationId: getComplianceReports
      tags: [compliance]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: report_type
          in: query
          schema:
            type: string
            enum: [summary, detailed, regulatory, internal]
      responses:
        '200':
          description: Compliance reports

  /risk/scoring:
    get:
      summary: Get risk scores
      operationId: getRiskScores
      tags: [risk]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: scope
          in: query
          schema:
            type: string
            enum: [tenant, department, agent, workflow, system]
        - name: scope_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Risk scores
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskScores'

  /risk/scoring/{scope}/{scope_id}:
    get:
      summary: Get specific risk score
      operationId: getRiskScore
      tags: [risk]
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
            enum: [tenant, department, agent, workflow, system]
        - name: scope_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Risk score details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskScoreDetail'

  /governance/audit-log:
    get:
      summary: Query governance audit log
      operationId: queryAuditLog
      tags: [audit-log]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
        - name: event_type
          in: query
          schema:
            type: string
            enum: [policy_create, policy_update, policy_violation, rule_create, rule_update, audit_triggered, audit_completed, risk_score_updated]
        - name: actor_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Audit log entries

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    CreatePolicyRequest:
      type: object
      required:
        - tenant_id
        - name
        - description
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [financial, hr, data, security, compliance, operational, legal]
        scope:
          type: object
          description: Policy scope (tenant, department, agent types)
        rules:
          type: array
          items:
            $ref: '#/components/schemas/CreateRuleRequest'
        enforcement_level:
          type: string
          enum: [strict, advisory, experimental]
        version:
          type: string
        tags:
          type: array
          items:
            type: string

    Policy:
      type: object
      required:
        - id
        - name
        - category
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        category:
          type: string
        scope:
          type: object
        rules:
          type: array
          items:
            $ref: '#/components/schemas/Rule'
        enforcement_level:
          type: string
          enum: [strict, advisory, experimental]
        status:
          type: string
          enum: [active, draft, deprecated, suspended]
        version:
          type: string
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string

    UpdatePolicyRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        scope:
          type: object
        enforcement_level:
          type: string
          enum: [strict, advisory, experimental]
        status:
          type: string
          enum: [active, draft, deprecated, suspended]
        version:
          type: string
        tags:
          type: array
          items:
            type: string

    CreateRuleRequest:
      type: object
      required:
        - name
        - condition
        - effect
      properties:
        name:
          type: string
        description:
          type: string
        condition:
          type: string
          description: Policy condition (Rego or structured format)
        effect:
          type: string
          enum: [allow, deny, require_approval, log, throttle, rate_limit]
        priority:
          type: integer
          default: 0
        parameters:
          type: object
        enabled:
          type: boolean
          default: true

    UpdateRuleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        condition:
          type: string
        effect:
          type: string
          enum: [allow, deny, require_approval, log, throttle, rate_limit]
        priority:
          type: integer
        parameters:
          type: object
        enabled:
          type: boolean

    Rule:
      type: object
      required:
        - id
        - name
        - condition
        - effect
      properties:
        id:
          type: string
          format: uuid
        policy_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        condition:
          type: string
        effect:
          type: string
          enum: [allow, deny, require_approval, log, throttle, rate_limit]
        priority:
          type: integer
        parameters:
          type: object
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    EvaluationRequest:
      type: object
      required:
        - action
        - actor
        - resource
      properties:
        action:
          type: string
          description: The action being evaluated (e.g., "create_payment", "sign_contract")
        actor:
          type: string
          format: uuid
          description: Agent or user performing the action
        resource:
          type: string
          format: uuid
          description: Target resource being acted upon
        context:
          type: object
          description: Additional context for evaluation (amount, data sensitivity, etc.)
        environment:
          type: object
          description: Environment metadata (department, workflow, etc.)

    PolicyEvaluation:
      type: object
      required:
        - allowed
        - policy_id
        - rules_evaluated
      properties:
        allowed:
          type: boolean
        policy_id:
          type: string
          format: uuid
        rules_evaluated:
          type: integer
        violated_rules:
          type: array
          items:
            $ref: '#/components/schemas/ViolatedRule'
        requires_approval:
          type: boolean
        approval_chain:
          type: array
          items:
            type: string
        throttling:
          $ref: '#/components/schemas/ThrottleConfig'
        decision_rationale:
          type: string
        evaluation_time_ms:
          type: integer

    ViolatedRule:
      type: object
      required:
        - rule_id
        - rule_name
        - effect
      properties:
        rule_id:
          type: string
          format: uuid
        rule_name:
          type: string
        effect:
          type: string
        details:
          type: string

    ThrottleConfig:
      type: object
      properties:
        enabled:
          type: boolean
        rate_limit:
          type: integer
        window_seconds:
          type: integer
        burst_limit:
          type: integer

    PolicyValidation:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        syntax_check:
          type: boolean
        logic_check:
          type: boolean
        conflict_check:
          type: boolean
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/PolicyConflict'

    PolicyConflict:
      type: object
      required:
        - rule_id_1
        - rule_id_2
        - conflict_type
      properties:
        rule_id_1:
          type: string
          format: uuid
        rule_id_2:
          type: string
          format: uuid
        conflict_type:
          type: string
          enum: [contradiction, shadow, redundancy]
        description:
          type: string

    TriggerAuditRequest:
      type: object
      required:
        - tenant_id
        - auditor_id
        - scope
      properties:
        tenant_id:
          type: string
          format: uuid
        auditor_id:
          type: string
          format: uuid
        scope:
          type: string
          enum: [full, policy, compliance, risk, department, agent]
        scope_id:
          type: string
          format: uuid
          description: Required if scope is department or agent
        criteria:
          type: array
          items:
            type: string
        schedule:
          type: string
          description: Cron expression for recurring audits

    ComplianceAudit:
      type: object
      required:
        - id
        - status
        - auditor_id
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        auditor_id:
          type: string
          format: uuid
        scope:
          type: string
        scope_id:
          type: string
          format: uuid
        criteria:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        results:
          type: object
        findings:
          type: array
          items:
            $ref: '#/components/schemas/AuditFinding'
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    AuditFinding:
      type: object
      required:
        - category
        - severity
        - status
      properties:
        category:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, informational]
        description:
          type: string
        evidence:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [open, acknowledged, remediated, accepted, false_positive]
        remediation:
          type: string
        assigned_to:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time

    RiskScores:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        overall_risk_score:
          type: number
          format: float
          minimum: 0
          maximum: 10
        categories:
          type: object
          properties:
            execution_risk:
              $ref: '#/components/schemas/RiskScoreDetail'
            compliance_risk:
              $ref: '#/components/schemas/RiskScoreDetail'
            data_risk:
              $ref: '#/components/schemas/RiskScoreDetail'
            financial_risk:
              $ref: '#/components/schemas/RiskScoreDetail'
            operational_risk:
              $ref: '#/components/schemas/RiskScoreDetail'

    RiskScoreDetail:
      type: object
      required:
        - score
        - level
      properties:
        score:
          type: number
          format: float
          minimum: 0
          maximum: 10
        level:
          type: string
          enum: [low, medium, high, critical]
        trends:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              score:
                type: number
        contributing_factors:
          type: array
          items:
            type: string
        last_updated:
          type: string
          format: date-time
