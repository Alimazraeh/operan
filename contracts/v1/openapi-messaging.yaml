openapi: 3.0.3
info:
  title: Operan Agent Communication & Messaging Engine API
  description: Agent-to-agent messaging. Event bus, pub/sub, RPC, message routing, channel management, event schemas, and delivery guarantees. Module 13.
  version: 1.0.0

servers:
  - url: /api/v1/messaging

security:
  - BearerAuth: []
  - X-Tenant-ID:
      schema:
        type: string

paths:
  /channels:
    post:
      summary: Create a communication channel
      operationId: createChannel
      tags: [channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '201':
          description: Channel created

    get:
      summary: List channels
      operationId: listChannels
      tags: [channels]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [topic, queue, broadcast, rpc]
      responses:
        '200':
          description: Channel list

  /channels/{id}:
    get:
      summary: Get channel details
      operationId: getChannel
      tags: [channels]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Channel details

    patch:
      summary: Update channel
      operationId: updateChannel
      tags: [channels]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelRequest'
      responses:
        '200':
          description: Channel updated

    delete:
      summary: Delete channel
      operationId: deleteChannel
      tags: [channels]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Channel deleted

  /channels/{id}/publish:
    post:
      summary: Publish a message to a channel
      operationId: publishMessage
      tags: [messages]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishMessageRequest'
      responses:
        '202':
          description: Message published

  /channels/{id}/subscribe:
    post:
      summary: Subscribe to a channel
      operationId: subscribeChannel
      tags: [subscriptions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
      responses:
        '201':
          description: Subscription created

  /channels/{id}/messages:
    get:
      summary: Get channel messages
      operationId: getChannelMessages
      tags: [messages]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: after
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Message list

  /rpc:
    post:
      summary: Send RPC request
      operationId: sendRPCRequest
      tags: [rpc]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RPCRequest'
      responses:
        '202':
          description: RPC request sent

  /rpc/{request_id}/status:
    get:
      summary: Get RPC request status
      operationId: getRPCStatus
      tags: [rpc]
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: RPC status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RPCStatus'

  /rpc/{request_id}/cancel:
    post:
      summary: Cancel RPC request
      operationId: cancelRPCRequest
      tags: [rpc]
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: RPC cancelled

  /queues:
    get:
      summary: List queues
      operationId: listQueues
      tags: [queues]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Queue list

  /queues/{queue_id}/status:
    get:
      summary: Get queue status
      operationId: getQueueStatus
      tags: [queues]
      parameters:
        - name: queue_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Queue status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueStatus'

  /events/patterns:
    post:
      summary: Create event pattern subscription
      operationId: createEventPattern
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventPatternRequest'
      responses:
        '201':
          description: Event pattern created

    get:
      summary: List event patterns
      operationId: listEventPatterns
      tags: [events]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Event pattern list

  /events/patterns/{id}:
    delete:
      summary: Delete event pattern
      operationId: deleteEventPattern
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Event pattern deleted

  /deliveries:
    get:
      summary: Get delivery status
      operationId: getDeliveryStatus
      tags: [deliveries]
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, delivered, failed, acknowledged, dead_letter]
        - name: after
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Delivery list

  /deliveries/{delivery_id}/retry:
    post:
      summary: Retry a failed delivery
      operationId: retryDelivery
      tags: [deliveries]
      parameters:
        - name: delivery_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Retry initiated

  /health:
    get:
      summary: Service health check
      operationId: healthCheck
      tags: [health]
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    X-Tenant-ID:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string

  schemas:
    CreateChannelRequest:
      type: object
      required:
        - tenant_id
        - name
        - type
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [topic, queue, broadcast, rpc]
        schema:
          type: string
          description: JSON schema for message validation
        max_message_size:
          type: integer
          default: 1048576
        retention_hours:
          type: integer
          default: 168
        delivery_guarantee:
          type: string
          enum: [at_least_once, at_most_once, exactly_once]
        priority_levels:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string

    Channel:
      type: object
      required:
        - id
        - name
        - type
        - status
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [topic, queue, broadcast, rpc]
        schema:
          type: string
        max_message_size:
          type: integer
        retention_hours:
          type: integer
        delivery_guarantee:
          type: string
        priority_levels:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive, archived]
        message_count:
          type: integer
        subscriber_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string

    UpdateChannelRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        schema:
          type: string
        max_message_size:
          type: integer
        retention_hours:
          type: integer
        delivery_guarantee:
          type: string
        status:
          type: string
          enum: [active, inactive, archived]
        tags:
          type: array
          items:
            type: string

    PublishMessageRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: object
        priority:
          type: string
          enum: [low, normal, high, critical]
        correlation_id:
          type: string
          format: uuid
        reply_to:
          type: string
          format: uuid
        ttl_seconds:
          type: integer
        metadata:
          type: object
        dedup_key:
          type: string

    SubscribeRequest:
      type: object
      required:
        - agent_id
      properties:
        agent_id:
          type: string
          format: uuid
        filter:
          type: object
        consumer_group:
          type: string
        auto_ack:
          type: boolean
          default: true

    RPCRequest:
      type: object
      required:
        - from_agent_id
        - to_agent_id
        - method
        - payload
      properties:
        from_agent_id:
          type: string
          format: uuid
        to_agent_id:
          type: string
          format: uuid
        method:
          type: string
        payload:
          type: object
        timeout_seconds:
          type: integer
          default: 30
        correlation_id:
          type: string
          format: uuid
        ttl_seconds:
          type: integer

    RPCStatus:
      type: object
      required:
        - request_id
        - status
      properties:
        request_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed, timeout, cancelled]
        from_agent_id:
          type: string
          format: uuid
        to_agent_id:
          type: string
          format: uuid
        method:
          type: string
        response:
          type: object
        error:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    QueueStatus:
      type: object
      required:
        - id
        - name
        - status
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [active, paused, error]
        messages_total:
          type: integer
        messages_pending:
          type: integer
        messages_processed:
          type: integer
        messages_failed:
          type: integer
        subscribers:
          type: integer
        avg_processing_time_ms:
          type: number
        last_message_at:
          type: string
          format: date-time

    EventPatternRequest:
      type: object
      required:
        - tenant_id
        - name
        - pattern
      properties:
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        pattern:
          type: object
          properties:
            event_type:
              type: string
            source_agent_id:
              type: string
              format: uuid
            tags:
              type: array
              items:
                type: string
            filters:
              type: object
        target_channel_id:
          type: string
          format: uuid
        target_agent_id:
          type: string
          format: uuid
        enabled:
          type: boolean
          default: true

    Delivery:
      type: object
      required:
        - id
        - message_id
        - status
      properties:
        id:
          type: string
          format: uuid
        message_id:
          type: string
          format: uuid
        channel_id:
          type: string
          format: uuid
        recipient_agent_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, delivered, failed, acknowledged, dead_letter]
        delivery_attempts:
          type: integer
        last_attempt_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
        error_message:
          type: string
        created_at:
          type: string
          format: date-time

    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        uptime_seconds:
          type: integer
        active_channels:
          type: integer
        messages_per_second:
          type: number
        queue_depth:
          type: integer
        failed_deliveries_24h:
          type: integer
        last_check:
          type: string
          format: date-time
